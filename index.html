  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect, useCallback } = React;

    // localStorage shim for window.storage API
    window.storage = {
      get: async (key) => {
        try {
          const val = localStorage.getItem(key);
          if (val === null) throw new Error('not found');
          return { key, value: val };
        } catch(e) { throw e; }
      },
      set: async (key, value) => {
        try {
          localStorage.setItem(key, value);
          return { key, value };
        } catch(e) { return null; }
      },
      delete: async (key) => {
        localStorage.removeItem(key);
        return { key, deleted: true };
      },
      list: async (prefix) => {
        const keys = Object.keys(localStorage).filter(k => !prefix || k.startsWith(prefix));
        return { keys };
      }
    };


const QUESTIONS = [
  // 安全管理
  {id:1,分野:"安全管理",形式:"不適切",問題:"リスクアセスメントに関する記述のうち、不適切なものはどれか。",選択肢:{A:"危険源の特定はリスクアセスメントの最初のステップである",B:"リスクの見積もりでは発生確率と被害の重篤度を考慮する",C:"リスク対策はリスクを完全にゼロにすることを必ず目指す",D:"リスクアセスメントの結果は記録・文書化することが望ましい",E:"残留リスクについては労働者への情報提供が必要である"},正解:"C",解説:"リスクを完全にゼロにすることは現実的でない。リスク対策はリスクを許容可能なレベルまで低減することを目指す（ALARP原則）。"},
  {id:2,分野:"安全管理",形式:"不適切",問題:"フェイルセーフ設計に関する記述のうち、不適切なものはどれか。",選択肢:{A:"故障発生時に安全側の状態に移行するよう設計する",B:"鉄道信号が断線時に赤信号（停止）になるのはフェイルセーフの例である",C:"フェイルセーフは故障そのものを防止する設計思想である",D:"フールプルーフとは異なる概念である",E:"原子炉の緊急停止系もフェイルセーフの考え方を採用している"},正解:"C",解説:"フェイルセーフは故障を防止するのではなく、故障が発生した際の被害を安全側に制御する設計思想。故障防止はフォールトアボイダンス。"},
  {id:3,分野:"安全管理",形式:"不適切",問題:"ハインリッヒの法則に関する記述のうち、不適切なものはどれか。",選択肢:{A:"1件の重大事故の背後に29件の軽微な事故がある",B:"300件のヒヤリハットの積み重ねが重大事故につながる",C:"ヒヤリハットの段階で対策を打つことが重大事故防止に有効である",D:"この法則はあらゆる業種・状況に普遍的に適用できることが科学的に証明されている",E:"労働災害の予防において広く参照される経験則である"},正解:"D",解説:"ハインリッヒの法則は経験則であり、あらゆる業種・状況への普遍的適用が科学的に証明されているわけではない。"},
  {id:4,分野:"安全管理",形式:"不適切",問題:"FTA（フォールトツリー解析）に関する記述のうち、不適切なものはどれか。",選択肢:{A:"好ましくないトップ事象から原因を下位に展開する演繹的手法である",B:"ANDゲートとORゲートを用いて論理関係を表現する",C:"FTAは定量的解析には使用できず、定性的解析のみに限定される",D:"カットセットの分析によりシステムの脆弱部位を特定できる",E:"FMEAと組み合わせて活用されることがある"},正解:"C",解説:"FTAは故障率データを用いることで定量的解析も可能。各基本事象に確率を割り当てることでトップ事象の発生確率を算出できる。"},
  {id:5,分野:"安全管理",形式:"不適切",問題:"事業継続計画（BCP）に関する記述のうち、不適切なものはどれか。",選択肢:{A:"BCPはRTO（目標復旧時間）とRPO（目標復旧時点）を設定する",B:"事業影響度分析（BIA）はBCP策定の基礎となる",C:"BCPは策定後に定期的な訓練・見直しを行う必要はない",D:"重要業務の優先順位付けがBCPの重要な要素である",E:"サプライチェーン全体を考慮したBCP策定が重要である"},正解:"C",解説:"BCPは策定しただけでは機能しない。定期的な訓練・演習の実施と、環境変化に応じた見直し・更新が不可欠。"},
  {id:6,分野:"安全管理",形式:"不適切",問題:"ISO 45001に関する記述のうち、不適切なものはどれか。",選択肢:{A:"PDCAサイクルに基づくマネジメントシステム規格である",B:"トップマネジメントのリーダーシップとコミットメントを重視する",C:"認証取得企業は労働災害ゼロを保証される",D:"危険源の特定とリスクアセスメントが中核的要素である",E:"継続的改善を基本原則としている"},正解:"C",解説:"ISO 45001の認証取得は安全衛生マネジメントシステムが適切に機能していることを示すが、労働災害ゼロを保証するものではない。"},
  {id:7,分野:"安全管理",形式:"不適切",問題:"ヒューマンエラー対策に関する記述のうち、不適切なものはどれか。",選択肢:{A:"エラープルーフ（ポカヨケ）は物理的にエラーを防止する仕組みである",B:"手順書・チェックリストの整備はヒューマンエラー防止に有効である",C:"ヒューマンエラーは個人の不注意によるものがほとんどであり、組織的要因は関係ない",D:"TBM（ツールボックスミーティング）は作業前の安全確認に有効である",E:"指差呼称は確認ミス防止に有効な行動的手法である"},正解:"C",解説:"ヒューマンエラーの背景には組織文化・教育訓練・作業環境・管理体制など多くの組織的要因がある。個人の不注意だけに帰因するのは不適切。"},
  {id:8,分野:"安全管理",形式:"不適切",問題:"HAZOPに関する記述のうち、不適切なものはどれか。",選択肢:{A:"ガイドワードを使って系統的に逸脱を検討する",B:"プロセスプラントの安全性評価に広く用いられる",C:"HAZOPは設計段階のみに適用でき、運転段階には使用できない",D:"チームで実施することで多角的な検討が可能となる",E:"設計意図からの逸脱とその原因・結果を明確にする"},正解:"C",解説:"HAZOPは設計段階だけでなく、既存プラントの運転段階における安全性の定期的再評価にも適用される。"},
  {id:9,分野:"安全管理",形式:"適切",問題:"リスクマネジメントに関する記述のうち、適切なものはどれか。",選択肢:{A:"リスクは発生確率のみで評価する",B:"ISO 31000はリスクマネジメントの国際規格であり、あらゆる組織に適用できる",C:"リスク回避は最もコストのかかる対応策である",D:"残留リスクは必ず除去しなければならない",E:"リスクマネジメントは安全部門だけが担うべき活動である"},正解:"B",解説:"ISO 31000はリスクマネジメントの原則・枠組み・プロセスを定めた国際規格で、業種・規模を問わずあらゆる組織に適用できる汎用的な規格。"},
  {id:10,分野:"安全管理",形式:"適切",問題:"労働安全衛生に関する記述のうち、適切なものはどれか。",選択肢:{A:"安全配慮義務は請負業者の労働者には適用されない",B:"特定化学物質を取り扱う作業者には特殊健康診断の実施が義務付けられている",C:"労働安全衛生法では全事業場に安全管理者の選任が義務付けられている",D:"作業環境測定の結果が第三管理区分であれば防護具着用を求めなくてよい",E:"危険有害業務の就業制限は18歳未満のみに適用される"},正解:"B",解説:"労働安全衛生法および特定化学物質障害予防規則により、特定化学物質取扱作業者への特殊健康診断が義務付けられている。"},
  // 人的資源管理
  {id:11,分野:"人的資源管理",形式:"不適切",問題:"モチベーション理論に関する記述のうち、不適切なものはどれか。",選択肢:{A:"マズローの欲求5段階説では低次の欲求が満たされると高次の欲求が生じる",B:"ハーズバーグの動機付け要因には達成感・承認・成長などが含まれる",C:"マクレガーのX理論では人間は本来仕事を好み自律的に行動するとされる",D:"デシによれば外発的報酬が内発的動機づけを低下させる場合がある",E:"期待理論では動機づけは期待×手段性×誘意性で表される"},正解:"C",解説:"X理論は「人間は生来怠惰で強制・管理が必要」という性悪説的仮定。「人間は自律的」というのはY理論の内容。"},
  {id:12,分野:"人的資源管理",形式:"不適切",問題:"人事評価制度に関する記述のうち、不適切なものはどれか。",選択肢:{A:"目標管理制度（MBO）では上司と部下が合意した目標を設定する",B:"コンピテンシー評価は高業績者の行動特性を基準とする",C:"360度フィードバックは上司のみが評価するため客観性が高い",D:"ハロー効果は一つの特性が他の評価項目にも影響するバイアスである",E:"絶対評価と相対評価はそれぞれ異なる目的に適している"},正解:"C",解説:"360度フィードバックは上司・同僚・部下・顧客など多方向から評価を受ける手法。上司のみの評価という記述は誤り。"},
  {id:13,分野:"人的資源管理",形式:"不適切",問題:"組織開発（OD）に関する記述のうち、不適切なものはどれか。",選択肢:{A:"組織開発は組織の効果性と健全性を高めることを目的とする",B:"ファシリテーションは組織開発の重要な手法の一つである",C:"組織開発は経営トップが一方的に変化を強制することで最も効果を発揮する",D:"チームビルディングは組織開発の代表的な介入手法である",E:"組織開発では構成員の主体的な参加が重視される"},正解:"C",解説:"組織開発は構成員の参加と合意形成を重視するボトムアップ的アプローチが基本。トップダウンで一方的に変化を強制する手法とは相容れない。"},
  {id:14,分野:"人的資源管理",形式:"不適切",問題:"働き方改革に関する記述のうち、不適切なものはどれか。",選択肢:{A:"2019年施行の改正労働基準法では時間外労働の上限が法律で規定された",B:"同一労働同一賃金の原則は正規・非正規間の不合理な待遇差を禁止する",C:"高度プロフェッショナル制度は全ての労働者に適用される",D:"勤務間インターバル制度は努力義務として導入された",E:"テレワークの普及により場所にとらわれない働き方が広がっている"},正解:"C",解説:"高度プロフェッショナル制度は年収1075万円以上の高度専門職に限定した制度であり、全労働者に適用されるものではない。"},
  {id:15,分野:"人的資源管理",形式:"不適切",問題:"リーダーシップ論に関する記述のうち、不適切なものはどれか。",選択肢:{A:"PM理論ではP機能とM機能の両方が高いリーダーが最も効果的とされる",B:"変革型リーダーシップは組織のビジョン提示と変革推進に関連する",C:"サーバントリーダーシップは部下への奉仕・支援を中心とした考え方である",D:"リーダーシップは生まれつきの資質であり、後天的に習得することはできない",E:"状況対応型リーダーシップでは部下の成熟度に応じてスタイルを変えることが有効とされる"},正解:"D",解説:"リーダーシップは訓練・経験・フィードバックを通じて後天的に習得・強化できることが現代のリーダーシップ研究で広く認められている。"},
  {id:16,分野:"人的資源管理",形式:"不適切",問題:"メンタルヘルス対策に関する記述のうち、不適切なものはどれか。",選択肢:{A:"ストレスチェック制度は常時50人以上の労働者を使用する事業場に義務付けられている",B:"EAPは外部機関によるカウンセリング等のサービスを含む",C:"職場復帰支援では復職直後から元の業務量に戻すことが最も効果的である",D:"一次予防はストレス要因の除去や健康増進を目的とする",E:"管理監督者向けのラインケア教育は職場のメンタルヘルス対策として重要である"},正解:"C",解説:"復職直後から元の業務量に戻すことは再休職リスクを高める。段階的に業務量を増やすウォームアップ期間を設けることが適切。"},
  {id:17,分野:"人的資源管理",形式:"不適切",問題:"人材育成に関する記述のうち、不適切なものはどれか。",選択肢:{A:"OJTは実際の業務を通じた訓練であり、個人の習熟度に合わせやすい",B:"Off-JTは体系的なカリキュラムによる集合研修が代表例である",C:"自己啓発（SD）は組織が費用・時間を全額負担しなければ人材育成とはみなされない",D:"メンタリングは経験豊富な先輩が後輩の成長を幅広く支援する関係である",E:"コーチングは対話を通じて相手の自発的な問題解決・成長を支援する手法である"},正解:"C",解説:"自己啓発（SD）は組織の支援の有無にかかわらず、個人が自発的にスキルアップを行う活動も含まれる。"},
  {id:18,分野:"人的資源管理",形式:"不適切",問題:"ダイバーシティマネジメントに関する記述のうち、不適切なものはどれか。",選択肢:{A:"多様な人材の活用はイノベーション創出につながる可能性がある",B:"インクルージョンとは多様な人材が能力を発揮できる環境づくりを指す",C:"ダイバーシティ推進は女性活躍推進のみを対象とした取り組みである",D:"アンコンシャスバイアスへの気づきはダイバーシティ推進において重要である",E:"障害者・外国人・LGBTQなど多様な属性を持つ人材の活躍推進も含まれる"},正解:"C",解説:"ダイバーシティマネジメントは女性活躍推進だけでなく、年齢・国籍・障害・性的指向・価値観など幅広い多様性を対象とする取り組み。"},
  {id:19,分野:"人的資源管理",形式:"適切",問題:"労働基準法に関する記述のうち、適切なものはどれか。",選択肢:{A:"労働契約は口頭でも成立するが、賃金・労働時間等の主要事項は書面明示が義務付けられている",B:"時間外労働は労使協定（36協定）なしに月100時間まで認められる",C:"年次有給休暇は入社直後から全日数を付与しなければならない",D:"解雇予告は1週間前までに行えば足りる",E:"休憩時間は労働時間に含まれる"},正解:"A",解説:"労働基準法第15条により、使用者は労働契約の締結時に賃金・労働時間等の労働条件を書面等で明示する義務がある。"},
  {id:20,分野:"人的資源管理",形式:"適切",問題:"組織行動に関する記述のうち、適切なものはどれか。",選択肢:{A:"集団凝集性が高いほど組織の業績は常に向上する",B:"集団思考（グループシンク）は批判的思考が活発な集団で発生しやすい",C:"心理的安全性が高い職場では、メンバーが失敗を恐れず発言・挑戦しやすい",D:"公式組織はインフォーマルなコミュニケーションを完全に排除すべきである",E:"組織文化は短期間で容易に変更できる"},正解:"C",解説:"Edmondsonが提唱する心理的安全性とは、チーム内で対人リスクを取っても安全だという信念。高い心理的安全性は学習・イノベーション・パフォーマンス向上に寄与する。"},
  // 情報管理
  {id:21,分野:"情報管理",形式:"不適切",問題:"情報セキュリティに関する記述のうち、不適切なものはどれか。",選択肢:{A:"機密性（Confidentiality）は認可された者だけが情報にアクセスできることを指す",B:"完全性（Integrity）は情報が正確で改ざんされていないことを指す",C:"可用性（Availability）は必要なときに情報にアクセスできることを指す",D:"情報セキュリティはITシステムのみを対象とし、人的・物理的対策は含まれない",E:"リスクアセスメントは情報セキュリティマネジメントの重要なプロセスである"},正解:"D",解説:"情報セキュリティはITシステムだけでなく、人的セキュリティ・物理的セキュリティも含む包括的な概念。"},
  {id:22,分野:"情報管理",形式:"不適切",問題:"個人情報保護に関する記述のうち、不適切なものはどれか。",選択肢:{A:"個人情報保護法では個人情報の利用目的を特定・公表することが求められる",B:"要配慮個人情報には人種・病歴・犯罪歴などが含まれる",C:"個人情報を第三者に提供する場合は原則として本人の同意が必要である",D:"従業員の個人情報は業務上必要であれば制限なく利用できる",E:"個人情報漏えい時には監督機関への報告義務がある場合がある"},正解:"D",解説:"従業員の個人情報も個人情報保護法の対象。利用目的の範囲内でのみ使用可能。"},
  {id:23,分野:"情報管理",形式:"不適切",問題:"サイバーセキュリティに関する記述のうち、不適切なものはどれか。",選択肢:{A:"ランサムウェアはファイルを暗号化して身代金を要求するマルウェアである",B:"多要素認証（MFA）はパスワード単体より高いセキュリティを実現する",C:"ゼロデイ攻撃はパッチが公開された後の既知の脆弱性を悪用する攻撃である",D:"ソーシャルエンジニアリングは人間の心理的弱点を悪用した攻撃手法である",E:"インシデントレスポンス計画の整備はサイバー攻撃被害の最小化に有効である"},正解:"C",解説:"ゼロデイ攻撃はベンダーやユーザーがまだ把握していない未知の脆弱性を悪用した攻撃。"},
  {id:24,分野:"情報管理",形式:"不適切",問題:"クラウドコンピューティングに関する記述のうち、不適切なものはどれか。",選択肢:{A:"IaaS・PaaS・SaaSはクラウドサービスの代表的な提供モデルである",B:"クラウド利用によりスケーラビリティや初期投資の削減が可能になる",C:"クラウドに移行すれば情報セキュリティの責任は全てクラウド事業者が負う",D:"マルチクラウド戦略はベンダーロックインリスクの軽減に有効である",E:"クラウドサービスの利用には通信障害リスクを考慮する必要がある"},正解:"C",解説:"クラウドにおけるセキュリティ責任はクラウド事業者と利用者の間で分担される（責任共有モデル）。"},
  {id:25,分野:"情報管理",形式:"不適切",問題:"アジャイル開発に関する記述のうち、不適切なものはどれか。",選択肢:{A:"スクラムはアジャイル開発の代表的なフレームワークである",B:"短いイテレーション（スプリント）で動作するソフトウェアを繰り返しリリースする",C:"アジャイル開発では要件定義を最初に完全に確定してから開発に進む",D:"顧客との継続的なコラボレーションを重視する",E:"変化への対応を計画への追従より優先する"},正解:"C",解説:"アジャイル宣言の価値観では「計画への追従より変化への対応」を重視。最初に要件を完全固定するのはウォーターフォール型開発の特徴。"},
  {id:26,分野:"情報管理",形式:"不適切",問題:"情報システムの信頼性指標に関する記述のうち、不適切なものはどれか。",選択肢:{A:"稼働率は「稼働時間÷（稼働時間＋停止時間）」で算出される",B:"MTBF（平均故障間隔）が長いほどシステムの信頼性が高い",C:"MTTR（平均修復時間）が長いほどシステムの可用性が高い",D:"稼働率はMTBF÷（MTBF＋MTTR）で表すことができる",E:"冗長化構成はシステムの可用性向上に有効な手段である"},正解:"C",解説:"MTTRは修復にかかる平均時間であり、MTTRが短いほど迅速に復旧でき可用性が高くなる。"},
  {id:27,分野:"情報管理",形式:"不適切",問題:"データマネジメントに関する記述のうち、不適切なものはどれか。",選択肢:{A:"マスターデータ管理（MDM）は組織内の基幹データの一元管理を目的とする",B:"データガバナンスはデータの品質・セキュリティ・利活用ルールを定める取り組みである",C:"ビッグデータはVolume・Velocity・Varietyの3つのVで特徴付けられる",D:"データウェアハウスはリアルタイムトランザクション処理に最適化されたシステムである",E:"データリネージはデータの発生から加工・活用までの流れを追跡する概念である"},正解:"D",解説:"データウェアハウスは意思決定・分析用に最適化されたシステム。リアルタイムトランザクション処理に最適化されているのはOLTPシステム。"},
  {id:28,分野:"情報管理",形式:"不適切",問題:"ITガバナンスに関する記述のうち、不適切なものはどれか。",選択肢:{A:"COBITはITガバナンスのフレームワークである",B:"ITガバナンスは経営戦略とIT戦略の整合を図ることを目的とする",C:"ITガバナンスの責任はIT部門だけにあり、経営層は関与しなくてよい",D:"情報システムへの投資対効果の評価はITガバナンスの重要な要素である",E:"内部統制のIT全般統制にはアクセス管理や変更管理が含まれる"},正解:"C",解説:"ITガバナンスの最終責任は経営層（取締役会・経営幹部）にある。経営層の積極的な関与と意思決定が不可欠。"},
  {id:29,分野:"情報管理",形式:"適切",問題:"情報セキュリティマネジメントに関する記述のうち、適切なものはどれか。",選択肢:{A:"ISO/IEC 27001は品質マネジメントシステムの国際規格である",B:"リスク対応にはリスク軽減・リスク回避・リスク移転・リスク保有の4つがある",C:"脆弱性診断は一度実施すれば以後は不要である",D:"暗号化すれば情報セキュリティの全リスクに対応できる",E:"セキュリティポリシーは技術的対策のみで構成される"},正解:"B",解説:"情報セキュリティのリスク対応策は①軽減②回避③移転④保有の4類型に整理される（ISO 31000準拠）。"},
  {id:30,分野:"情報管理",形式:"適切",問題:"デジタル技術活用に関する記述のうち、適切なものはどれか。",選択肢:{A:"AIは全ての業務を自動化でき、人間の判断は不要になる",B:"IoTセンサーから収集したデータは常に高品質で加工不要である",C:"ブロックチェーンはデータの改ざん耐性が高い分散型台帳技術である",D:"RPAはAIと同一の技術である",E:"デジタルツインは製品の販売データのみを対象とした技術である"},正解:"C",解説:"ブロックチェーンは取引データをブロックに格納し、分散ネットワーク全体で管理する技術。ハッシュチェーンにより改ざんを極めて困難にする。"},
  // 社会環境管理
  {id:31,分野:"社会環境管理",形式:"不適切",問題:"環境マネジメントに関する記述のうち、不適切なものはどれか。",選択肢:{A:"ISO 14001は環境マネジメントシステムの国際規格である",B:"環境側面とは組織の活動・製品・サービスが環境と相互作用する可能性がある要素である",C:"ISO 14001の認証取得は企業の環境への悪影響をゼロにすることを保証する",D:"環境目的・目標の設定には法的要求事項の遵守が前提となる",E:"内部環境監査はISO 14001の要求事項の一つである"},正解:"C",解説:"ISO 14001認証は適切な環境マネジメントシステムの運用を示すが、環境への悪影響ゼロを保証するものではない。"},
  {id:32,分野:"社会環境管理",形式:"不適切",問題:"気候変動対策に関する記述のうち、不適切なものはどれか。",選択肢:{A:"パリ協定は世界の平均気温上昇を2℃未満に抑えることを長期目標とする",B:"カーボンニュートラルとはGHG排出量と吸収量を均衡させ実質ゼロにする概念である",C:"Scope1はサプライチェーン全体の間接排出量を指す",D:"再生可能エネルギーの活用は脱炭素化の重要な手段の一つである",E:"TCFDは気候変動リスクの開示を推奨している"},正解:"C",解説:"Scope1は事業者自身による直接排出（自社燃料燃焼等）。Scope3がサプライチェーン全体の間接排出。"},
  {id:33,分野:"社会環境管理",形式:"不適切",問題:"循環経済に関する記述のうち、不適切なものはどれか。",選択肢:{A:"循環経済は廃棄物をできる限り出さないことを目指す経済モデルである",B:"3Rの優先順位はリサイクルが最も高い",C:"製品のライフサイクル全体での資源循環を設計段階から考慮することが重要である",D:"廃棄物の再資源化だけでなく、使用期間の延長や修理可能な設計も循環経済の要素である",E:"循環経済への移行はビジネスモデルの変革を伴う場合がある"},正解:"B",解説:"3Rの優先順位は①リデュース（発生抑制）②リユース（再使用）③リサイクル（再生利用）の順。リサイクルは3番目。"},
  {id:34,分野:"社会環境管理",形式:"不適切",問題:"CSR・ESGに関する記述のうち、不適切なものはどれか。",選択肢:{A:"ESGはEnvironment・Social・Governanceの頭文字である",B:"ESG投資は財務情報に加えてESG要素を考慮した投資判断を行う",C:"CSRは慈善活動や寄付活動のみを指し、本業との統合は求められない",D:"国連責任投資原則（PRI）はESG投資の普及を促進するイニシアチブである",E:"コーポレートガバナンスの強化はESGのG（Governance）に関連する"},正解:"C",解説:"現代のCSRは慈善活動にとどまらず、本業を通じた社会課題解決と統合的に取り組むことが求められている。"},
  {id:35,分野:"社会環境管理",形式:"不適切",問題:"ステークホルダーマネジメントに関する記述のうち、不適切なものはどれか。",選択肢:{A:"ステークホルダーには株主・従業員・顧客・地域社会・規制当局などが含まれる",B:"ステークホルダーの関心・影響力を分析することがマネジメントの出発点となる",C:"ステークホルダーとの対話（エンゲージメント）は一方的な情報提供で十分である",D:"ステークホルダーの要求が相互に矛盾する場合のバランス調整が重要課題となる",E:"マテリアリティ分析ではステークホルダーの関心と事業への影響の両面から重要課題を特定する"},正解:"C",解説:"ステークホルダーエンゲージメントは双方向の対話・協働が本質。一方的な情報提供では関係構築につながらない。"},
  {id:36,分野:"社会環境管理",形式:"不適切",問題:"LCA（ライフサイクルアセスメント）に関する記述のうち、不適切なものはどれか。",選択肢:{A:"LCAは原料採取から廃棄・リサイクルまでの環境負荷を定量的に評価する",B:"ISO 14040/14044がLCAの手順と要求事項を規定している",C:"機能単位（Functional Unit）はLCAにおいて異なる製品を比較する際の基準となる",D:"LCAの結果はシステム境界の設定によって変わらないため、恣意性の問題はない",E:"LCAはカーボンフットプリントの算定にも活用される"},正解:"D",解説:"LCAの結果はシステム境界の設定に大きく依存する。境界設定の違いにより結論が異なる場合があり、透明性・一貫性の確保が重要。"},
  {id:37,分野:"社会環境管理",形式:"不適切",問題:"SDGsに関する記述のうち、不適切なものはどれか。",選択肢:{A:"SDGsは2015年の国連サミットで採択された17の目標からなる国際目標である",B:"SDGsの達成期限は2030年である",C:"SDGsは途上国のみを対象とした目標であり、先進国には関係ない",D:"SDGs目標12「つくる責任つかう責任」は持続可能な生産・消費形態の確保に関する",E:"企業はSDGsをビジネス戦略に統合し事業活動を通じて貢献することが期待される"},正解:"C",解説:"SDGsは途上国・先進国を問わず全ての国が取り組むべき普遍的な目標として採択されている。"},
  {id:38,分野:"社会環境管理",形式:"不適切",問題:"環境影響評価に関する記述のうち、不適切なものはどれか。",選択肢:{A:"環境影響評価法は一定規模以上の事業について環境アセスメントを義務付けている",B:"スコーピングは環境影響評価の調査・評価項目と手法を絞り込む手続きである",C:"環境影響評価は事業完了後にのみ実施する事後評価が原則である",D:"住民・地方公共団体などの意見を反映する手続きが設けられている",E:"配慮書・方法書・準備書・評価書の手続きがある（第一種事業）"},正解:"C",解説:"環境影響評価は事業着手前の計画段階（事前評価）が原則。早期段階で環境への影響を予測・評価し、回避・低減措置を検討することが目的。"},
  {id:39,分野:"社会環境管理",形式:"適切",問題:"企業と環境に関する記述のうち、適切なものはどれか。",選択肢:{A:"GHGプロトコルのScope3排出量は自社施設内の直接排出のみを対象とする",B:"環境規制への対応コストは必ず企業競争力を低下させる",C:"TCFD提言に基づく気候関連情報開示はガバナンス・戦略・リスク管理・指標と目標の4要素で構成される",D:"カーボンオフセットの購入があれば自社削減努力は不要とされている",E:"RECの購入によりScope1排出量が削減される"},正解:"C",解説:"TCFDの開示推奨項目は①ガバナンス②戦略③リスク管理④指標と目標の4つ。"},
  {id:40,分野:"社会環境管理",形式:"適切",問題:"持続可能な調達に関する記述のうち、適切なものはどれか。",選択肢:{A:"サプライチェーンにおける人権リスクは最終製品の製造工程のみに存在する",B:"紛争鉱物規制はコバルト・リチウムのみを対象としている",C:"サプライヤーの環境・社会基準の審査はグリーン調達の重要な要素である",D:"サプライチェーン全体の環境負荷はScope1の開示のみで十分に把握できる",E:"CSR調達は大企業のみが取り組むべき課題である"},正解:"C",解説:"グリーン調達はサプライヤーの環境管理・有害物質管理・環境負荷低減への取り組みを評価・選定基準に組み込む調達方針。"},
  // 経済性管理（計算10問）
  {id:41,分野:"経済性管理",形式:"計算",問題:"取得原価1800万円、残存価額0円、耐用年数9年の設備を定額法で償却する場合、年間減価償却費はいくらか。",選択肢:{A:"150万円",B:"200万円",C:"225万円",D:"300万円",E:"450万円"},正解:"B",解説:"定額法：（取得原価－残存価額）÷耐用年数＝1800万円÷9年＝200万円/年"},
  {id:42,分野:"経済性管理",形式:"計算",問題:"売上高6000万円、変動費3600万円、固定費1500万円のとき、損益分岐点売上高はいくらか。",選択肢:{A:"3000万円",B:"3750万円",C:"4000万円",D:"4500万円",E:"5000万円"},正解:"B",解説:"限界利益率＝（6000－3600）/6000＝0.4　損益分岐点売上高＝1500÷0.4＝3750万円"},
  {id:43,分野:"経済性管理",形式:"計算",問題:"初期投資3000万円、年間キャッシュフロー500万円の場合、回収期間法による回収期間は何年か。",選択肢:{A:"4年",B:"5年",C:"6年",D:"7年",E:"8年"},正解:"C",解説:"回収期間＝初期投資÷年間CF＝3000÷500＝6年"},
  {id:44,分野:"経済性管理",形式:"計算",問題:"取得原価2000万円、定率法償却率25%の場合、3年目の減価償却費はいくらか。",選択肢:{A:"500万円",B:"375万円",C:"281.25万円",D:"250万円",E:"200万円"},正解:"C",解説:"1年目：2000×0.25＝500万（期末簿価1500）　2年目：1500×0.25＝375万（期末簿価1125）　3年目：1125×0.25＝281.25万円"},
  {id:45,分野:"経済性管理",形式:"計算",問題:"売上高4000万円、変動費率60%のとき、限界利益はいくらか。",選択肢:{A:"1200万円",B:"1600万円",C:"2400万円",D:"2800万円",E:"3200万円"},正解:"B",解説:"限界利益率＝1－0.6＝0.4　限界利益＝4000×0.4＝1600万円"},
  {id:46,分野:"経済性管理",形式:"計算",問題:"限界利益1200万円、営業利益400万円のとき、経営レバレッジ係数（DOL）はいくらか。",選択肢:{A:"2.0",B:"2.5",C:"3.0",D:"3.5",E:"4.0"},正解:"C",解説:"DOL＝限界利益÷営業利益＝1200÷400＝3.0"},
  {id:47,分野:"経済性管理",形式:"計算",問題:"工事直接費5000万円、間接費率20%の場合、総工事費はいくらか。",選択肢:{A:"5200万円",B:"5500万円",C:"6000万円",D:"6500万円",E:"7000万円"},正解:"C",解説:"総工事費＝直接費×（1＋間接費率）＝5000×1.2＝6000万円"},
  {id:48,分野:"経済性管理",形式:"計算",問題:"年間キャッシュフロー240万円、割引率4%の永続年金の現在価値はいくらか。",選択肢:{A:"4800万円",B:"6000万円",C:"8000万円",D:"9600万円",E:"12000万円"},正解:"B",解説:"永続年金の現価＝CF÷r＝240÷0.04＝6000万円"},
  {id:49,分野:"経済性管理",形式:"計算",問題:"販売価格800円、変動費480円、月間固定費96万円のとき、月間損益分岐点販売数量はいくらか。",選択肢:{A:"2000個",B:"2500個",C:"3000個",D:"3500個",E:"4000個"},正解:"C",解説:"限界利益＝800－480＝320円/個　損益分岐点数量＝960000÷320＝3000個"},
  {id:50,分野:"経済性管理",形式:"計算",問題:"取得原価1200万円、残存価額0円、耐用年数6年の設備を定額法で償却する場合、年間減価償却費はいくらか。",選択肢:{A:"150万円",B:"200万円",C:"250万円",D:"300万円",E:"400万円"},正解:"B",解説:"定額法：1200万円÷6年＝200万円/年"},
  // 経済性管理（不適切8問）

function getToday() {
  const d = new Date();
  return `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,"0")}/${String(d.getDate()).padStart(2,"0")}`;
}

function pickQuestions() {
  const picked = [];
  for (const domain of DOMAINS) {
    const pool = QUESTIONS.filter(q => q.分野 === domain);
    picked.push(pool[Math.floor(Math.random() * pool.length)]);
  }
  // shuffle
  for (let i = picked.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [picked[i], picked[j]] = [picked[j], picked[i]];
  }
  return picked;
}

  try {

    return {};

}

              <div style={{ display: "flex", justifyContent: "space-between", marginBottom: 10, fontSize: 13, color: "#7A9BB5" }}>
                <span>問題 {current+1} / {questions.length}</span>
                <span style={{ color: answered ? "#1ABC9C" : "#7A9BB5" }}>{answered ? "✓ 解答済" : "未解答"}</span>
              </div>
              <div style={styles.progressBar}>
                <div style={styles.progressFill((current+1)/questions.length*100)} />
              </div>

              {/* question dots */}
              <div style={{ display: "flex", gap: 8, marginBottom: 20, justifyContent: "center" }}>
                {questions.map((q2, i) => (
                  <button key={i} onClick={() => setCurrent(i)} style={{
                    width: 36, height: 36, borderRadius: "50%", border: "none", cursor: "pointer",
                    background: i === current
                      ? "linear-gradient(135deg, #2E86C1, #1ABC9C)"
                      : answers[q2.id] !== undefined
                        ? (answers[q2.id] === q2.正解 ? "rgba(26,188,156,0.3)" : "rgba(192,0,0,0.3)")
                        : "rgba(255,255,255,0.08)",
                    color: i === current ? "#fff" : "#C8D8E8",
                    fontSize: 13, fontWeight: 700,
                    outline: i === current ? "2px solid #7EB8F0" : "none", outlineOffset: 2,
                  }}>
                    {DOMAIN_COLORS[q2.分野].icon}
                  </button>
                ))}
              </div>

              <div style={styles.questionCard}>
                <div>
                  <span style={styles.domainTag(q.分野)}>{dc.icon} {q.分野}</span>
                  <span style={styles.formTag(q.形式)}>{q.形式}</span>
                </div>
                <div style={styles.questionText}>{q.問題}</div>
                <div style={styles.choiceList}>
                  {Object.entries(q.選択肢).map(([key, text]) => {
                    const selected = answers[q.id] === key;
                    return (
                      <div key={key}
                        style={styles.choiceItem(selected, key===q.正解, answered, key, q)}
                        onClick={() => !answered && selectAnswer(q.id, key)}>
                        <div style={styles.choiceKey(selected, key===q.正解, answered, key, q)}>{KEY_MAP[key]}</div>
                        <div style={{ fontSize: 14, lineHeight: 1.65 }}>{text}</div>
                      </div>
                    );
                  })}
                </div>
                {answered && (
                  <div style={styles.explanationBox}>
                    <strong style={{ color: "#1ABC9C" }}>
                      {answers[q.id] === q.正解 ? "✓ 正解！" : `✗ 不正解（正解：${KEY_MAP[q.正解]}）`}
                    </strong>
                    <div style={{ marginTop: 6 }}>{q.解説}</div>
                  </div>
                )}
              </div>

              <div style={styles.actionRow}>
                {current > 0 && <button style={{ ...styles.primaryBtn(false), background: "rgba(255,255,255,0.1)", color: "#C8D8E8" }} onClick={() => setCurrent(c => c-1)}>← 前へ</button>}
                {current < questions.length-1 && (
                  <button style={styles.primaryBtn(false)} onClick={() => setCurrent(c => c+1)}>次へ →</button>
                )}
                {current === questions.length-1 && allAnswered && (
                  <button style={styles.primaryBtn(false)} onClick={submitQuiz}>採点する 🎯</button>
                )}
              </div>
            </div>
          );
        })()}

        {/* RESULT */}
        {screen === "result" && (
          <div>
            <div style={styles.scoreCard}>
              <div style={{ fontSize: 13, color: "#7A9BB5", marginBottom: 8, letterSpacing: "0.1em" }}>TODAY'S SCORE</div>
              <div style={styles.scoreNum}>{score}<span style={{ fontSize: 32, WebkitTextFillColor: "#7A9BB5" }}>/5</span></div>
              <div style={{ fontSize: 16, marginTop: 12, color: score >= 4 ? "#1ABC9C" : score >= 3 ? "#F7DC6F" : "#E74C3C", fontWeight: 700 }}>
                {score === 5 ? "🎉 全問正解！完璧です！" : score >= 4 ? "🌟 よくできました！" : score >= 3 ? "📚 あと少し！復習しましょう" : "💪 もう一度チャレンジ！"}
              </div>
            </div>

            {questions.map((q, i) => {
              const ok = answers[q.id] === q.正解;
              const dc = DOMAIN_COLORS[q.分野];
              const h = history[q.id];
              const open = expandedResult === q.id;
              return (
                <div key={q.id} style={{
                  background: ok ? "rgba(26,188,156,0.06)" : "rgba(192,0,0,0.06)",
                  border: `1px solid ${ok ? "rgba(26,188,156,0.3)" : "rgba(192,0,0,0.3)"}`,
                  borderRadius: 16, padding: "16px 20px", marginBottom: 12,
                }}>
                  <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                    <div style={{ display: "flex", gap: 8, alignItems: "center" }}>
                      <span style={{ fontSize: 20 }}>{ok ? "✅" : "❌"}</span>
                      <span style={styles.domainTag(q.分野)}>{dc.icon} {q.分野}</span>
                      <span style={styles.formTag(q.形式)}>{q.形式}</span>
                    </div>
                    <div style={{ display: "flex", gap: 12, alignItems: "center", fontSize: 12, color: "#7A9BB5" }}>
                      {h && <span>📅 {h.dates[h.dates.length-1]} | {h.count}回解答 | 正答率{Math.round(h.correct/h.count*100)}%</span>}
                      <button onClick={() => setExpandedResult(open ? null : q.id)} style={{
                        background: "none", border: "1px solid rgba(255,255,255,0.15)", borderRadius: 8,
                        color: "#7A9BB5", fontSize: 11, padding: "3px 10px", cursor: "pointer",
                      }}>{open ? "閉じる" : "詳細"}</button>
                    </div>
                  </div>
                  <div style={{ fontSize: 13, color: "#C8D8E8", marginTop: 10, lineHeight: 1.6 }}>{q.問題}</div>
                  {open && (
                    <div style={{ marginTop: 12, borderTop: "1px solid rgba(255,255,255,0.08)", paddingTop: 12 }}>
                      {Object.entries(q.選択肢).map(([key, text]) => (
                        <div key={key} style={{
                          padding: "7px 12px", marginBottom: 6, borderRadius: 8, fontSize: 13,
                          background: key === q.正解 ? "rgba(26,188,156,0.15)" : key === answers[q.id] && !ok ? "rgba(192,0,0,0.12)" : "rgba(255,255,255,0.04)",
                          color: key === q.正解 ? "#A8E6CF" : key === answers[q.id] && !ok ? "#FFB3B3" : "#7A9BB5",
                          border: key === q.正解 ? "1px solid rgba(26,188,156,0.3)" : "1px solid transparent",
                        }}>
                          <strong>{KEY_MAP[key]}</strong> {text}
                          {key === q.正解 && <span style={{ marginLeft: 8, fontSize: 11, color: "#1ABC9C" }}>← 正解（{KEY_MAP[key]}）</span>}
                          {key === answers[q.id] && key !== q.正解 && <span style={{ marginLeft: 8, fontSize: 11, color: "#E74C3C" }}>← あなたの解答（{KEY_MAP[key]}）</span>}
                        </div>
                      ))}
                      <div style={styles.explanationBox}>{q.解説}</div>
                    </div>
                  )}
                </div>
              );
            })}

            <div style={{ display: "flex", gap: 12, marginTop: 24 }}>
              <button style={{ ...styles.primaryBtn(false), flex: 1 }} onClick={startQuiz}>もう一度 🔄</button>
              <button style={{ ...styles.primaryBtn(false), flex: 1, background: "rgba(255,255,255,0.1)", color: "#C8D8E8" }}
                onClick={() => setScreen("history")}>履歴を見る 📋</button>
            </div>
          </div>
        )}

        {/* HISTORY */}
        {screen === "history" && (
          <div>
            <div style={{ marginBottom: 20, fontSize: 13, color: "#7A9BB5" }}>
              解答済み問題：{Object.keys(history).length}/{QUESTIONS.length}問
            </div>
            {Object.keys(history).length === 0 ? (
              <div style={{ textAlign: "center", color: "#4A6070", padding: 48, fontSize: 15 }}>
                まだ解答履歴がありません。<br/>ホームから問題を始めてください。
              </div>
            ) : DOMAINS.map(domain => {
              const domainQs = QUESTIONS.filter(q => q.分野 === domain && history[q.id]);
              if (domainQs.length === 0) return null;
              const dc = DOMAIN_COLORS[domain];
              return (
                <div key={domain} style={{ marginBottom: 28 }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 12 }}>
                    <span style={{ fontSize: 18 }}>{dc.icon}</span>
                    <span style={{ fontWeight: 800, color: dc.accent, fontSize: 15 }}>{domain}</span>
                    <span style={{ fontSize: 12, color: "#7A9BB5" }}>（{domainQs.length}問）</span>
                  </div>
                  {domainQs.map(q => {
                    const h = history[q.id];
                    const rate = Math.round(h.correct / h.count * 100);
                    return (
                      <div key={q.id} style={styles.histCard}>
                        <div style={{ flex: 1, marginRight: 12 }}>
                          <div style={{ fontSize: 12, color: dc.accent, fontWeight: 700, marginBottom: 4 }}>{q.形式}</div>
                          <div style={{ fontSize: 13, color: "#C8D8E8", lineHeight: 1.5 }}>{q.問題.slice(0, 50)}…</div>
                        </div>
                        <div style={{ textAlign: "right", flexShrink: 0 }}>
                          <div style={{ fontSize: 18, fontWeight: 800, color: rate >= 70 ? "#1ABC9C" : rate >= 50 ? "#F7DC6F" : "#E74C3C" }}>{rate}%</div>
                          <div style={{ fontSize: 11, color: "#7A9BB5" }}>{h.count}回</div>
                          <div style={{ fontSize: 10, color: "#4A6070", marginTop: 2 }}>{h.dates[h.dates.length-1]}</div>
                        </div>
                      </div>
                    );
                  })}
                </div>
              );
            })}
          </div>
        )}
      </div>
    </div>
  );
}


    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
