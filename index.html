<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>総監択一 1日5問マスター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; --success: #10B981; --error: #EF4444; --text: #F1F5F9; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
    #root { width: 100%; max-width: 600px; padding: 15px; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; }
    .badge { background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
    .q-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; line-height: 1.6; }
    .btn-list { display: grid; gap: 10px; }
    .opt-btn { background: #334155; border: 2px solid #475569; color: white; padding: 16px; border-radius: 12px; text-align: left; cursor: pointer; font-size: 0.95rem; }
    .opt-btn.correct { background: var(--success) !important; border-color: #6EE7B7; }
    .opt-btn.wrong { background: var(--error) !important; border-color: #FCA5A5; }
    .exp { margin-top: 15px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); border-radius: 4px; font-size: 0.9rem; }
    .nav-btn { background: var(--accent); color: var(--bg); border: none; padding: 12px 20px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    .menu-btn { background: #334155; color: white; border: 1px solid var(--accent); padding: 20px; border-radius: 12px; margin-bottom: 10px; width: 100%; cursor: pointer; text-align: center; font-weight: bold; }
    .progress { height: 6px; background: #334155; border-radius: 3px; margin: 10px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.3s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    // 問題データ（過去問・キーワード集分析に基づく100問の抜粋・構成）
    const ALL_QUESTIONS = [
      { id: 1, cat: "経済性管理", q: "財務諸表における投資活動によるキャッシュ・フローに分類されるものはどれか。", opts: ["配当金の支払い", "税金の支払い", "生産用資産の取得支出", "社債の償還支出", "商品の仕入れ代金"], ans: 2, exp: "投資活動CFは固定資産の取得等。配当・社債は財務、税金・仕入は営業活動です。(R6)" },
      { id: 2, cat: "安全管理", q: "「事業継続ガイドライン(R5.3)」において、目標復旧時間(RTO)の設定として適切なものは？", opts: ["許容限界より長く設定する", "許容限界より短く設定する", "重要業務以外を優先する", "サプライチェーンは考慮しない", "復旧水準は常に100%とする"], ans: 1, exp: "RTOは破綻する限界（許容限界）より早く復旧するように設定します。(R7)" },
      { id: 3, cat: "人的資源管理", q: "メンター制度の運用として不適切なものはどれか。", opts: ["経営幹部の協力が必要", "直属のライン外が望ましい", "メンティのみが研修を受ける", "就業時間内に行う", "目的設定が重要"], ans: 2, exp: "研修はメンターとメンティ双方に行うのが標準的です。(R7)" },
      { id: 4, cat: "情報管理", q: "生成AI利用のガイドライン策定において、最も優先すべきリスク対策は？", opts: ["利用の全面禁止", "機密情報の入力制限", "AI回答の無修正利用", "著作権の無視", "有料版の強制利用"], ans: 1, exp: "入力データが学習に利用され、情報漏洩するリスクを防ぐことが最優先です。" },
      { id: 5, cat: "社会環境管理", q: "拡大生産者責任(EPR)の説明として適切なものは？", opts: ["政府が廃棄費用を全負担する", "生産者が廃棄段階まで責任を負う", "消費者がリサイクルを拒否する", "海外への廃棄物輸出を推奨する", "環境規制を撤廃する"], ans: 1, exp: "生産者が設計から廃棄まで責任を持つことで環境配慮を促します。" },
      // ...（本来ここに100問分入ります。スペース上5問を代表で表示）
    ];

    function App() {
      const [view, setView] = useState('menu'); // menu, quiz, result
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [wrongIds, setWrongIds] = useState(JSON.parse(localStorage.getItem('wrongIds') || '[]'));
      const [stats, setStats] = useState(JSON.parse(localStorage.getItem('stats') || '{"total":0, "days":{}}'));

      const startDaily = () => {
        const cats = ["経済性管理", "人的資源管理", "情報管理", "安全管理", "社会環境管理"];
        const daily = cats.map(c => {
          const pool = ALL_QUESTIONS.filter(q => q.cat === c);
          return pool[Math.floor(Math.random() * pool.pool.length)] || ALL_QUESTIONS[0];
        });
        setupQuiz(daily);
      };

      const startReview = () => {
        const reviewPool = ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
        if (reviewPool.length === 0) return alert("間違えた問題はありません！");
        setupQuiz(reviewPool.sort(() => Math.random() - 0.5).slice(0, 10));
      };

      const setupQuiz = (qs) => {
        setCurrentQuestions(qs);
        setIdx(0); setScore(0); setSelected(null); setView('quiz');
      };

      const handleAnswer = (i) => {
        if (selected !== null) return;
        const q = currentQuestions[idx];
        setSelected(i);
        if (i === q.ans) {
          setScore(s => s + 1);
          setWrongIds(prev => prev.filter(id => id !== q.id));
        } else {
          if (!wrongIds.includes(q.id)) setWrongIds(prev => [...prev, q.id]);
        }
      };

      useEffect(() => {
        localStorage.setItem('wrongIds', JSON.stringify(wrongIds));
      }, [wrongIds]);

      const next = () => {
        if (idx < currentQuestions.length - 1) {
          setIdx(idx + 1); setSelected(null);
        } else {
          const today = new Date().toLocaleDateString();
          const newStats = {...stats, total: stats.total + currentQuestions.length};
          newStats.days[today] = (newStats.days[today] || 0) + currentQuestions.length;
          setStats(newStats);
          localStorage.setItem('stats', JSON.stringify(newStats));
          setView('result');
        }
      };

      if (view === 'menu') return (
        <div style={{paddingTop: 40}}>
          <h1 style={{textAlign:'center', marginBottom:30}}>総監択一トレーニング</h1>
          <button className="menu-btn" onClick={startDaily}>📅 今日の5問 (各分野1問)</button>
          <button className="menu-btn" onClick={startReview} style={{borderColor: 'var(--error)'}}>🔥 苦手克服 (間違えた問題: {wrongIds.length}問)</button>
          <div className="card" style={{marginTop:20, fontSize:'0.9rem', color: 'var(--accent)'}}>
            累計解答数: {stats.total} 問<br/>
            今日解いた数: {stats.days[new Date().toLocaleDateString()] || 0} 問
          </div>
        </div>
      );

      if (view === 'result') return (
        <div className="card" style={{textAlign:'center', marginTop:50}}>
          <h2>結果発表</h2>
          <div style={{fontSize:'3rem', margin:'20px 0'}}>{score} / {currentQuestions.length}</div>
          <button className="nav-btn" onClick={() => setView('menu')}>メニューに戻る</button>
        </div>
      );

      const q = currentQuestions[idx];
      return (
        <div>
          <div className="progress"><div className="progress-fill" style={{width: `${(idx/currentQuestions.length)*100}%`}}></div></div>
          <div className="card">
            <span className="badge">{q.cat}</span>
            <div className="q-text">{q.q}</div>
            <div className="btn-list">
              {q.opts.map((o, i) => (
                <button key={i} className={`opt-btn ${selected !== null ? (i === q.ans ? 'correct' : (i === selected ? 'wrong' : '')) : ''}`} onClick={() => handleAnswer(i)}>
                  {i+1}. {o}
                </button>
              ))}
            </div>
            {selected !== null && (
              <div className="exp">
                <strong>{selected === q.ans ? "◯ 正解" : "× 不正解"}</strong><br/>{q.exp}
                <button className="nav-btn" onClick={next}>次へ</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
