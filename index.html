<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>総監択一 1日5問マスター</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root { --bg: #0F172A; --card: #1E293B; --accent: #38BDF8; --success: #10B981; --error: #EF4444; --text: #F1F5F9; }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Noto Sans JP', sans-serif; background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; }
    #root { width: 100%; max-width: 600px; padding: 15px; }
    .card { background: var(--card); border-radius: 16px; padding: 20px; box-shadow: 0 10px 20px rgba(0,0,0,0.3); margin-bottom: 20px; border: 1px solid #334155; }
    .badge { background: var(--accent); color: var(--bg); padding: 4px 10px; border-radius: 6px; font-weight: bold; font-size: 0.75rem; margin-bottom: 10px; display: inline-block; }
    .q-text { font-size: 1.1rem; font-weight: 700; margin-bottom: 20px; line-height: 1.6; color: #fff; }
    .btn-list { display: grid; gap: 10px; }
    .opt-btn { background: #334155; border: 2px solid #475569; color: white; padding: 16px; border-radius: 12px; text-align: left; cursor: pointer; font-size: 0.95rem; transition: 0.2s; }
    .opt-btn.correct { background: var(--success) !important; border-color: #6EE7B7; }
    .opt-btn.wrong { background: var(--error) !important; border-color: #FCA5A5; }
    .exp { margin-top: 15px; padding: 15px; background: rgba(56, 189, 248, 0.1); border-left: 4px solid var(--accent); border-radius: 4px; font-size: 0.9rem; }
    .nav-btn { background: var(--accent); color: var(--bg); border: none; padding: 14px; border-radius: 8px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
    .menu-btn { background: #334155; color: white; border: 1px solid var(--accent); padding: 22px; border-radius: 12px; margin-bottom: 12px; width: 100%; cursor: pointer; text-align: center; font-weight: bold; font-size: 1rem; transition: 0.2s; }
    .menu-btn:active { transform: scale(0.98); background: #475569; }
    .progress { height: 8px; background: #334155; border-radius: 4px; margin: 15px 0; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); transition: width 0.4s; }
  </style>
</head>
<body>
  <div id="root"></div>
  <script type="text/babel">
    const { useState, useEffect } = React;

    const ALL_QUESTIONS = [
      { id: 1, cat: "経済性管理", q: "財務諸表における『投資活動によるキャッシュ・フロー』に分類されるものはどれか。", opts: ["配当金の支払い", "法人税等の支払い", "生産用資産（設備等）の取得による支出", "社債の償還による支出", "商品の仕入れに伴う支出"], ans: 2, exp: "投資活動CFは固定資産の取得・売却等。配当・社債は財務活動、税金・仕入は営業活動です。(R6過去問)" },
      { id: 2, cat: "安全管理", q: "『事業継続ガイドライン(R5.3)』における目標復旧時間(RTO)の設定として適切なものは？", opts: ["許容限界より長く設定する", "許容限界より短く設定する", "重要業務以外を優先復旧させる", "サプライチェーンは検討範囲外とする", "復旧水準は常に100%とする"], ans: 1, exp: "RTOはビジネスが破綻する限界（許容限界）より早く復旧するように設定します。(R7過去問)" },
      { id: 3, cat: "人的資源管理", q: "企業が導入するメンター制度において、最も不適切なものはどれか。", opts: ["経営幹部の理解と協力が重要である", "メンターとメンティは直属のライン外が望ましい", "事前研修はメンティのみを対象に行う", "メンタリングは原則として就業時間内に行う", "課題整理と目的の設定が重要である"], ans: 2, exp: "事前研修はメンターとメンティの「双方」が対象です。(R7過去問)" },
      { id: 4, cat: "情報管理", q: "生成AIを業務利用する際の情報管理上の対応として、最も適切なものは？", opts: ["機密情報の入力制限に関するガイドラインを策定する", "出力された回答は検証せずにそのまま成果物とする", "個人情報の入力を推奨してパーソナライズする", "著作権法に抵触してもAIの回答なので免責されると判断する", "業務効率化のため、あらゆる社外秘情報を入力する"], ans: 0, exp: "入力データが学習に利用され、外部に漏洩するリスクを防ぐガイドラインが必要です。" },
      { id: 5, cat: "社会環境管理", q: "拡大生産者責任(EPR)に関する記述として、最も適切なものはどれか。", opts: ["生産者が廃棄物のリサイクル費用を一切負担しない原則", "生産者が製品の廃棄・リサイクル段階まで責任を負う概念", "消費者がすべての環境負荷責任を負うとする原則", "公害対策費用を政府が全額補助する仕組み", "環境規制を撤廃し自由競争を促すための手法"], ans: 1, exp: "生産者が廃棄段階まで責任を負うことで、設計段階からの環境配慮を促します。" }
      // ※実際にはここに他の問題も追加可能
    ];

    function App() {
      const [view, setView] = useState('menu');
      const [currentQuestions, setCurrentQuestions] = useState([]);
      const [idx, setIdx] = useState(0);
      const [selected, setSelected] = useState(null);
      const [score, setScore] = useState(0);
      const [wrongIds, setWrongIds] = useState(() => JSON.parse(localStorage.getItem('wrongIds') || '[]'));
      const [stats, setStats] = useState(() => JSON.parse(localStorage.getItem('stats') || '{"total":0, "days":{}}'));

      const startDaily = () => {
        const cats = ["経済性管理", "人的資源管理", "情報管理", "安全管理", "社会環境管理"];
        const selectedQs = cats.map(c => {
          const pool = ALL_QUESTIONS.filter(q => q.cat === c);
          return pool[Math.floor(Math.random() * pool.length)];
        }).filter(q => q !== undefined); // 未定義を除外

        if (selectedQs.length > 0) {
          setCurrentQuestions(selectedQs);
          setIdx(0); setScore(0); setSelected(null); setView('quiz');
        } else {
          alert("問題データの読み込みに失敗しました。");
        }
      };

      const startReview = () => {
        const reviewPool = ALL_QUESTIONS.filter(q => wrongIds.includes(q.id));
        if (reviewPool.length === 0) {
          alert("現在、間違えた問題（復習対象）はありません！");
          return;
        }
        setCurrentQuestions(reviewPool.sort(() => Math.random() - 0.5).slice(0, 10));
        setIdx(0); setScore(0); setSelected(null); setView('quiz');
      };

      const handleAnswer = (i) => {
        if (selected !== null) return;
        const q = currentQuestions[idx];
        setSelected(i);
        if (i === q.ans) {
          setScore(s => s + 1);
          setWrongIds(prev => {
            const next = prev.filter(id => id !== q.id);
            localStorage.setItem('wrongIds', JSON.stringify(next));
            return next;
          });
        } else {
          setWrongIds(prev => {
            if (prev.includes(q.id)) return prev;
            const next = [...prev, q.id];
            localStorage.setItem('wrongIds', JSON.stringify(next));
            return next;
          });
        }
      };

      const next = () => {
        if (idx < currentQuestions.length - 1) {
          setIdx(idx + 1); setSelected(null);
        } else {
          const today = new Date().toLocaleDateString();
          const newStats = {...stats, total: stats.total + currentQuestions.length};
          newStats.days[today] = (newStats.days[today] || 0) + currentQuestions.length;
          setStats(newStats);
          localStorage.setItem('stats', JSON.stringify(newStats));
          setView('result');
        }
      };

      if (view === 'menu') return (
        <div style={{paddingTop: 40}}>
          <h1 style={{textAlign:'center', marginBottom:10, fontSize:'1.5rem'}}>総監 1日5問マスター</h1>
          <p style={{textAlign:'center', color:'var(--accent)', marginBottom:30, fontSize:'0.9rem'}}>最新過去問・キーワード分析版</p>
          <button className="menu-btn" onClick={startDaily}>📅 今日の5問を開始</button>
          <button className="menu-btn" onClick={startReview} style={{borderColor: 'var(--error)'}}>🔥 苦手克服 ({wrongIds.length}問)</button>
          <div className="card" style={{marginTop:20, textAlign:'center'}}>
            <div style={{color: 'var(--accent)', fontSize:'0.8rem'}}>学習記録</div>
            <div style={{fontSize:'1.2rem', fontWeight:'bold', marginTop:5}}>累計解答: {stats.total} 問</div>
          </div>
        </div>
      );

      if (view === 'result') return (
        <div className="card" style={{textAlign:'center', marginTop:50, padding:'40px 20px'}}>
          <h2 style={{color: 'var(--accent)'}}>お疲れ様でした！</h2>
          <div style={{fontSize:'3.5rem', fontWeight:900, margin:'20px 0'}}>{score} / {currentQuestions.length}</div>
          <p style={{marginBottom:30}}>正答率: {Math.round(score/currentQuestions.length*100)}%</p>
          <button className="nav-btn" onClick={() => setView('menu')}>メニューに戻る</button>
        </div>
      );

      const q = currentQuestions[idx];
      return (
        <div>
          <div style={{display:'flex', justifyContent:'space-between', fontSize:'0.8rem', marginBottom:5}}>
            <span>{q.cat}</span>
            <span>{idx + 1} / {currentQuestions.length}</span>
          </div>
          <div className="progress"><div className="progress-fill" style={{width: `${((idx + (selected !== null ? 1 : 0))/currentQuestions.length)*100}%`}}></div></div>
          <div className="card">
            <div className="badge">{q.cat}</div>
            <div className="q-text">{q.q}</div>
            <div className="btn-list">
              {q.opts.map((o, i) => (
                <button key={i} className={`opt-btn ${selected !== null ? (i === q.ans ? 'correct' : (i === selected ? 'wrong' : '')) : ''}`} onClick={() => handleAnswer(i)}>
                  {i+1}. {o}
                </button>
              ))}
            </div>
            {selected !== null && (
              <div className="exp">
                <div style={{fontWeight:'bold', color: selected === q.ans ? 'var(--success)' : 'var(--error)', marginBottom:8}}>
                  {selected === q.ans ? "◯ 正解！" : `× 不正解（正解は ${q.ans + 1}）`}
                </div>
                {q.exp}
                <button className="nav-btn" onClick={next}>{idx === currentQuestions.length - 1 ? "結果を見る" : "次の問題へ"}</button>
              </div>
            )}
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
