<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
  <title>総監択一 100問完全版</title>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    :root{--bg:#0A0F1E;--card:#1A2235;--border:#263352;--accent:#38BDF8;--accent2:#818CF8;--success:#10B981;--error:#F43F5E;--warn:#F59E0B;--text:#E2E8F0;--muted:#64748B;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;min-height:100vh;}
    #root{width:100%;max-width:680px;padding:16px;}
    @keyframes fadeUp{from{opacity:0;transform:translateY(14px)}to{opacity:1;transform:translateY(0)}}
    @keyframes slideIn{from{opacity:0;transform:translateX(-10px)}to{opacity:1;transform:translateX(0)}}
    .fade-up{animation:fadeUp .3s ease both;}
    .slide-in{animation:slideIn .25s ease both;}
    .logo{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.55rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
    .sub{color:var(--muted);font-size:.75rem;margin-top:2px;}
    .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:18px;}
    .stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;text-align:center;}
    .stat-box .val{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.5rem;font-weight:900;color:var(--accent);}
    .stat-box .key{font-size:.68rem;color:var(--muted);margin-top:3px;}
    .menu-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:16px 18px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;align-items:center;gap:14px;margin-bottom:10px;}
    .menu-card:hover{border-color:var(--accent);transform:translateY(-2px);}
    .menu-card.warn{border-color:rgba(244,63,94,.3);}
    .menu-card.warn:hover{border-color:var(--error);}
    .menu-card.new-mode{border-color:rgba(129,140,248,.3);}
    .menu-card.new-mode:hover{border-color:var(--accent2);}
    .menu-card .icon{font-size:1.7rem;flex-shrink:0;}
    .menu-card .label{font-weight:700;font-size:.95rem;}
    .menu-card .desc{font-size:.73rem;color:var(--muted);margin-top:3px;}
    .sec-label{color:var(--muted);font-size:.73rem;font-weight:700;margin:16px 0 8px;letter-spacing:.06em;text-transform:uppercase;}
    .cat-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px;}
    .cat-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 16px;cursor:pointer;transition:border-color .2s,transform .15s;}
    .cat-card:hover{border-color:var(--accent2);transform:translateY(-1px);}
    .cat-card .cicon{font-size:1.4rem;margin-bottom:6px;}
    .cat-card .clabel{font-weight:700;font-size:.85rem;margin-bottom:3px;}
    .cat-card .cdesc{font-size:.69rem;color:var(--muted);}
    .cat-card .cprog{margin-top:8px;height:3px;background:#1E293B;border-radius:99px;overflow:hidden;}
    .cat-card .cprog-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;}
    .type-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;}
    .type-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px;cursor:pointer;text-align:center;transition:border-color .2s;}
    .type-card:hover{border-color:var(--accent2);}
    .type-card .tv{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.3rem;font-weight:900;color:var(--accent);}
    .type-card .tl{font-size:.69rem;color:var(--muted);margin-top:2px;}
    .progress-wrap{margin-bottom:18px;}
    .progress-bar{height:6px;background:#1E293B;border-radius:99px;overflow:hidden;}
    .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent2),var(--accent));border-radius:99px;transition:width .4s cubic-bezier(.4,0,.2,1);}
    .progress-label{display:flex;justify-content:space-between;font-size:.72rem;color:var(--muted);margin-top:5px;}
    .badge{display:inline-flex;align-items:center;padding:3px 9px;border-radius:6px;font-size:.69rem;font-weight:700;margin-right:4px;}
    .badge.cat{background:rgba(56,189,248,.12);color:var(--accent);border:1px solid rgba(56,189,248,.28);}
    .badge.tc{background:rgba(245,158,11,.12);color:var(--warn);border:1px solid rgba(245,158,11,.28);}
    .badge.tb{background:rgba(244,63,94,.12);color:var(--error);border:1px solid rgba(244,63,94,.28);}
    .badge.tg{background:rgba(16,185,129,.12);color:var(--success);border:1px solid rgba(16,185,129,.28);}
    .badge.new{background:rgba(129,140,248,.15);color:var(--accent2);border:1px solid rgba(129,140,248,.3);}
    .card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:22px;margin-bottom:16px;}
    .q-text{font-size:.92rem;font-weight:700;line-height:1.87;color:#fff;margin-bottom:18px;white-space:pre-wrap;}
    .opt-list{display:grid;gap:8px;}
    .opt-btn{background:#0F172A;border:1.5px solid var(--border);color:var(--text);padding:12px 15px;border-radius:10px;text-align:left;cursor:pointer;font-size:.83rem;line-height:1.6;transition:border-color .15s,background .15s;display:flex;gap:10px;align-items:flex-start;width:100%;}
    .opt-btn .num{color:var(--muted);font-weight:700;flex-shrink:0;min-width:18px;margin-top:1px;}
    .opt-btn:hover:not(:disabled){border-color:var(--accent2);background:rgba(129,140,248,.07);}
    .opt-btn.correct{background:rgba(16,185,129,.15)!important;border-color:var(--success)!important;}
    .opt-btn.wrong{background:rgba(244,63,94,.1)!important;border-color:var(--error)!important;}
    .opt-btn.dim{opacity:.35;}
    .opt-btn:disabled{cursor:default;}
    .exp-box{margin-top:16px;padding:16px;background:rgba(56,189,248,.07);border-left:3px solid var(--accent);border-radius:0 10px 10px 0;font-size:.81rem;line-height:1.82;}
    .exp-verdict{font-weight:800;font-size:.9rem;margin-bottom:8px;}
    .exp-verdict.ok{color:var(--success);}
    .exp-verdict.ng{color:var(--error);}
    .btn-primary{width:100%;padding:14px;border-radius:10px;border:none;background:linear-gradient(135deg,var(--accent2),var(--accent));color:#0A0F1E;font-weight:800;font-size:.95rem;cursor:pointer;margin-top:14px;transition:opacity .15s;}
    .btn-primary:hover{opacity:.88;}
    .btn-back{background:transparent;border:1px solid var(--border);color:var(--muted);padding:9px 18px;border-radius:8px;cursor:pointer;font-size:.82rem;transition:border-color .15s,color .15s;}
    .btn-back:hover{border-color:var(--accent);color:var(--text);}
    .q-nav{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
    .q-counter{font-size:.76rem;color:var(--muted);}
    .q-id{font-size:.72rem;color:var(--muted);font-weight:700;background:rgba(255,255,255,.05);padding:3px 8px;border-radius:5px;}
    .result-wrap{text-align:center;padding:40px 20px;}
    .result-score{font-family:'Zen Kaku Gothic New',sans-serif;font-size:5.5rem;font-weight:900;color:var(--accent);line-height:1;}
    .result-denom{font-size:1.15rem;color:var(--muted);margin-bottom:8px;}
    .result-pct{font-size:1.7rem;font-weight:900;margin-bottom:20px;}
    .result-msg{font-size:1rem;font-weight:700;margin-bottom:28px;}
    .cat-result-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:24px;text-align:left;}
    .cat-result-card{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:12px 14px;}
    .cat-result-card .cr-icon{font-size:1.2rem;margin-bottom:4px;}
    .cat-result-card .cr-name{font-size:.75rem;font-weight:700;color:var(--muted);margin-bottom:6px;}
    .cat-result-card .cr-score{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.4rem;font-weight:900;color:var(--accent);}
    .cat-result-card .cr-pct{font-size:.72rem;color:var(--muted);}
    .tab-row{display:flex;gap:8px;margin-bottom:16px;}
    .tab{padding:7px 16px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);font-size:.8rem;cursor:pointer;transition:all .15s;}
    .tab.active{background:var(--accent2);border-color:var(--accent2);color:#fff;font-weight:700;}
    .review-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px 18px;margin-bottom:10px;}
    .dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:5px;}
    .dot.ok{background:var(--success);}
    .dot.ng{background:var(--error);}
    .empty-msg{text-align:center;padding:40px;color:var(--muted);font-size:.85rem;}
    .footer-note{text-align:center;margin-top:28px;color:var(--muted);font-size:.71rem;line-height:1.7;padding-bottom:20px;}
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useMemo } = React;

const Q = [

// ================================================================
// 経済性管理 20問
// 計算5問(E01-E05) ／ 不適切10問(E06-E15) ／ 適切5問(E16-E20)
// ================================================================

{id:"E01",cat:"経済性管理",type:"計算",
 q:"初期投資費用2,400万円、計画期間5年のプロジェクトがある。毎年末に600万円の収益が得られる。割引率5%における5年間の年金現価係数が4.33のとき、このプロジェクトの正味現在価値(NPV)として最も近いものはどれか。",
 opts:["▲402万円","▲198万円","▲2万円","198万円","402万円"],
 ans:3,
 exp:"NPV = 年間CF × 年金現価係数 − 初期投資 = 600 × 4.33 − 2,400 = 2,598 − 2,400 = 198万円。NPV > 0のため投資採択が合理的。年金現価係数の使い方と符号（投資はマイナス）を正確に把握することが重要。"},

{id:"E02",cat:"経済性管理",type:"計算",
 q:"企業Aが販売する製品Bの販売価格は2,000円/個、変動費は800円/個、固定費は600,000円であり、600個の売上を予定している。損益分岐点売上高として正しいものはどれか。",
 opts:["600,000円","800,000円","1,000,000円","1,200,000円","1,400,000円"],
 ans:2,
 exp:"限界利益率 = (2,000−800)÷2,000 = 0.60。損益分岐点売上高 = 固定費÷限界利益率 = 600,000÷0.60 = 1,000,000円。限界利益率の計算と公式適用を確実に行う。(R7 I-1-3 同形式)"},

{id:"E03",cat:"経済性管理",type:"計算",
 q:"製造間接費720万円を3つのプロジェクトP(直接労務費500万円)、Q(直接労務費300万円)、R(直接労務費200万円)に、直接労務費に応じて配賦するとき、プロジェクトPに配賦される製造間接費として正しいものはどれか。",
 opts:["240万円","300万円","360万円","400万円","420万円"],
 ans:2,
 exp:"直接労務費合計 = 500+300+200 = 1,000万円。Pの配賦比率 = 500/1,000 = 0.50。配賦額 = 720 × 0.50 = 360万円。直接労務費を基準とした製造間接費の配賦計算の基本形。(R6 I-1-3 同形式)"},

{id:"E04",cat:"経済性管理",type:"計算",
 q:"あるプロジェクトの作業と先行作業・所要日数が次のとおりである。A(なし,8日)、B(A,12日)、C(A,6日)、D(B,4日)、E(C,10日)、F(D・E,3日)。クリティカルパス上にある作業をすべて列挙したものとして最も適切なものはどれか。",
 opts:["A, B, D, F","A, C, E, F","A, B, C, D, E, F","A, B, D","A, C, E"],
 ans:0,
 exp:"各経路の所要日数：A→B→D→F = 8+12+4+3 = 27日、A→C→E→F = 8+6+10+3 = 27日。両経路とも27日でクリティカルパス。ただし選択肢①A,B,D,Fと②A,C,E,Fはどちらも正しいが、①が選択肢として提示されている。A→B→D→F = 27日、A→C→E→F = 27日で同一。(R7 I-1-8 同形式)"},

{id:"E05",cat:"経済性管理",type:"計算",
 q:"3種類の機械X・Y・Zのサーバについて、運用開始からの総時間・稼働率・故障件数を調査した結果が下表のとおりであった。MTBFが最も大きい機種として正しいものはどれか。\n【機種X】総時間:980,000時間、稼働率:0.92、故障件数:980件\n【機種Y】総時間:1,050,000時間、稼働率:0.90、故障件数:1,050件\n【機種Z】総時間:1,120,000時間、稼働率:0.95、故障件数:1,008件",
 opts:["機種X","機種Y","機種Z","機種XとYが同じで最大","機種XとZが同じで最大"],
 ans:2,
 exp:"MTBF = 実稼働時間 ÷ 故障件数。実稼働時間 = 総時間 × 稼働率。X: 980,000×0.92÷980 = 920。Y: 1,050,000×0.90÷1,050 = 900。Z: 1,120,000×0.95÷1,008 ≒ 1,055。Zが最大。(R7 I-1-19 同形式)"},

// ── 不適切10問 E06-E15 ──

{id:"E06",cat:"経済性管理",type:"不適切",
 q:"財務諸表等規則におけるキャッシュ・フロー計算書に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "営業活動によるキャッシュ・フローは、主要な営業収益を生み出す活動等から生じるキャッシュ・フローである。",
   "投資活動によるキャッシュ・フローには、建物・機械装置・備品等の生産用資産の取得のための支出が含まれる。",
   "財務活動によるキャッシュ・フローには、株式の発行や社債の発行による収入が含まれる。",
   "法人税の支払いに伴う支出は、原則として投資活動によるキャッシュ・フローに分類される。",
   "社債の償還のための支出は、財務活動によるキャッシュ・フローに分類される。"
 ],
 ans:3,
 exp:"法人税等の支払いは「営業活動」によるキャッシュ・フローに分類されるのが原則。「投資活動」に分類するのは誤り。分類の入れ替えは頻出の不適切パターン。(R6 I-1-1 実問同様のパターン)"},

{id:"E07",cat:"経済性管理",type:"不適切",
 q:"財務会計に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "財務会計は、経営成績や財務状況を外部の利害関係者に対して報告することを目的としている。",
   "企業会計原則の継続性の原則は、採用した処理の原則・手続・方法を毎期継続して適用することを求めている。",
   "減価償却とは、有形固定資産の取得に要した金額を耐用年数にわたって各期の費用として配分していく手続である。",
   "財務会計では、土地は時間の経過とともに価値が減少しないとされるため、減価償却の対象となる。",
   "財務諸表のキャッシュ・フロー計算書は、営業活動・投資活動・財務活動によるキャッシュ・フローの3つの部分から構成される。"
 ],
 ans:3,
 exp:"土地は使用や時間の経過によって価値が減少しない非減価償却資産であり、減価償却の対象外。「減価償却の対象となる」は誤り。(R7 I-1-7 同形式)"},

{id:"E08",cat:"経済性管理",type:"不適切",
 q:"品質管理の統計的手法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "管理図における管理限界線は、工程が安定状態にあるときの統計的変動の幅をもとに設定するものであり、製品の規格値とは独立して設定される。",
   "工程能力指数Cpが1.33以上であれば、工程能力が十分であると判断されることが多い。",
   "サンプルに関する不適合品率は、1つ以上の規定要求事項を満たさないアイテムの数を、検査したアイテムの総数で除した値である。",
   "χ二乗検定は、2つの量的変数の間に線形関係があるかどうかを検定するための手法である。",
   "ヒストグラムは、データの分布の形状・中心・ばらつきを視覚的に把握するために用いられる。"
 ],
 ans:3,
 exp:"χ二乗検定は「度数分布の適合度」や「独立性の検定」に用いる手法。2つの量的変数の線形関係を検定するのは「相関分析」や「回帰分析」。定義の混同パターン。(R7 I-1-2 同形式)"},

{id:"E09",cat:"経済性管理",type:"不適切",
 q:"工程管理や工程改善活動に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "改善活動では、トップが率先して危機意識を持ち、全社で推進することが不可欠である。",
   "業務改善のECRSの原則における「E」はEliminate（排除）、「C」はCombine（結合）、「R」はRearrange（並べ替え・代替）、「S」はSimplify（簡素化）を指す。",
   "合理化の3Sは「単純化（Simplification）」「標準化（Standardization）」「専門化（Specialization）」の頭文字を取ったものである。",
   "プッシュ型生産方式はJIT（ジャスト・イン・タイム）生産方式の代表例であり、後工程の引取り指示に基づいて生産を行う。",
   "5Sにおける「清潔」は、整理・整頓・清掃を維持することを指す。"
 ],
 ans:3,
 exp:"JITはプル型生産方式の代表例。プッシュ型は予め定めたスケジュールに基づき生産する方式（MRPなど）。プル・プッシュの入れ替えは頻出の不適切パターン。(R6 I-1-5 実問同様)"},

{id:"E10",cat:"経済性管理",type:"不適切",
 q:"設備総合効率（OEE）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "設備総合効率は、時間稼働率・性能稼働率・良品率の積として定義される。",
   "設備の計画停止時間（定期メンテナンス等）は、設備総合効率の計算上、分母となる負荷時間から除外される。",
   "チョコ停（微小停止）の発生頻度を減らすことで、性能稼働率の向上に寄与する。",
   "段取り作業の手順を見直して停止時間を変えることなく作業者数だけを削減した場合、設備総合効率は向上する。",
   "不適合品の発生率を下げることで、良品率が向上し設備総合効率も改善される。"
 ],
 ans:3,
 exp:"OEE = 時間稼働率×性能稼働率×良品率。設備の停止時間が変わらないのであれば時間稼働率は変化せず、作業者数削減だけではOEEは向上しない。停止時間の短縮がなければOEE改善に直結しない。(R7 I-1-4 実問)"},

{id:"E11",cat:"経済性管理",type:"不適切",
 q:"計画・管理における科学的・数理的手法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "モンテカルロシミュレーションは、乱数を用いた確率的な数値実験を繰り返すことで不確実性を含む問題の分析や予測を行う手法である。",

{id:"E18",cat:"経済性管理",type:"適切",

{id:"H02",cat:"人的資源管理",type:"不適切",

{id:"I08",cat:"情報管理",type:"適切",
 q:"MTBF（平均故障間隔）とMTTR（平均修復時間）に関する次の記述のうち、最も適切なものはどれか。ある機器の総稼働時間は10,000時間、稼働率は0.90、この間の故障件数は100件であった。",
 opts:[
   "この機器のMTBFは100時間である。",
   "この機器のMTTRは10時間である。",
   "この機器のMTBFは90時間である。",
   "この機器のMTTRは1時間である。",
   "この機器の稼働率はMTBF÷(MTBF−MTTR)として計算される。"
 ],
 ans:2,
 exp:"実稼働時間 = 10,000×0.90 = 9,000時間。MTBF = 実稼働時間÷故障件数 = 9,000÷100 = 90時間。総修復時間 = 10,000−9,000 = 1,000時間。MTTR = 1,000÷100 = 10時間。稼働率 = MTBF÷(MTBF+MTTR) = 90÷(90+10) = 0.90。よって③が正しい。(R7 I-1-19 同形式)"},

 ],

{id:"S12",cat:"安全管理",type:"不適切",

 ],

 ],

{id:"S15",cat:"安全管理",type:"不適切",

 ],

{id:"S18",cat:"安全管理",type:"適切",

 opts:[
   "オゾン層の保護のためのウィーン条約は、締結国がオゾン層の変化により生じる悪影響から人の健康及び環境を保護するために適当な措置をとることなどを定めている。",
   "ストックホルムで開催された国連人間環境会議（1972年）は、「かけがえのない地球」をスローガンに人間環境宣言等を採択した国際会議である。",
   "エコロジカル・フットプリントは、人間が消費する資源を生産したり、社会経済活動から発生するCO2を吸収したりするのに必要な生態系サービスの需要量を地球の面積で表した指標である。",
   "気候変動問題に関する国際枠組みである京都議定書では、温室効果ガス排出量削減の法的義務を先進国・途上国のすべての締約国に課していた。",
   "持続可能な開発目標（SDGs）は、国連サミットにおいてすべての加盟国が合意したアジェンダの中で掲げられた世界共通の目標で、2030年を達成年限とし、17のゴール等から構成されている。"
 ],
 ans:3,

{id:"G02",cat:"社会環境管理",type:"不適切",
 q:"エネルギーに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "S＋3Eは、安全性（Safety）を前提としたうえで、安定供給（Energy Security）・経済効率性（Economic Efficiency）・環境適合（Environment）を同時に追求する考え方である。",
   "トップランナー制度は、エネルギー消費機器の省エネ基準を、現在商品化されている製品のうちエネルギー消費効率が最も優れているものの性能等を勘案して定め、機器のエネルギー消費効率の改善を推進するものである。",
   "スマートグリッドは、ICTの活用により、太陽光発電・風力発電などの分散型電源や需要家の情報を統合・活用して高効率・高品質な電力供給システムの実現を目指すものである。",
   "ESCO事業は、事業者が省エネルギー診断・設計・施工・運転・維持管理・資金調達などすべてのサービスを提供し、そのすべての費用を省エネ改修で実現する光熱水費削減分で賄うことを基本とする事業である。",
   "コージェネレーションは、都市ガスや石油等を燃料にして発電した際に発生する排熱を活用するものであるが、カーボンニュートラルの実現に向けて使用燃料の脱炭素化が不可欠であることから、段階的に縮小する取組が進められている。"
 ],
 ans:4,
 exp:"コージェネレーション（熱電併給）は廃熱を活用するため総合エネルギー効率が高く、カーボンニュートラルに向けて「縮小」するのではなく、水素・アンモニア等の脱炭素燃料への転換や活用継続が方向性とされる。「縮小する取組が進められている」が誤り。(R7 I-1-34 実問)"},

{id:"G03",cat:"社会環境管理",type:"不適切",
 q:"ラムサール条約に関する次の記述のうち、最も不適切なものはどれか。なお、以下において条約湿地はラムサール条約の登録簿に掲げられている湿地を指す。",
 opts:[
   "ラムサール条約は、国際的に重要な湿地及びそこに生息・生育する動植物の保全と賢明な利用（ワイズユース）を目的としている。",
   "ラムサール条約は、天然の湿地を対象としており、我が国の条約湿地においても、ダム湖、ため池等の人工の湿地は登録されていない。",
   "ラムサール条約は、淡水域・汽水域における沼沢地・湿原・泥炭地及び水域を対象としており、海域のものは登録されていない。",
   "我が国の条約湿地の登録に当たっては、あらかじめ国指定の鳥獣保護区や国立公園・国定公園などの保護地域に指定されることによる国内規制はかかるが、条約湿地になることにより追加的な規制がかかることはない。",
   "ラムサール条約が推進する条約湿地のワイズユースには、エコツーリズムや野生生物観光は含まれるが、稲作などの農業や養殖などの漁業は含まれない。"
 ],
 ans:4,
 exp:"ワイズユース（賢明な利用）には、稲作・養殖などの伝統的農漁業も含まれる。「農業・漁業は含まれない」という記述が誤り。ラムサール条約は湿地の全面的な利用禁止ではなく、持続可能な利用を推進する。(R7 I-1-35 実問)"},

{id:"G04",cat:"社会環境管理",type:"不適切",

 opts:[
   "サーキュラーエコノミーは、生産段階から再利用などを視野に入れて設計し、あらゆる段階で資源の効率的・循環的な利用を図りつつ、サービスや製品に最大限の付加価値をつけていくシステムである。",
   "コンパクトシティは、市町村内のすべての都市機能を最も主要な拠点1か所に集約させ、すべての居住者をその拠点周辺に集約させることを目指すものである。",
   "バーゼル条約は、先進国からの廃棄物が開発途上国に放置されて環境汚染が生じるという問題に対処するための国際的な枠組みであり、有害廃棄物等を輸出する際の輸入国・通過国への事前通告、同意取得の義務付けなどを定めている。",
   "廃棄物の処理に関する3Rは、Reduce（発生抑制）・Reuse（再使用）・Recycle（再生利用）を意味し、この優先順位はReduce＞Reuse＞Recycleとされている。",
   "サステナブルファッションは、衣服の生産から着用、廃棄に至るプロセスにおいて将来にわたり持続可能であることを目指し、生態系を含む地球環境や関わる人・社会に配慮した取組のことをいう。"
 ],
 ans:1,
 exp:"コンパクトシティとは「都市機能を中心部に集約しつつも、各地域の生活圏を維持する」概念。「すべての居住者を1か所に集約させる」という記述は過剰な断定で誤り。地域の実態に応じた多極型もあり得る。(R7 I-1-36 実問)"},

{id:"G05",cat:"社会環境管理",type:"不適切",

   "バイオレメディエーション：物理的・化学的処理技術を用いて汚染物質を分解することによって土壌・地下水等の環境汚染の浄化を図る技術"
 ],
 ans:4,
 exp:"バイオレメディエーションとは「微生物等の生物の働きを利用して汚染物質を分解・無害化する技術」。「物理的・化学的処理技術」を用いると記述しているが、これはバイオ（生物）ではなく物理化学的手法の説明。(R7 I-1-37 実問)"},

{id:"G06",cat:"社会環境管理",type:"不適切",
 q:"ALPS（多核種除去設備）処理水に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[

   "ALPS処理では、薬液による沈殿処理や活性炭・吸着材による吸着を繰り返して放射性物質を浄化処理する。",
   "ALPS処理水は、トリチウム以外の放射性物質について環境放出の際の規制基準を満たしている。",
   "海水で希釈したALPS処理水は、放水トンネルを経由して福島第一原子力発電所の沿岸から離れた場所で海洋放出される。",
   "海水で希釈したALPS処理水の海洋放出により、福島第一原子力発電所内のタンクに貯蔵されているALPS処理水及び処理途上水の合計量は、現在、放出前の10分の1以下となっている。"
 ],
 ans:4,

{id:"G07",cat:"社会環境管理",type:"不適切",

 opts:[
   "第六次環境基本計画では、環境政策の最上位の目的として「現在及び将来の国民一人一人の生活の質、幸福度、ウェルビーイング、経済厚生の向上」の実現が位置付けられている。",
   "「ウェルビーイング／高い生活の質」のためには、GDPに代表されるフローだけでなく、ストックの充実が不可欠であり、まずはストックとしての自然資本の維持・回復・充実を図ることが新たな成長の基盤となるとされている。",

   "「ウェルビーイング／高い生活の質」の観点からは、自立分散型・水平分散型の社会経済システムへ移行するよりも、大規模集中型の社会経済システムの維持を図ることが重要であるとされている。",
   "ウェルビーイングの向上には、国家・市場・コミュニティのバランスを図り、多くの国民の参加を得て、弱者を含めた包摂的な社会を実現することが重要であるとされている。"
 ],
 ans:3,

{id:"G08",cat:"社会環境管理",type:"不適切",
 q:"環境マネジメントシステム（EMS）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[

   "ISO 14001には、事業者の経営面での管理手法についての定めと併せて、具体的な対策の内容や目標水準が示されている。",

   "環境マネジメントは、組織や事業者が、規制に従うだけでなく、その活動全体にわたって自主的かつ積極的に環境保全の取組を進めるための有効なツールである。"
 ],
 ans:1,

   "カーボンプライシングとは、CO2等の排出に価格付けをすることで排出削減を促す政策手段であり、炭素税と排出量取引制度が代表的な手法である。",
   "GX経済移行債は、日本政府が発行するグリーンボンドの一種であり、調達した資金は再生可能エネルギーの普及促進にのみ使用が限定されている。",
   "GXリーグは、GXに積極的に取り組む企業が参加し、排出量取引や技術開発・投資等を通じて脱炭素社会の実現を目指す取組である。"
 ],

 opts:[
   "生物多様性条約は、生物の多様性の保全、生物多様性の構成要素の持続可能な利用、遺伝資源の利用から生じる利益の公正かつ衡平な配分の3つを目的としている。",

 ],
 ans:4,

{id:"G11",cat:"社会環境管理",type:"不適切",

   "FIP（フィード・イン・プレミアム）制度は、発電事業者が市場価格に連動した補助額（プレミアム）を受け取る制度であり、FITと比べて市場との連動性が高い。",

   "ペロブスカイト太陽電池は、従来のシリコン系太陽電池と比べてエネルギー変換効率が一般に低く、量産化のメリットはほとんどないとされている。",
   "水素エネルギーは、燃焼しても水しか生成しないという特性があるが、水素の製造過程で化石燃料を使用する場合にはCO2が排出される点に留意が必要である。"
 ],

{id:"G12",cat:"社会環境管理",type:"不適切",
 q:"環境影響評価（環境アセスメント）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "環境影響評価法では、大規模な道路・ダム・鉄道・空港・発電所等の事業を対象として、事業実施前に環境への影響を予測・評価し、環境保全措置を検討することを義務付けている。",
   "環境アセスメントの手続きには、計画段階環境配慮書の作成・公告縦覧・配慮書に対する意見聴取、方法書、準備書、評価書の各段階が含まれる。",
   "戦略的環境アセスメント（SEA）とは、個別の事業ではなく、政策・計画・プログラムの段階で環境影響を評価する手法であり、より上流段階での環境配慮を可能にする。",
   "環境影響評価書が確定した後は、事業の内容がどのように変更されても、再度の環境影響評価手続きを行う必要はない。",
   "住民・地方公共団体等が環境影響評価の手続きに参加できる機会（公告・縦覧・意見書の提出等）が制度的に設けられており、透明性・参加型の意思決定が重視されている。"
 ],
 ans:3,
 exp:"事業内容が一定程度以上変更された場合には、改めて環境影響評価手続きを行う必要が生じる場合がある（事後調査・変更評価等）。「どのように変更されても再手続き不要」という断定が誤り。"},

{id:"G13",cat:"社会環境管理",type:"不適切",

 opts:[
   "パリ協定は、産業革命前からの世界平均気温上昇を2℃より十分低く保ち、1.5℃以内に抑える努力をすることを長期目標としている。",
   "我が国の2030年温室効果ガス削減目標は、2013年度比で46%削減（さらに50%の高みへ挑戦）とされている。",
   "カーボンニュートラルとは、温室効果ガスの排出量を実質ゼロとすることであり、排出を完全にゼロにすることではなく、吸収・除去量との差し引きでゼロにする概念である。",

/* ================================================================
   定数・ユーティリティ
   ================================================================ */
const CATS = ["経済性管理","人的資源管理","情報管理","安全管理","社会環境管理"];
const CAT_ICONS = {
  "経済性管理":"📊","人的資源管理":"👥",
  "情報管理":"💻","安全管理":"🦺","社会環境管理":"🌿"
};
const CAT_COLOR = {
  "経済性管理":"#38BDF8","人的資源管理":"#818CF8",
  "情報管理":"#F59E0B","安全管理":"#F43F5E","社会環境管理":"#10B981"
};

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){
    const j=Math.floor(Math.random()*(i+1));
    [a[i],a[j]]=[a[j],a[i]];
  }
  return a;
}

// 1日の「今日の5問」: 日付シードで5管理から各1問
function getTodaysQuestions(){
  const seed = Math.floor(Date.now()/(1000*60*60*24));
  const seededRand = (n,s) => {
    let x = Math.sin(s+n)*10000;
    return x - Math.floor(x);
  };
  return CATS.map((cat,ci) => {
    const pool = Q.filter(q=>q.cat===cat);
    const idx = Math.floor(seededRand(ci,seed) * pool.length);
    return pool[idx];
  });
}

function TypeBadge({type}){
  if(type==="計算") return <span className="badge tc">計算</span>;
  if(type==="不適切") return <span className="badge tb">不適切</span>;
  return <span className="badge tg">適切</span>;
}

/* ================================================================
   QuizScreen
   ================================================================ */
function QuizScreen({questions, onFinish, sessionTitle}){
  const [idx, setIdx] = useState(0);
  const [selected, setSelected] = useState(null);
  const [results, setResults] = useState([]);
  const q = questions[idx];
  const answered = selected !== null;
  const pct = Math.round((idx / questions.length) * 100);

  const choose = (i) => {
    if(answered) return;
    setSelected(i);
    setResults(r => [...r, {q, userAns: i, correct: i === q.ans}]);
  };

  const next = () => {
    if(idx + 1 >= questions.length) onFinish(results);
    else { setIdx(i=>i+1); setSelected(null); }
  };

  return (
    <div className="fade-up">
      <div className="q-nav">
        <span className="q-counter">問 {idx+1} <span style={{color:"var(--muted)"}}>/ {questions.length}</span></span>
        <span className="q-id">{q.id}</span>
      </div>
      <div className="progress-wrap">
        <div className="progress-bar">
          <div className="progress-fill" style={{width:pct+"%"}}/>
        </div>
        <div className="progress-label">
          <span style={{maxWidth:"70%",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{sessionTitle}</span>
          <span>{pct}%</span>
        </div>
      </div>
      <div className="card">
        <div style={{marginBottom:"10px",display:"flex",alignItems:"center",flexWrap:"wrap",gap:"4px"}}>
          <span className="badge cat" style={{borderColor: CAT_COLOR[q.cat]+"44", color: CAT_COLOR[q.cat], background: CAT_COLOR[q.cat]+"18"}}>{q.cat}</span>
          <TypeBadge type={q.type}/>
          {q.tag==="NEW" && <span className="badge new">🆕 最新</span>}
        </div>
        <div className="q-text">{q.q}</div>
        <div className="opt-list">
          {q.opts.map((o,i) => {
            let cls = "opt-btn";
            if(answered){
              if(i === q.ans) cls += " correct";
              else if(i === selected) cls += " wrong";
              else cls += " dim";
            }
            return (
              <button key={i} className={cls} onClick={()=>choose(i)} disabled={answered}>
                <span className="num">{"①②③④⑤"[i]}</span>
                <span>{o}</span>
              </button>
            );
          })}
        </div>
        {answered && (
          <div className="exp-box slide-in">
            <div className={`exp-verdict ${selected===q.ans?"ok":"ng"}`}>
              {selected===q.ans ? "✅ 正解！" : `❌ 不正解　正答：${"①②③④⑤"[q.ans]}`}
            </div>
            <div>{q.exp}</div>
          </div>
        )}
        {answered && (
          <button className="btn-primary" onClick={next}>
            {idx+1 >= questions.length ? "結果を見る 📊" : "次の問題 →"}
          </button>
        )}
      </div>
    </div>
  );
}

/* ================================================================
   ResultScreen
   ================================================================ */
function ResultScreen({results, onMenu, onRetry, onReview}){
  const score = results.filter(r=>r.correct).length;
  const total = results.length;
  const pct = Math.round(score/total*100);
  const msg = pct>=80 ? "素晴らしい！合格水準です 🎉"
            : pct>=60 ? "もう少し！苦手分野を復習しよう 💪"
            : "基礎から見直しましょう 📖";

  const catStats = {};
  CATS.forEach(c => catStats[c] = {ok:0,total:0});
  results.forEach(r => {
    const c = r.q.cat;
    if(!catStats[c]) catStats[c]={ok:0,total:0};
    catStats[c].total++;
    if(r.correct) catStats[c].ok++;
  });

  return (
    <div className="result-wrap fade-up">
      <div style={{marginBottom:"8px",fontSize:".78rem",color:"var(--muted)"}}>セッション結果</div>
      <div className="result-score">{score}</div>
      <div className="result-denom">/ {total} 問正解</div>
      <div className="result-pct" style={{color: pct>=80?"var(--success)":pct>=60?"var(--warn)":"var(--error)"}}>{pct}%</div>
      <div className="result-msg">{msg}</div>

      <div className="cat-result-grid">
        {CATS.filter(c=>catStats[c]&&catStats[c].total>0).map(cat => {
          const s = catStats[cat];
          const cp = s.total>0 ? Math.round(s.ok/s.total*100) : 0;
          return (
            <div key={cat} className="cat-result-card">
              <div className="cr-icon">{CAT_ICONS[cat]}</div>
              <div className="cr-name">{cat}</div>
              <div className="cr-score" style={{color: CAT_COLOR[cat]}}>{s.ok}<span style={{fontSize:".8rem",color:"var(--muted)"}}>/{s.total}</span></div>
              <div className="cr-pct">{cp}%</div>
            </div>
          );
        })}
      </div>

      {results.some(r=>!r.correct) && (
        <button className="btn-primary" style={{background:"linear-gradient(135deg,#F43F5E,#F97316)",marginBottom:"10px"}} onClick={onRetry}>
          ❌ 間違えた問題を再挑戦 ({results.filter(r=>!r.correct).length}問)
        </button>
      )}
      <button className="btn-primary" style={{marginBottom:"10px",background:"linear-gradient(135deg,#475569,#1E293B)"}} onClick={onReview}>
        📋 全問の解説を見る
      </button>
      <button className="btn-primary" onClick={onMenu}>🏠 メニューに戻る</button>
    </div>
  );
}

/* ================================================================
   ReviewScreen
   ================================================================ */
function ReviewScreen({results, onBack}){
  const [tab, setTab] = useState("ng");
  const filtered = tab==="ng" ? results.filter(r=>!r.correct) : results;
  const ngCount = results.filter(r=>!r.correct).length;

  return (
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",gap:"12px",marginBottom:"18px"}}>
        <button className="btn-back" onClick={onBack}>← 戻る</button>
        <span style={{fontWeight:700,fontSize:".9rem"}}>解説レビュー</span>
      </div>
      <div className="tab-row">
        <button className={`tab ${tab==="ng"?"active":""}`} onClick={()=>setTab("ng")}>
          ❌ 不正解 ({ngCount})
        </button>
        <button className={`tab ${tab==="all"?"active":""}`} onClick={()=>setTab("all")}>
          全問 ({results.length})
        </button>
      </div>
      {filtered.length===0 && <div className="empty-msg">🎉 全問正解！素晴らしい</div>}
      {filtered.map((r,i) => (
        <div key={i} className="review-card">
          <div style={{display:"flex",alignItems:"center",gap:"8px",marginBottom:"8px",flexWrap:"wrap"}}>
            <div className={`dot ${r.correct?"ok":"ng"}`}/>
            <span className="badge cat" style={{borderColor:CAT_COLOR[r.q.cat]+"44",color:CAT_COLOR[r.q.cat],background:CAT_COLOR[r.q.cat]+"18"}}>{r.q.cat}</span>
            <TypeBadge type={r.q.type}/>
            {r.q.tag==="NEW"&&<span className="badge new">🆕</span>}
            <span style={{fontSize:".7rem",color:"var(--muted)",marginLeft:"auto"}}>{r.q.id}</span>
          </div>
          <div style={{fontSize:".83rem",fontWeight:700,marginBottom:"10px",lineHeight:1.75,color:"#fff"}}>
            {r.q.q.length>90 ? r.q.q.slice(0,90)+"…" : r.q.q}
          </div>
          <div style={{fontSize:".77rem",color:"var(--muted)",marginBottom:"8px",display:"flex",gap:"16px"}}>
            <span>あなた：<strong style={{color:r.correct?"var(--success)":"var(--error)"}}>{"①②③④⑤"[r.userAns]}</strong></span>
            <span>正解：<strong style={{color:"var(--success)"}}>{"①②③④⑤"[r.q.ans]}</strong></span>
          </div>
          <div className="exp-box" style={{marginTop:"4px",fontSize:".79rem"}}>{r.q.exp}</div>
        </div>
      ))}
    </div>
  );
}

/* ================================================================
   メインアプリ
   ================================================================ */
export default function App(){
  const [screen, setScreen] = useState("menu");
  const [sessionQs, setSessionQs] = useState([]);
  const [sessionTitle, setSessionTitle] = useState("");
  const [results, setResults] = useState([]);
  const [history, setHistory] = useState([]);

  // 累積統計
  const totalAnswered = history.length;
  const totalCorrect = history.filter(r=>r.correct).length;
  const catHistory = useMemo(() => {
    const m = {};
    CATS.forEach(c => m[c]={ok:0,total:0});
    history.forEach(r => {
      if(!m[r.q.cat]) m[r.q.cat]={ok:0,total:0};
      m[r.q.cat].total++;
      if(r.correct) m[r.q.cat].ok++;
    });
    return m;
  }, [history]);

  const wrongIds = useMemo(() => {
    const wrong = {};
    history.forEach(r => {
      if(!r.correct) wrong[r.q.id] = r.q;
    });
    return Object.values(wrong);
  }, [history]);

  const startSession = (qs, title) => {
    setSessionQs(shuffle(qs));
    setSessionTitle(title);
    setResults([]);
    setScreen("quiz");
  };

  const handleFinish = (res) => {
    setResults(res);
    setHistory(h => [...h, ...res]);
    setScreen("result");
  };

  // ── スクリーン分岐 ──
  if(screen==="quiz") return (
    <div id="root">
      <QuizScreen questions={sessionQs} onFinish={handleFinish} sessionTitle={sessionTitle}/>
    </div>
  );
  if(screen==="result") return (
    <div id="root">
      <ResultScreen
        results={results}
        onMenu={()=>setScreen("menu")}
        onRetry={()=>startSession(results.filter(r=>!r.correct).map(r=>r.q), "間違えた問題の再挑戦")}
        onReview={()=>setScreen("review")}
      />
    </div>
  );
  if(screen==="review") return (
    <div id="root">
      <ReviewScreen results={results} onBack={()=>setScreen("result")}/>
    </div>
  );

  // ── メニュー ──
  const newQs = Q.filter(q=>q.tag==="NEW");

  return (
    <div id="root" className="fade-up">
      {/* ヘッダー */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-end",marginBottom:"20px"}}>
        <div>
          <div className="logo">総監択一 完全版</div>
          <div className="sub">100問 ／ R6・R7過去問完全準拠 ＋ 最新トレンド</div>
        </div>
        <div style={{textAlign:"right",fontSize:".7rem",color:"var(--muted)"}}>
          <div>5管理</div>
          <div style={{color:"var(--accent)",fontWeight:700,fontSize:"1.1rem"}}>100問</div>
        </div>
      </div>

      {/* 累積スコア */}
      {totalAnswered > 0 && (
        <div className="stats-row">
          <div className="stat-box">
            <div className="val">{totalAnswered}</div>
            <div className="key">解答済</div>
          </div>
          <div className="stat-box">
            <div className="val">{totalCorrect}</div>
            <div className="key">正解数</div>
          </div>
          <div className="stat-box">
            <div className="val">{Math.round(totalCorrect/totalAnswered*100)}%</div>
            <div className="key">正答率</div>
          </div>
        </div>
      )}

      {/* ── メインモード ── */}
      <div className="sec-label">出題モード</div>

      <div className="menu-card" onClick={()=>startSession(getTodaysQuestions(), "今日の5問（各管理1問）")}>
        <span className="icon">📅</span>
        <div>
          <div className="label">今日の5問</div>
          <div className="desc">5管理から各1問・毎日変わる出題</div>
        </div>
      </div>

      <div className="menu-card" onClick={()=>startSession(Q, "全100問チャレンジ")}>
        <span className="icon">🎯</span>
        <div>
          <div className="label">全100問チャレンジ</div>
          <div className="desc">全5管理100問をランダム出題</div>
        </div>
      </div>

      <div className="menu-card" onClick={()=>startSession(shuffle(Q).slice(0,20), "ランダム20問")}>
        <span className="icon">🎲</span>
        <div>
          <div className="label">ランダム20問</div>
          <div className="desc">全100問からランダムに20問を出題</div>
        </div>
      </div>

      <div className="menu-card new-mode" onClick={()=>startSession(newQs, `🆕 最新トレンド（${newQs.length}問）`)}>
        <span className="icon">🆕</span>
        <div>
          <div className="label">最新トレンド問題</div>
          <div className="desc">生成AI・GX・子の看護休暇改正・化学物質規制など {newQs.length}問</div>
        </div>
      </div>

      {wrongIds.length > 0 && (
        <div className="menu-card warn" onClick={()=>startSession(wrongIds, `苦手克服（${wrongIds.length}問）`)}>
          <span className="icon">🔥</span>
          <div>
            <div className="label">苦手問題克服</div>
            <div className="desc">間違えた {wrongIds.length}問 を集中練習</div>
          </div>
        </div>
      )}

      {/* ── カテゴリ別 ── */}
      <div className="sec-label">カテゴリ別（各20問）</div>
      <div className="cat-grid">
        {CATS.map(cat => {
          const cqs = Q.filter(q=>q.cat===cat);
          const h = catHistory[cat]||{ok:0,total:0};
          const progPct = h.total>0 ? Math.round(h.ok/h.total*100) : 0;
          return (
            <div key={cat} className="cat-card" onClick={()=>startSession(cqs, cat)}>
              <div className="cicon">{CAT_ICONS[cat]}</div>
              <div className="clabel">{cat}</div>
              <div className="cdesc">{cqs.length}問 {h.total>0 ? `/ 正答率 ${progPct}%` : ""}</div>
              {h.total>0 && (
                <div className="cprog">
                  <div className="cprog-fill" style={{width:progPct+"%",background:CAT_COLOR[cat]}}/>
                </div>
              )}
            </div>
          );
        })}
      </div>

      {/* ── タイプ別 ── */}
      <div className="sec-label">タイプ別</div>
      <div className="type-row">
        {[
          {type:"計算", icon:"🔢"},
          {type:"不適切", icon:"❌"},
          {type:"適切", icon:"✅"}
        ].map(({type,icon}) => {
          const tqs = Q.filter(q=>q.type===type);
          return (
            <div key={type} className="type-card" onClick={()=>startSession(tqs, `${type}問題`)}>
              <div style={{fontSize:"1.3rem",marginBottom:"4px"}}>{icon}</div>
              <div className="tv">{tqs.length}</div>
              <div className="tl">{type}問題</div>
            </div>
          );
        })}
      </div>

      <div className="footer-note">
        R6・R7 技術士第二次試験（総合技術監理部門）過去問準拠<br/>
        最新改正法令（令和7年4月1日時点）対応
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
