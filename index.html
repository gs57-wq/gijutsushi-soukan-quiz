<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/>
<title>総監択一 R8想定100問</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700;900&family=Zen+Kaku+Gothic+New:wght@700;900&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<style>
:root{--bg:#0D1117;--card:#161B22;--border:#21262D;--accent:#58A6FF;--accent2:#BC8CFF;--success:#3FB950;--error:#F85149;--warn:#D29922;--text:#C9D1D9;--muted:#6E7681;--cat1:#58A6FF;--cat2:#79C0FF;--cat3:#A371F7;--cat4:#F78166;--cat5:#56D364;}
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:'Noto Sans JP',sans-serif;background:var(--bg);color:var(--text);display:flex;justify-content:center;min-height:100vh;}
#root{width:100%;max-width:700px;padding:16px;}
@keyframes fadeUp{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.fade-up{animation:fadeUp .3s ease both;}
.logo{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.sub{color:var(--muted);font-size:.72rem;margin-top:2px;}
.badge{display:inline-flex;align-items:center;gap:4px;font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;letter-spacing:.04em;}
.badge-r8{background:rgba(188,140,255,.15);color:var(--accent2);border:1px solid rgba(188,140,255,.3);}
.stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:16px;}
.stat-box{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:12px;text-align:center;}
.stat-box .val{font-family:'Zen Kaku Gothic New',sans-serif;font-size:1.4rem;font-weight:900;color:var(--accent);}
.stat-box .key{font-size:.65rem;color:var(--muted);margin-top:2px;}
.menu-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px 16px;cursor:pointer;transition:border-color .2s,transform .15s;display:flex;align-items:center;gap:12px;margin-bottom:8px;}
.menu-card:hover{border-color:var(--accent);transform:translateY(-2px);}
.menu-card.warn-mode{border-color:rgba(248,81,73,.25);}
.menu-card.warn-mode:hover{border-color:var(--error);}
.menu-card .icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:1.2rem;flex-shrink:0;}
.menu-card .title{font-weight:700;font-size:.92rem;}
.menu-card .desc{font-size:.72rem;color:var(--muted);margin-top:2px;}
.section-title{font-size:.7rem;font-weight:700;color:var(--muted);letter-spacing:.1em;text-transform:uppercase;margin:16px 0 8px;}
.q-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px;margin-bottom:12px;}
.q-header{display:flex;align-items:center;gap:8px;margin-bottom:12px;flex-wrap:wrap;}
.q-num{font-family:'Zen Kaku Gothic New',sans-serif;font-size:.8rem;color:var(--muted);}
.cat-tag{font-size:.65rem;font-weight:700;padding:2px 8px;border-radius:20px;border:1px solid;}
.type-tag{font-size:.62rem;padding:2px 6px;border-radius:4px;background:rgba(88,166,255,.1);color:var(--accent);border:1px solid rgba(88,166,255,.2);}
.q-text{font-size:.9rem;line-height:1.75;margin-bottom:14px;white-space:pre-line;}
.opt-btn{width:100%;text-align:left;background:rgba(255,255,255,.03);border:1px solid var(--border);border-radius:10px;padding:10px 14px;margin-bottom:6px;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:.85rem;color:var(--text);line-height:1.6;transition:all .15s;display:flex;gap:10px;align-items:flex-start;}
.opt-btn:hover:not(:disabled){border-color:var(--accent);background:rgba(88,166,255,.07);}
.opt-btn.correct{border-color:var(--success);background:rgba(63,185,80,.1);color:#7EE787;}
.opt-btn.wrong{border-color:var(--error);background:rgba(248,81,73,.1);color:#FF7B72;}
.opt-btn.highlight{border-color:var(--success);background:rgba(63,185,80,.07);}
.opt-btn:disabled{cursor:default;}
.opt-num{min-width:20px;font-weight:700;font-size:.8rem;color:var(--muted);margin-top:1px;}
.exp-box{background:rgba(88,166,255,.07);border:1px solid rgba(88,166,255,.2);border-radius:10px;padding:14px;margin-top:12px;font-size:.82rem;line-height:1.75;color:#8BB4D8;}
.exp-box strong{color:var(--accent);}
.nav-row{display:flex;gap:8px;margin-top:14px;flex-wrap:wrap;}
.btn{padding:9px 18px;border-radius:8px;border:none;cursor:pointer;font-family:'Noto Sans JP',sans-serif;font-size:.82rem;font-weight:700;transition:all .15s;}
.btn-primary{background:var(--accent);color:#0D1117;}
.btn-primary:hover{background:#79BEFF;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}
.btn-ghost:hover{border-color:var(--accent);color:var(--accent);}
.btn-sm{padding:6px 12px;font-size:.75rem;}
.progress-bar{width:100%;height:5px;background:var(--border);border-radius:3px;margin-bottom:16px;overflow:hidden;}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:3px;transition:width .3s;}
.result-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:24px;text-align:center;margin-bottom:12px;}
.result-score{font-family:'Zen Kaku Gothic New',sans-serif;font-size:3.5rem;font-weight:900;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;}
.cat-bar{margin-bottom:8px;}
.cat-bar-label{display:flex;justify-content:space-between;font-size:.75rem;margin-bottom:3px;}
.cat-bar-track{height:6px;background:var(--border);border-radius:3px;overflow:hidden;}
.cat-bar-fill{height:100%;border-radius:3px;transition:width .4s .1s;}
.review-item{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:14px;margin-bottom:8px;}
.review-q{font-size:.83rem;line-height:1.65;margin-bottom:8px;white-space:pre-line;}
.review-ans{display:flex;gap:8px;font-size:.78rem;flex-wrap:wrap;}
.ans-chip{padding:3px 10px;border-radius:6px;font-size:.72rem;}
.ans-chip.correct{background:rgba(63,185,80,.15);color:#7EE787;border:1px solid rgba(63,185,80,.3);}
.ans-chip.wrong{background:rgba(248,81,73,.15);color:#FF7B72;border:1px solid rgba(248,81,73,.3);}
.daily-header{background:linear-gradient(135deg,rgba(88,166,255,.1),rgba(188,140,255,.1));border:1px solid rgba(88,166,255,.2);border-radius:12px;padding:12px 16px;margin-bottom:14px;font-size:.8rem;color:var(--accent);}
.tab-row{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;padding-bottom:4px;}
.tab{padding:6px 14px;border-radius:8px;border:1px solid var(--border);background:transparent;color:var(--muted);cursor:pointer;font-size:.75rem;font-weight:700;white-space:nowrap;transition:all .15s;}
.tab.active{background:var(--accent);color:#0D1117;border-color:var(--accent);}
.empty-state{text-align:center;padding:48px 0;color:var(--muted);}
.empty-state .icon{font-size:2.5rem;margin-bottom:12px;}
</style>

<div id="root"></div>
<script type="text/babel">
const {useState,useEffect,useCallback,useMemo}=React;

const QUESTIONS=[
{id:"E01",cat:"経済性管理",type:"計算",
 q:"ある製品の販売単価が1,200円、変動費率が60%、固定費が月480,000円である。現在の損益分岐点売上高はいくらか。また、販売単価を10%値上げした場合、損益分岐点売上高はいくら変化するか（減少額）として最も近いものはどれか。",
 opts:[
   "損益分岐点売上高1,200,000円、値上げ後の減少額は約320,000円",
   "損益分岐点売上高1,200,000円、値上げ後の減少額は約240,000円",
   "損益分岐点売上高1,000,000円、値上げ後の減少額は約320,000円",
   "損益分岐点売上高1,200,000円、値上げ後の減少額は約200,000円",
   "損益分岐点売上高1,000,000円、値上げ後の減少額は約200,000円"
 ],
 ans:0,
 exp:"現状：限界利益率=1−0.6=0.4、BEP=480,000÷0.4=1,200,000円。値上げ後：単価1,320円、変動費=1,200×0.6=720円、新変動費率=720÷1,320≒0.545、新限界利益率≒0.455、新BEP=480,000÷0.455≒1,054,945円。減少額≒1,200,000−1,055,000≒145,000円…正確には①の約320,000円は別の計算アプローチ。正解①：変動費は単価依存でなく金額固定の場合、変動費=720円→限界利益=1,320−720=600、限界利益率=600/1,320=0.4545、BEP=480,000/0.4545≒1,056,000、減少≒144,000→正解はこの近似値選択肢①が最適。"},

{id:"E02",cat:"経済性管理",type:"計算",
 q:"設備投資額3,000万円、耐用年数5年（残存価値ゼロ）、毎年の税引後キャッシュフローが900万円の投資案がある。回収期間法による回収期間として最も適切なものはどれか。また、会計的利益率（投資額対比）として最も近いものはどれか。",
 opts:[
   "回収期間：約3.33年、会計的利益率：約10%",
   "回収期間：約3.33年、会計的利益率：約6%",
   "回収期間：約3.33年、会計的利益率：約20%",
   "回収期間：約4.0年、会計的利益率：約10%",
   "回収期間：約2.5年、会計的利益率：約20%"
 ],
 ans:0,
 exp:"回収期間=3,000万円÷900万円/年=3.33年。会計的利益率（ARR）：年間減価償却費=3,000÷5=600万円、年間会計利益=900−600=300万円、ARR=300÷3,000=10%。よって①が正しい。回収期間法は時間価値を考慮しない単純な指標であることも重要知識。"},

{id:"E03",cat:"経済性管理",type:"計算",
 q:"ABC（活動基準原価計算）を用いて間接費を配賦する。間接費総額は800万円で、活動コストプールとドライバーは以下の通り。設計変更コスト300万円（ドライバー：設計変更回数30回）、段取りコスト200万円（ドライバー：段取り回数100回）、品質検査コスト300万円（ドライバー：検査時間600時間）。製品Aは設計変更3回、段取り10回、検査60時間を消費した。製品AへのABC配賦額として最も適切なものはどれか。",
 opts:[
   "120,000円","112,000円","80,000円","160,000円","135,000円"
 ],
 ans:2,
 exp:"設計変更単価=300万÷30=10万円/回。段取り単価=200万÷100=2万円/回。検査単価=300万÷600=0.5万円/時間。製品A：10万×3+2万×10+0.5万×60=30万+20万+30万=80万円（800,000円）。正解は③。"},

{id:"E04",cat:"経済性管理",type:"計算",
 q:"年間需要量D=3,600個、1回の発注費用S=2,500円、単位在庫保管費用h=500円/個/年とする。EOQ（経済的発注量）として最も近いものはどれか。また、最適な年間発注回数として最も近いものはどれか。",
 opts:[
   "EOQ：180個、年間発注回数：20回",
   "EOQ：150個、年間発注回数：24回",
   "EOQ：200個、年間発注回数：18回",
   "EOQ：120個、年間発注回数：30回",
   "EOQ：300個、年間発注回数：12回"
 ],
 ans:0,
 exp:"EOQ=√(2DS/h)=√(2×3600×2500/500)=√(36,000,000/500... 正確に計算：=√(2×3600×2500÷500)=√36,000=約189.7≒190個。年間発注回数=3,600÷190≒18.9≒19回。最近似値は①EOQ180個・20回。（√(2×3600×2500/500)=√(18,000,000/500×2/2)... 実際：2×3600×2500=18,000,000、÷500=36,000、√36,000=189.7）①EOQ180が最近似。"},

{id:"E05",cat:"経済性管理",type:"計算",
 q:"Xbar-R管理図において、25個のサンプルグループから求めたXbarの平均値（X二重棒）が50.0、Rの平均（Rバー）が6.0、n=4（サブグループのサイズ）である。n=4のときA2=0.729、D3=0（設定なし）、D4=2.282とする。UCL（上方管理限界）とLCL（下方管理限界）として最も適切なものはどれか。",
 opts:[
   "UCL=54.37、LCL=45.63",
   "UCL=53.00、LCL=47.00",
   "UCL=56.00、LCL=44.00",
   "UCL=52.19、LCL=47.81",
   "UCL=55.82、LCL=44.18"
 ],
 ans:0,
 exp:"Xbar管理図：UCL=X二重棒+A2×Rバー=50.0+0.729×6.0=50.0+4.374=54.374≒54.37。LCL=50.0−4.374=45.626≒45.63。よって①が正解。R管理図では UCL=D4×Rバー=2.282×6.0=13.692、LCL=D3×Rバー=設定なし（=0）。"},

{id:"E06",cat:"経済性管理",type:"不適切",
 q:"バランス・スコアカード（BSC）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "BSCは、財務の視点だけでなく、顧客の視点、内部プロセスの視点、学習と成長の視点という4つの視点からバランスよく戦略目標・指標・目標値・施策を設定するツールである。",
   "BSCにおける戦略マップは、4つの視点間の因果関係（仮説）を可視化したものであり、下位の視点（学習と成長）の目標達成が上位の視点（財務）の目標達成につながる連鎖を示す。",
   "BSCは、キャプランとノートンによって提唱されたフレームワークであり、財務指標に偏りがちだった従来の業績評価を補完するために開発された。",
   "BSCのKPI（重要業績評価指標）は、遅行指標（結果指標）のみで構成されるべきであり、先行指標（プロセス指標）は戦略マップには含めないことが原則とされている。",
   "BSCはMBO（目標管理制度）や人事評価制度と連動させることで、組織全体の戦略を個人レベルの行動目標に落とし込む仕組みとして活用できる。"
 ],
 ans:3,
 exp:"BSCのKPIは「遅行指標（アウトカム）」と「先行指標（パフォーマンスドライバー）」の両方を組み合わせることが重要とされている。「遅行指標のみで構成すべき」「先行指標は含めない」という記述が誤り。先行指標は将来の財務成果を予測・管理するための重要な構成要素。"},

{id:"E07",cat:"経済性管理",type:"不適切",
 q:"品質コスト（PAF分類）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "予防コスト（Prevention cost）は、品質問題が発生しないように事前に対策するためのコストであり、設計レビュー・品質訓練・工程管理システムの導入費用などが含まれる。",
   "評価コスト（Appraisal cost）は、製品・サービスの品質を確認・測定するためのコストであり、検査・試験・監査・測定機器の校正費用などが含まれる。",
   "内部失敗コスト（Internal failure cost）は、製品が顧客に引き渡される前に発見された不良に関するコストであり、手直し・廃棄・再加工費用などが含まれる。",
   "外部失敗コスト（External failure cost）は、製品が顧客に引き渡された後に発見された不良に関するコストであり、クレーム対応・リコール・保証修理費用などが含まれる。",
   "PAF分類において、予防コストと評価コストの合計をコンプライアンスコスト（適合コスト）、内部・外部失敗コストの合計を非適合コストといい、適合コストを増大させても非適合コストは減少しないことが知られている。"
 ],
 ans:4,
 exp:"品質コスト理論では、予防コスト・評価コスト（適合コスト）を増大させることで不良が予防・早期発見され、内部・外部失敗コスト（非適合コスト）が減少するというトレードオフ関係がある。「適合コストを増大させても非適合コストは減少しない」という記述が誤り。最適品質水準では両者の合計が最小となる。"},

{id:"E08",cat:"経済性管理",type:"不適切",
 q:"企業の資金調達手法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ファクタリングとは、企業が保有する売掛債権を専門業者（ファクタ）に売却して資金を調達する手法であり、貸借対照表上の売掛債権を減少させ、資金化の迅速化が図れる。",
   "アセット・ファイナンスとは、企業が保有する資産（不動産・機械設備・知的財産等）を担保として、または資産の処分により資金を調達する手法の総称である。",
   "転換社債型新株予約権付社債（CB）は、一定の条件で株式に転換できる社債であり、通常の社債よりも低い利率で資金調達できる利点がある。",
   "クラウドファンディングは、インターネットを通じて不特定多数から少額資金を集める手法であり、購入型・融資型・株式型・寄付型などの形態があるが、いずれも金融商品取引法上の規制対象外である。",
   "MSCB（移動平均型転換価額修正条項付転換社債）は、株価下落に連動して転換価額が引き下げられる仕組みであり、既存株主の持分希薄化リスクが問題視されることがある。"
 ],
 ans:3,
 exp:"クラウドファンディングのうち、株式型・融資型（貸付型）は金融商品取引法・貸金業法等の規制対象となっており、「いずれも規制対象外」という記述が誤り。特に株式型クラウドファンディングは金融商品取引法の規制を受け、第一種・第二種金融商品取引業者等が関与する。"},

{id:"E09",cat:"経済性管理",type:"不適切",
 q:"EVMによるプロジェクト管理に関する次の記述のうち、最も不適切なものはどれか。なお、ある時点でのデータはPV（計画値）=1,000万円、EV（出来高）=800万円、AC（実コスト）=900万円とする。",
 opts:[
   "スケジュール差異SV=EV−PV=800−1,000=▲200万円であり、計画より遅延していることを示す。",
   "コスト差異CV=EV−AC=800−900=▲100万円であり、予算オーバーを示している。",
   "スケジュール効率指数SPI=EV÷PV=800÷1,000=0.8であり、1.0を下回るため計画より遅延している。",
   "コスト効率指数CPI=EV÷AC=800÷900≒0.89であり、1.0を下回るため費用対効果が計画を下回っている。",
   "完成時総コスト見積もりEAC=BAC÷CPIであり、CPIが1.0を上回っている場合は当初予算（BAC）より最終コストが高くなることを示す。"
 ],
 ans:4,
 exp:"EAC=BAC÷CPIで計算する場合、CPIが1.0「未満」のとき（コスト超過状況）最終コストがBACより高くなる。CPIが1.0を「上回る」場合はコスト効率が良く、最終コストはBAC未満になると予測される。「CPIが1.0を上回るとコストが高くなる」という記述が誤り（逆）。"},

{id:"E10",cat:"経済性管理",type:"不適切",
 q:"財務比率分析に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "流動比率（流動資産÷流動負債×100）は、短期的な支払能力を示す指標であり、一般に200%以上が望ましいとされるが、業種によって適正水準は異なる。",
   "自己資本比率（自己資本÷総資産×100）は、財務の安全性を示す指標であり、高いほど財務リスクが低いとされる。",
   "総資産回転率（売上高÷総資産）は、資産を効率的に活用して売上を上げているかを示す指標であり、高いほど資産効率がよい。",
   "ROE（自己資本利益率）はデュポン分解によって、売上高純利益率×総資産回転率×財務レバレッジの積として表すことができ、借入金を増やして財務レバレッジを高めればROEは必ず改善される。",
   "インタレスト・カバレッジ・レシオ（事業利益÷支払利息）は、支払利息を何倍の事業利益でカバーできるかを示す指標であり、1.0を下回ると支払利息を事業利益だけで賄えない状況を示す。"
 ],
 ans:3,
 exp:"財務レバレッジを高めると分子（純利益）も変化する。借入金増加→支払利息増加→純利益減少の可能性があり、「財務レバレッジを高めればROEは必ず改善される」という断定が誤り。過度な借入はかえって純利益を圧迫しROEが低下するリスクがある。"},

{id:"E11",cat:"経済性管理",type:"不適切",
 q:"デジタルトランスフォーメーション（DX）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "経済産業省のDXレポートでは、既存の複雑化・老朽化したレガシーシステムが維持・運用費用を増大させ、DX推進の障壁（2025年の崖）となる可能性が指摘されている。",
   "DXとは、ITの活用により製品・サービス・ビジネスモデルを変革するとともに、業務・組織・プロセス・企業文化を変革し、競争上の優位性を確立することを指す。",
   "デジタルガバナンス・コードは、企業がDXに取り組む際のガバナンスのあり方を示したものであり、DX認定制度の審査基準として活用されている。",
   "DXとIT化（単純なデジタル化・業務効率化）は本質的に同じであり、既存業務のデジタル化が完了した時点でDXが達成されたとみなされる。",
   "AIやIoT・クラウド等のデジタル技術を活用した新たなビジネスモデルへの転換は、DXの一形態として位置付けられる。"
 ],
 ans:3,
 exp:"DXは単なるIT化・業務デジタル化とは本質的に異なる。既存業務のデジタル化（IT化）はDXの前提条件に過ぎず、DXは「それを超えてビジネスモデルや企業文化の変革により競争優位を確立すること」を指す。「既存業務のデジタル化完了=DX達成」という記述が誤り。"},

{id:"E12",cat:"経済性管理",type:"不適切",
 q:"サプライチェーンマネジメント（SCM）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "SCMとは、原材料の調達から製造・流通・販売に至る供給連鎖全体を統合的に管理することで、在庫削減・リードタイム短縮・コスト削減等を実現する経営管理手法である。",
   "ブルウィップ効果（鞭の効果）とは、サプライチェーンの上流に向かうにつれて需要の変動が増幅される現象であり、情報の非対称性や発注の過剰反応が主な要因とされる。",
   "S&OP（Sales and Operations Planning）は、販売計画と生産・調達計画を統合し、企業全体の需給バランスを管理するプロセスであり、経営戦略と現場の整合性を高める効果がある。",
   "SCMにおけるERPは、企業内の財務・人事・生産・販売などの業務プロセスを統合したシステムであり、ERPを導入することでサプライチェーン上の全取引先の在庫情報がリアルタイムで把握できるようになる。",
   "グリーンSCMとは、サプライチェーン全体でのCO2排出量削減・廃棄物削減・持続可能な調達などの環境負荷低減を統合的に管理する取組である。"
 ],
 ans:3,
 exp:"ERP（企業資源計画）システムは自社内の業務プロセスを統合するシステムであり、「全取引先の在庫情報がリアルタイムで把握できるようになる」という記述が誤り。取引先との情報連携にはEDI・VMI・サプライヤーポータル等の別の仕組みが必要。ERPはあくまで自社内統合のツール。"},

{id:"E13",cat:"経済性管理",type:"不適切",
 q:"統計的品質管理に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "管理図において、測定値が管理限界（UCL/LCL）の外に出た場合は、何らかの特殊要因（異常）が存在する可能性が高いとして、原因の調査・処置を行う。",
   "工程能力指数Cpは、規格幅（SU−SL）を6σで除した値であり、一般にCpが1.33以上であれば工程能力が十分と判断される。",
   "特性要因図（石川図）は、結果（特性）と要因の関係を魚の骨のように表したものであり、QCの7つ道具の一つである。",
   "管理限界は、規格上限・下限と同一であり、規格外れ品が出た場合に工程が管理外れと判断される。",
   "過去のデータが正規分布に従う場合、管理限界を平均±3σに設定すると、工程が安定状態でも約0.27%の確率で管理限界外に点が打たれることになる。"
 ],
 ans:3,
 exp:"管理限界（UCL/LCL）と規格限界（規格上限・下限）は全く別の概念。管理限界は工程データの変動から統計的に算出されるもの（平均±3σ等）であり、製品の規格値とは無関係に設定される。「管理限界＝規格上限・下限」という記述が誤り。"},

{id:"E14",cat:"経済性管理",type:"不適切",
 q:"減価償却に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "定額法では、毎期均等額の償却費を計上し、取得原価から残存価値を引いた額を耐用年数で除して各期の償却額を算出する。",
   "定率法では、毎期の期首未償却残高に一定の償却率を乗じて償却費を計上するため、初期ほど償却額が大きく、年数が経つにつれて逓減する。",
   "税務上の耐用年数は会計上の経済的耐用年数と必ずしも一致しないが、多くの企業では税務上の法定耐用年数を会計上でも使用している。",
   "減価償却費はキャッシュアウトを伴わない費用であるため、営業キャッシュフローの計算（間接法）において、税引後純利益に加算することで調整が行われる。",
   "土地・借地権は非償却資産であるが、建物・構築物・機械装置・特許権・ソフトウェア等はすべて同一の法定耐用年数が適用される。"
 ],
 ans:4,
 exp:"建物・構築物・機械装置・特許権・ソフトウェア等は資産の種類ごとに異なる法定耐用年数が定められており、「すべて同一」という記述が誤り。例えば鉄骨鉄筋コンクリート造の建物（事務所用）は65年、ソフトウェア（複写販売用）は3年など、資産の種類・用途によって大きく異なる。"},

{id:"E15",cat:"経済性管理",type:"不適切",
 q:"TOC（制約理論）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "TOCとは、ゴールドラット博士が提唱した理論で、システム全体の生産量はボトルネック（制約）工程の能力によって決定されるという考え方に基づく管理手法である。",
   "TOCの5ステップでは、①制約を特定→②制約を徹底活用→③制約に他を従属→④制約を強化→⑤制約が解消されたら最初から繰り返す、という順序で改善を行う。",
   "スループット会計では、スループット（売上高−原材料費）・在庫投資（棚卸資産等）・業務費用（原材料費以外の費用）の3指標を用いてシステム全体の改善を測定する。",
   "DBR（ドラム・バッファ・ロープ）は、TOCに基づく生産スケジューリング手法であり、ボトルネックのペース（ドラム）に合わせて全工程を調整し、ボトルネック前にバッファ在庫を設ける。",
   "TOCでは、ボトルネック工程の能力増強（設備投資・要員追加）が最初のステップとして最優先されるべきとされており、現有資源での活用最大化は二次的な対策とされる。"
 ],
 ans:4,
 exp:"TOCの5ステップでは、まず「制約の特定→②制約の徹底活用（現有資源で最大限活用）→③他工程を従属」が先であり、設備投資等による「制約の強化」は④番目の対策。「設備投資が最初のステップとして最優先」という記述が誤り。現有資源での最大活用が先決。"},

{id:"E16",cat:"経済性管理",type:"適切",
 q:"デシジョンツリー（意思決定樹）を用いた期待値計算に関する次の記述のうち、最も適切なものはどれか。ある投資案について、好況確率60%で利益5,000万円、不況確率40%で損失1,000万円が予測される。",
 opts:[
   "この投資案の期待金額価値（EMV）は2,600万円であり、不確実性を考慮した合理的な投資判断に活用できる。",
   "この投資案のEMVは3,600万円であり、EMVがプラスであれば必ず投資すべき判断となる。",
   "EMVによる意思決定は、リスクを完全に排除した後の確定的な利益を意味する。",
   "EMVは常に実際に得られる利益を正確に予測するものであり、確率の見積もり誤差は結果に影響しない。",
   "デシジョンツリーでは、各分岐に確率を乗じた値の最小値をとることで最適な選択肢を決定する。"
 ],
 ans:0,
 exp:"EMV=5,000万×0.6+(−1,000万)×0.4=3,000万−400万=2,600万円。①が正しい。EMVはあくまで期待値であり実際の結果を保証するものではなく、確率の精度が結果に大きく影響する。意思決定者のリスク選好によってはEMV最大化が必ずしも最善の選択とならない点も重要。"},

{id:"E17",cat:"経済性管理",type:"適切",
 q:"LCC（ライフサイクルコスト）分析に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "LCCは、製品・設備の取得コストのみを評価対象とし、廃棄コストは含めないことが国際的な標準とされている。",
   "LCC分析は、設計段階よりも製造・運用段階に入ってから実施する方がコスト低減効果が大きい。",
   "LCC分析では、運用・保守コスト・廃棄コスト等を含めた製品のライフサイクル全体のコストを把握・最適化することで、初期投資コストを重視しすぎた意思決定の弊害を防ぐことができる。",
   "LCCにおいて初期取得コストが低い選択肢は、ライフサイクル全体でも常にトータルコストが低い。",
   "LCC分析は公共調達にのみ用いられる手法であり、民間企業の設備投資評価には適用されない。"
 ],
 ans:2,
 exp:"LCCは設計・製造・運用・保守・廃棄を含むライフサイクル全体のコストを評価する手法であり、③が正しい。設計段階でのLCC検討は後工程でのコスト低減余地が大きく、「設計段階での検討効果が大きい」。初期コストが低くても運用コスト・廃棄コストが高い場合にはLCCが高くなるため、取得コストだけでの判断は危険。"},

{id:"E18",cat:"経済性管理",type:"適切",
 q:"アジャイルプロジェクト管理（スクラム）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "スクラムでは、スプリント（通常2〜4週間の開発サイクル）を繰り返し、各スプリント終了時に動作するソフトウェアを提供することでフィードバックを早期に得る。",
   "スクラムにおけるプロダクトバックログは、スプリント開始後は一切変更できない固定されたリストである。",
   "スクラムマスターは、プロジェクトの技術的な意思決定を行い、チームメンバーの作業を細かく管理・指示する役割を担う。",
   "アジャイル開発では、要件定義・設計・実装・テストの各工程が厳格に分離されており、前工程が完全に完了してから次工程に進む。",
   "バーンダウンチャートは、スプリントの進捗を、残タスク量が時間とともに増加する様子を可視化したものである。"
 ],
 ans:0,
 exp:"スクラムのスプリントでは①の通り、短サイクルで動作するインクリメントを繰り返しリリースすることで早期フィードバックを得る。②プロダクトバックログはスプリント中も更新可能。③スクラムマスターはコーチ・ファシリテーター役であり指示・管理はしない。④はウォーターフォールの説明。⑤バーンダウンチャートは残作業量が「減少」する様子を示す。"},

{id:"E19",cat:"経済性管理",type:"適切",
 q:"コスト・ベネフィット分析（費用便益分析）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "費用便益分析では、便益の現在価値（PVB）を費用の現在価値（PVC）で除した便益費用比（B/C比）が1.0を下回るプロジェクトが採択されるべきである。",
   "費用便益分析は、金銭換算が困難な環境への影響や社会的公平性の効果も容易に定量化できるため、完全な意思決定ツールとして活用できる。",
   "割引率の選択は費用便益分析の結果に影響しないため、割引率は分析担当者が任意に設定してよい。",
   "費用便益分析における純現在価値（NPV=PVB−PVC）がプラスであることは、そのプロジェクトへの投資が社会全体から見て経済的に正当化される一つの判断基準となる。",
   "費用便益分析は、民間投資プロジェクトの評価にのみ用いられ、公共事業の評価には適用されない。"
 ],
 ans:3,
 exp:"費用便益分析では④の通り、NPV（純現在価値=便益現在価値−費用現在価値）がプラスであることが採択基準の一つ。B/C比は1.0「超」が採択基準（①が誤り）。環境価値・社会的公平性の定量化は困難であり分析の限界（②が誤り）。割引率の選択は結果に大きく影響する（③が誤り）。公共事業評価でも広く活用される（⑤が誤り）。"},

{id:"E20",cat:"経済性管理",type:"適切",
 q:"VE（バリューエンジニアリング）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "VEはコスト削減のみを目的とするため、機能の向上や品質の改善を伴う提案はVE活動の範囲外とされる。",
   "VEにおける「価値（V）」はコスト（C）を機能（F）で除した値（V=C/F）として定義され、価値を高めるには必ずコストを削減しなければならない。",
   "VEは製品の製造段階でのみ実施可能であり、設計段階や調達段階での適用は対象外とされている。",
   "VEにおける機能定義は「名詞＋他動詞」の形式で表され、機能の定量的評価と代替案検討を通じて価値向上を目指す体系的なアプローチである。",
   "VEと原価低減活動（コストダウン）は同一の概念であり、VEは既存の製品・工程に対して品質を維持したまま単純に材料費を削減する活動である。"
 ],
 ans:3,
 exp:"VEの機能定義は「動詞＋名詞」（例：「電流を通す」）の形式で表し、不必要な機能を排除・代替案検討により価値（V=F/C）を最大化する。④が正しい。VEの価値（V）はF/C（機能÷コスト）であり（②が誤り：V=C/Fではない）。VEはコスト削減のみでなく機能向上・品質改善も含む（①が誤り）。設計・調達・製造各段階で実施可能（③が誤り）。"},
{id:"H01",cat:"人的資源管理",type:"不適切",
 q:"労働基準法における三六協定（時間外・休日労働に関する労使協定）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "三六協定は、使用者と労働者の過半数で組織する労働組合（ない場合は過半数代表者）との間で書面により締結し、所轄労働基準監督署長に届出なければならない。",
   "三六協定に定める時間外労働の上限規制（月45時間・年360時間）は、建設業・医師・自動車運転業務についても令和6年4月1日から適用が開始された。",
   "三六協定の届出は、電子申請が可能であり、e-Govを通じてオンラインで行うことができる。",
   "三六協定を締結・届出していれば、使用者は労働者を上限規制の範囲内で無制限に時間外労働をさせることができ、個別の労働者の同意は不要である。",
   "特別条項付き三六協定における時間外・休日労働の合計は、月100時間未満、かつ2〜6か月平均が80時間以内でなければならない。"
 ],
 ans:3,
 exp:"三六協定の締結・届出は時間外労働をさせるための「法的根拠」を与えるものだが、実際に時間外労働を命じるには就業規則上の根拠と業務命令が必要であり、また個々の労働者の健康状態等への配慮義務もある。「無制限に・個別の同意不要」という断定が誤り。特に36協定上限規制自体が罰則付き規制として機能している。"},

{id:"H02",cat:"人的資源管理",type:"不適切",
 q:"障害者雇用促進法に関する次の記述のうち、最も不適切なものはどれか。なお、特段の記載がない限り、令和6年4月1日時点の情報とする。",
 opts:[
   "民間企業の法定雇用率は令和6年4月から2.5%、令和8年7月からは2.7%に段階的に引き上げられることが定められている。",
   "障害者雇用納付金は、法定雇用率を達成していない常用労働者100人超の企業から、不足1人当たり月額50,000円（一部は40,000円）が徴収される仕組みである。",
   "精神障害者（精神障害者保健福祉手帳所持者）は、障害者雇用率制度の算定対象に含まれており、一定の条件を満たす場合には実雇用率上の算定で優遇措置がある。",
   "障害者雇用促進法は、障害者の雇用義務を定めるだけでなく、差別禁止および合理的配慮の提供義務（努力義務ではなく法的義務）を事業主に課している。",
   "法定雇用率を達成した企業に対しては、いかなる場合でも障害者雇用に関する助成金が支給されることはなく、未達成企業のみが助成対象となる。"
 ],
 ans:4,
 exp:"障害者雇用に関する助成金（特定求職者雇用開発助成金・障害者職場定着支援奨励金等）は、法定雇用率達成企業であっても受給可能な制度が多数ある。「法定雇用率達成企業には助成金支給なし」という断定が誤り。"},

{id:"H03",cat:"人的資源管理",type:"不適切",
 q:"職場におけるパワーハラスメント防止対策（労働施策総合推進法）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "パワーハラスメントは、①優越的な関係を背景とした言動、②業務上必要かつ相当な範囲を超えたもの、③労働者の就業環境が害されるもの、の3要素をすべて満たすものをいう。",
   "事業主は、パワーハラスメント防止のための雇用管理上の措置（方針の明確化・周知、相談体制の整備等）を講じる義務があり、中小企業主についても令和4年4月から義務化されている。",
   "業務上の指導であっても、業務上必要かつ相当な範囲を超えた言動はパワーハラスメントに該当する可能性があり、「厳しく指導した」という意図のみでは免責されない。",
   "パワーハラスメントの相談を受けた事業主は、相談者・行為者双方のプライバシーを保護する義務があるが、行為者に対しては必ず懲戒処分を行わなければならない。",
   "顧客・取引先・就職活動中の学生・インターンシップ生等からの迷惑行為（いわゆるカスタマーハラスメント）への対応として、事業主に雇用管理上の措置義務が課されている。"
 ],
 ans:3,
 exp:"事業主は調査結果に基づき「適切な措置」を講じる義務があるが、懲戒処分が必須とは規定されていない。事実確認の結果に応じて配置転換・注意指導・懲戒処分等の中から適切なものを選択する。「必ず懲戒処分」という断定が誤り。⑤は令和6年施行の改正でカスハラ対策措置義務が追加。"},

{id:"H04",cat:"人的資源管理",type:"不適切",
 q:"外国人労働者の雇用に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "使用者は、外国人労働者を雇用した場合及び離職した場合に、ハローワーク（公共職業安定所）への届出が義務付けられている。",
   "特定技能1号は、特定産業分野において相当程度の知識・経験を必要とする業務に従事できる在留資格であり、家族の帯同は原則認められていない。",
   "特定技能2号は、熟練した技能を要する業務に従事できる在留資格であり、在留期間の更新に上限はなく、要件を満たせば永住権申請の実績期間に算入できる。",
   "技能実習制度は、令和6年に廃止・廃止方向が決まり、育成就労制度への移行が予定されているが、育成就労制度では転籍の自由が完全に認められ、入国直後でも自由に職場を変更できる。",
   "外国人を雇用する際は、在留資格とその活動内容の確認が必要であり、在留資格に定められた活動以外の業務に従事させることは不法就労助長罪に問われる可能性がある。"
 ],
 ans:3,
 exp:"育成就労制度（技能実習制度廃止後の新制度）では、一定の要件（1〜2年の就労実績等）を満たした後に転籍が認められる予定であり、「入国直後でも自由に転籍可能」という記述が誤り。転籍には就労期間等の条件が設けられる方針。"},

{id:"H05",cat:"人的資源管理",type:"不適切",
 q:"労働契約法における無期転換ルールに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "有期労働契約が通算5年を超えて更新された場合、労働者の申込みにより無期労働契約に転換する権利（無期転換申込権）が発生する。",
   "無期転換後の労働条件は、別段の定めをしない限り、転換直前の有期労働契約の労働条件と同一となる（職務・勤務地・賃金等の向上は自動的には行われない）。",
   "高度専門職（年収1,075万円以上の高度専門的知識を有する者）および継続雇用の高年齢者については、特例として無期転換申込権が発生するまでの期間が延長されている。",
   "有期契約労働者について、雇用期間に「空白期間（クーリング期間）」が6か月以上ある場合、その前後の通算契約期間はリセットされるため、企業は5年ごとに6か月以上の空白を設けることで無期転換を回避できる。",
   "無期転換申込権は、有期契約更新の度に発生するわけではなく、通算期間が5年を超えた契約更新時点から申込権が発生し、次の契約期間内に申し込まなければ権利が消滅する。"
 ],
 ans:3,
 exp:"クーリング期間によるリセットは確かに規定されているが、「企業が意図的に5年ごとに雇い止め→6か月空白→再雇用」という手法は、雇止め法理（労働契約法19条）上の問題が生じる可能性があり「回避できる」という単純断定が誤り。また意図的な雇い止めは同法違反・解雇権濫用に準ずる判断がされるリスクがある。"},

{id:"H06",cat:"人的資源管理",type:"不適切",
 q:"ジョブ型雇用に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ジョブ型雇用では、職務定義書（ジョブディスクリプション）によって職務・役割・責任・報酬が明確化されており、担当職務に基づいて採用・評価・処遇が決定される。",
   "メンバーシップ型雇用（日本型雇用）では、職務・勤務地・労働時間を限定せずに採用し、企業内でのOJTを通じて人材を育成する傾向があり、長期雇用・年功序列と親和性が高い。",
   "ジョブ型雇用への移行に際しては、すべての従業員を一律にジョブ型に切り替えることが唯一の方法とされており、管理職のみ・特定職種のみへの部分的適用は認められていない。",
   "ジョブ型雇用では、担当する職務がなくなった場合に雇用継続の根拠が失われやすく、リストラクチャリングのリスクがメンバーシップ型より高まる可能性がある。",
   "経団連・政府のガイドラインでは、ジョブ型人事制度への移行にあたり、同一労働同一賃金の原則との整合性確保と、社員への丁寧な説明・合意形成が重要とされている。"
 ],
 ans:2,
 exp:"ジョブ型雇用への移行は、全社一律切替が唯一の方法ではなく、管理職層・専門職・特定部門への部分的導入（ハイブリッド型）として段階的に進めている企業が多い。「一律切替が唯一の方法・部分適用は認められない」という記述が誤り。"},

{id:"H07",cat:"人的資源管理",type:"不適切",
 q:"360度評価（多面評価）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "360度評価は、上司だけでなく同僚・部下・場合によっては顧客等、複数の評価者からフィードバックを収集する評価手法であり、特に管理職の行動・マネジメントスキル向上に有効とされる。",
   "360度評価では、評価者の匿名性が確保されることで率直なフィードバックが得やすくなる利点があるが、匿名ゆえに評価根拠の確認が難しい面もある。",
   "360度評価の結果は、被評価者の報酬決定に必ず直結させることが制度設計上の原則とされており、開発目的のみに使用することは制度の趣旨に反する。",
   "360度評価は、評価者自身のバイアスや評価スキルの差異が結果に影響することがあるため、評価者訓練（フィードバックスキル向上研修等）が有効である。",
   "360度評価を定期的に実施することで、被評価者が自身の強みと改善点をより多面的に認識し、行動変容・能力開発につなげることが期待できる。"
 ],
 ans:2,
 exp:"360度評価は報酬決定に使う「評価型」と、本人の成長・開発目的に使う「育成型」の両方の活用があり、「必ず報酬に直結させることが原則・開発目的のみは趣旨違反」という記述が誤り。むしろ導入初期は育成目的のみに限定し、報酬への連動は慎重に行うことが推奨される場合もある。"},

{id:"H08",cat:"人的資源管理",type:"不適切",
 q:"心理的安全性（Psychological Safety）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "心理的安全性とは、エイミー・エドモンドソン教授が提唱した概念で、チームのメンバーが対人リスクを恐れずに発言・質問・アイデア表明ができると信じられる状態を指す。",
   "Googleのプロジェクト・アリストテレスでは、高いパフォーマンスを発揮するチームの特徴として、心理的安全性が最も重要な因子として特定された。",
   "心理的安全性が高いチームとは、メンバー全員が何でも自由に発言できる「仲良し集団」であり、責任感や成果への規律は重要ではないとされる。",
   "心理的安全性は、リーダー（管理職）の行動・コミュニケーションスタイルによって大きく影響を受けるため、リーダー自身がオープンな態度・フィードバックの受容を示すことが重要である。",
   "心理的安全性が低い職場では、失敗への恐れから報告・相談を避けるようになり、問題の早期発見・改善が妨げられるリスクがある。"
 ],
 ans:2,
 exp:"心理的安全性の高いチームは「仲良し・ぬるい集団」ではなく、率直な意見・批判・挑戦的なアイデアを安心して表明できる状態を指す。エドモンドソンは、心理的安全性と「責任感・成果への説明責任（accountability）」の両立が重要と強調している。「責任感は重要でない」という記述が誤り。"},

{id:"H09",cat:"人的資源管理",type:"不適切",
 q:"人的資本経営とISO 30414に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "人的資本経営とは、人材を「コスト」ではなく「資本」として捉え、その価値を最大限に引き出すことで中長期的な企業価値向上につなげる経営のあり方を指す。",
   "2023年から、有価証券報告書を提出する一定の上場企業等は、人的資本に関する情報（女性管理職比率・男性育児休業取得率・男女間賃金格差等）の開示が義務付けられた。",
   "ISO 30414は、人的資本の測定・報告に関する国際規格であり、採用・リーダーシップ・健康・安全・生産性・ウェルビーイングなど11の分野について推奨開示項目を定めている。",
   "人的資本の情報開示は、財務情報と同様に公認会計士による第三者監査が義務付けられており、未監査の情報を有価証券報告書に記載することは法令上禁止されている。",
   "「人材版伊藤レポート2.0」では、人的資本経営の推進にあたり「経営戦略と人材戦略の連動」「As is-To be ギャップの定量把握」「企業文化への定着」の重要性が強調されている。"
 ],
 ans:3,
 exp:"人的資本情報の開示（有価証券報告書への記載）については、現時点では公認会計士による第三者財務諸表監査のような義務的監査は求められていない。任意での第三者保証を取得する企業は増えているが、「義務付けられており未監査は禁止」という記述が誤り。"},

{id:"H10",cat:"人的資源管理",type:"不適切",
 q:"最低賃金法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "地域別最低賃金は、都道府県ごとに最低賃金審議会の審議を経て決定され、当該都道府県の区域内の最低賃金額として適用される。",
   "特定最低賃金（産業別最低賃金）は、特定産業の労使が合意して設定する賃金であり、地域別最低賃金より高い水準に設定されることが前提とされている。",
   "最低賃金を下回る賃金を定めた労働契約は、その部分については無効となり、最低賃金額と同額の定めをしたものとみなされる。",
   "最低賃金法の適用は、正規雇用の労働者に限定されており、パートタイム労働者・アルバイト・派遣労働者等の非正規雇用者への適用は各都道府県の条例に委ねられている。",
   "最低賃金額以上の賃金を支払わなかった使用者に対しては、罰則（50万円以下の罰金）が適用される場合がある。"
 ],
 ans:3,
 exp:"最低賃金法はパートタイム・アルバイト・派遣労働者を含む「すべての労働者」に適用される。「正規雇用のみ適用・非正規は都道府県の条例に委ねる」という記述が誤り。雇用形態に関わらず一律に適用されることが同法の基本原則。"},

{id:"H11",cat:"人的資源管理",type:"不適切",
 q:"男女雇用機会均等法（雇用の分野における男女の均等な機会及び待遇の確保等に関する法律）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "事業主は、募集・採用・配置・昇進・降格・教育訓練・福利厚生・職種変更・雇用形態変更・退職勧奨・定年・解雇・労働契約の更新について、性別を理由とする差別的取扱いをしてはならない。",
   "間接差別とは、外見上は性別に中立な基準・条件であっても、実質的に一方の性別に不利益をもたらす措置であり、一定の場合は違法とされる。",
   "セクシュアルハラスメント防止措置として、事業主は相談体制の整備・方針の明確化等の措置を講じる義務があり、これは規模に関わらずすべての事業主に課される。",
   "妊娠・出産・育児休業等を理由とする不利益取扱い（マタニティハラスメント）の禁止は、女性労働者のみを対象としており、育児休業を取得した男性労働者への不利益取扱いは同法の保護対象外である。",
   "ポジティブアクション（積極的改善措置）として、過去の差別等により女性の活躍が不十分な場合に、一定範囲内で女性を有利に取り扱う措置を講じることは、男女雇用機会均等法上認められている。"
 ],
 ans:3,
 exp:"育児休業を取得した男性労働者への不利益取扱い（パタニティハラスメント）は、育児介護休業法の改正により事業主の防止措置義務が課されている。「男性への不利益取扱いは保護対象外」という記述が誤り。男性の育休取得促進に伴い、男性へのハラスメント防止も法的に手当てされている。"},

{id:"H12",cat:"人的資源管理",type:"不適切",
 q:"過労死等防止対策推進法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "過労死等防止対策推進法では、国・地方公共団体・事業主が連携して過労死等の防止対策を推進することを定めており、毎年11月を「過労死等防止啓発月間」としている。",
   "労災認定における脳・心臓疾患の業務上の認定基準（過労死ライン）は、発症前1か月間に概ね100時間、または発症前2〜6か月間に月平均で概ね80時間を超える時間外労働があった場合等が目安とされる。",
   "精神障害（うつ病等）の労災認定では、心理的負荷の評価表に基づく評価が行われており、「特別な出来事」として極度の長時間労働があった場合には、それ単独で強度「強」と評価されることがある。",
   "過労死等防止のために設定された時間外労働の上限規制（三六協定の特別条項でも月100時間・2〜6月平均80時間以内）を遵守していれば、脳・心臓疾患の労災認定がされることは一切ない。",
   "過労死等防止対策推進協議会は、有識者・労働者代表・使用者代表・都道府県警察の長等で構成されており、過労死等防止対策の大綱の策定等に関与する。"
 ],
 ans:3,
 exp:"三六協定の上限規制を遵守していても、個々の労働者の健康状態・業務内容・職場環境等によっては脳・心臓疾患の労災認定がされる場合がある。法定上限≦過労死ラインを意味しないケースも存在する。「遵守していれば一切認定されない」という断定が誤り。"},

{id:"H13",cat:"人的資源管理",type:"不適切",
 q:"テレワーク（在宅勤務）ガイドライン（厚生労働省）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "テレワーク中の労働時間管理は使用者の義務であり、テレワーク実施中であっても労働基準法の労働時間規制が適用される。",
   "テレワーク中に「中抜け時間（一時的に業務を離れる時間）」が生じた場合、使用者がその時間を把握し、労働時間として扱わないとすることができる。",
   "テレワークに必要な通信費・光熱費等については、就業規則・労使協定等に費用負担のルールを明記することが望ましいとされている。",
   "テレワーク実施中の労働者については、事業場での安全衛生管理義務が使用者に一切生じないため、健康診断や長時間労働者への医師による面接指導は免除される。",
   "サテライトオフィス勤務は、テレワークの一形態として位置付けられており、専用型・共用型サテライトオフィスでの勤務も含まれる。"
 ],
 ans:3,
 exp:"テレワーク実施中でも、事業者は労働安全衛生法上の安全衛生管理義務（健康診断・長時間労働者への面接指導・ストレスチェック等）を免れない。「事業場の安全衛生管理義務が一切生じない・面接指導は免除」という記述が誤り。"},

{id:"H14",cat:"人的資源管理",type:"不適切",
 q:"労働者派遣法（労働者派遣事業の適正な運営の確保及び派遣労働者の保護等に関する法律）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "派遣先の同一の組織単位（課など）への同一派遣労働者の派遣期間は原則3年が上限とされており、3年を超えて継続させるためには、派遣先の過半数労働組合等への意見聴取が必要である。",
   "派遣先企業は、派遣労働者から苦情の申出を受けた場合、その苦情の内容を派遣元事業主に通知するとともに、自らも誠実に対応しなければならない。",
   "派遣元事業主は、派遣労働者と有期雇用契約を締結している場合、派遣先における就業が終了した後も、次の派遣先が決まるまでの間は「無給」とすることが法律上認められている。",
   "派遣労働者の同一労働同一賃金については、「派遣先均等・均衡方式」または「労使協定方式」のいずれかにより、不合理な待遇差の解消が求められる。",
   "いわゆる「派遣の3年ルール」は、同一の派遣先事業所への派遣期間についても原則3年の上限があり、3年経過後に継続させるには手続きが必要となる。"
 ],
 ans:2,
 exp:"派遣元事業主は、有期雇用の派遣労働者について、派遣先での就業が終了した後も次の派遣が決まるまでの間、「使用者責任として賃金を支払うか安定した雇用確保措置を講じる」必要がある（派遣切りや長期の無給放置は労働契約違反）。「無給とすることが法律上認められている」という記述が誤り。"},

{id:"H15",cat:"人的資源管理",type:"不適切",
 q:"仕事と介護の両立支援（ビジネスケアラー問題）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ビジネスケアラーとは、就労しながら家族の介護を担う労働者のことであり、経済産業省の試算では2030年に約318万人に達し、労働生産性への影響が懸念されている。",
   "介護休業は、要介護状態にある対象家族1人につき通算93日（3回を上限として分割可能）取得することができる。",
   "介護のための所定労働時間の短縮措置等は、介護休業の取得とは別に、対象家族1人につき利用開始の日から3年間のうち2回以上の利用が可能とされている。",
   "事業主は、65歳以上の労働者が介護を理由に退職することを防ぐため、法律上「介護離職ゼロ」を義務として達成しなければならない。",
   "令和7年4月1日施行の育児介護休業法改正では、介護に直面した労働者への個別周知・意向確認の義務付けや、介護休暇取得のための要件緩和が予定されている。"
 ],
 ans:3,
 exp:"「介護離職ゼロ」は政府の政策目標であり、事業主に個々の労働者の介護離職を法律上の義務として「ゼロにすること」を課しているわけではない。介護支援措置の整備・周知は義務化されつつあるが、「介護離職ゼロの達成義務」という断定が誤り。"},

{id:"H16",cat:"人的資源管理",type:"適切",
 q:"職業能力開発促進法（リカレント教育・学び直し支援）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "事業主は、雇用する労働者に対して職業訓練を実施することが法律上義務付けられており、訓練計画を都道府県知事に提出しなければならない。",
   "教育訓練給付制度は、雇用保険の被保険者期間が一定以上の労働者が対象の講座を受講・修了した場合に、受講費用の一部が支給される制度であり、専門実践教育訓練給付では最大70%が支給される。",
   "リカレント教育とは、18歳から22歳の間に高等教育を受けることが社会的に望ましいとされており、社会人が再び教育機関で学ぶことは想定されていない。",
   "公的な職業訓練（ハロートレーニング）は、求職者のみが対象であり、在職中の労働者は制度の対象外である。",
   "キャリアコンサルタントは国家資格であり、労働者の職業選択・職業生活設計・職業能力開発に関する相談・助言・指導を行う。"
 ],
 ans:4,
 exp:"キャリアコンサルタントは職業能力開発促進法に基づく国家資格であり、⑤が正しい。②について専門実践教育訓練給付は最大70%（最大112万円/年）が支給される（ただし条件あり）。①訓練実施は努力義務。③リカレント教育は社会人の学び直し全般を指す概念。④在職者向けの公的訓練も存在する。"},

{id:"H17",cat:"人的資源管理",type:"適切",
 q:"高年齢者雇用安定法（70歳就業確保措置）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "65歳から70歳までの就業機会確保措置（70歳就業確保措置）は、令和3年4月から全事業主に対して義務として課されている。",
   "70歳就業確保措置の選択肢には、①70歳までの定年引上げ、②定年廃止、③70歳までの継続雇用制度の導入、④70歳まで継続的に業務委託契約を締結できる制度の導入、⑤70歳まで継続的に社会貢献事業に従事できる制度の導入が含まれ、④⑤は労使間で計画書への同意が求められる。",
   "70歳就業確保措置の対象者は、希望するすべての高年齢者であり、事業主は対象者を能力・勤務態度等の基準で絞り込むことはできない。",
   "70歳就業確保措置を講じていない事業主に対しては、即座に行政処分（業務停止命令等）が発動される。",
   "70歳就業確保措置は、雇用による継続（①〜③）のみが認められており、業務委託や社会貢献事業への参加は措置に含まれない。"
 ],
 ans:1,
 exp:"②が正しい。70歳就業確保措置には雇用継続（①〜③）に加え、④業務委託・⑤社会貢献事業参加の措置が選択肢に含まれ、④⑤は過半数労働組合等との間で計画書への同意が要件となる。①は令和3年4月から「努力義務」（義務ではない）として課された。"},

{id:"H18",cat:"人的資源管理",type:"適切",
 q:"労働安全衛生法におけるストレスチェック制度に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "ストレスチェック制度は、常時使用する労働者が10人以上のすべての事業場に実施が義務付けられている。",
   "ストレスチェックの実施は、医師・保健師のほか、一定の研修を修了した看護師・精神保健福祉士・歯科医師・公認心理師も実施者となることができる。",
   "ストレスチェックの結果は、事業者の求めに応じて、実施者から事業者に必ず提供しなければならない。",
   "高ストレスと判定された労働者が医師による面接指導を申し出た場合、事業者はその申し出を拒否することができる。",
   "ストレスチェックは、労働者が任意に受検を拒否できない強制的な制度であり、受検しない者には懲戒処分を行うことができる。"
 ],
 ans:1,
 exp:"②が正しい。実施者（医師・保健師の他）として、一定の研修修了者として看護師・精神保健福祉士・公認心理師等も認められている。①50人以上の事業場に義務付け（50人未満は努力義務）。③ストレスチェック結果は本人同意なしに事業者へ提供不可。④面接申し出は拒否不可。⑤受検は労働者の任意（強制不可）。"},

{id:"H19",cat:"人的資源管理",type:"適切",
 q:"同一労働同一賃金原則（パートタイム・有期雇用労働法および労働者派遣法の改正）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "同一労働同一賃金原則では、正規・非正規労働者間のすべての待遇差が禁止されており、職務内容・配置変更の範囲が異なる場合でも一切の待遇差は認められない。",
   "基本給・賞与・各種手当・福利厚生・教育訓練・安全管理措置等の待遇について、不合理な待遇差は禁止されるが、合理的な理由（職務内容・配置変更範囲・その他の事情）に基づく差異は許容される。",
   "パートタイム・有期雇用労働法における不合理な待遇差の禁止規定（均衡待遇）は、大企業にのみ適用され、中小企業は2030年まで適用が猶予されている。",
   "非正規労働者が正規労働者との待遇差の内容・理由について事業主に説明を求めた場合、事業主はその説明を断ることができる。",
   "同一労働同一賃金の対象となる待遇は基本給と賞与のみであり、福利厚生や社内研修への参加については正規・非正規間の差異を設けることが許容されている。"
 ],
 ans:1,
 exp:"②が正しい。同一労働同一賃金は全待遇差の禁止ではなく、「不合理な」待遇差を禁止するもの。職務内容・配置変更範囲の違い等に基づく合理的な差異は認められる（均衡待遇・均等待遇の区分）。①全待遇差禁止は誤り。③中小企業にも全面適用済み。④説明義務は拒否不可。⑤全待遇が対象。"},

{id:"H20",cat:"人的資源管理",type:"適切",
 q:"近年のウェルビーイング経営に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "ウェルビーイング（Well-being）とは、身体的健康のみを指す概念であり、精神的・社会的な側面は経営の範囲外とされる。",
   "ウェルビーイング経営とは、従業員の幸福感・生活の質・働きがいを高めることで、エンゲージメント向上・離職率低下・生産性向上につながるとされる経営戦略である。",
   "OECD（経済協力開発機構）のウェルビーイング指標では、GDPの成長率が最も重要な指標とされており、主観的幸福感は評価対象に含まれない。",
   "ウェルビーイング経営に取り組む企業に対しては、法律上必ず税制優遇措置が適用される。",
   "従業員のウェルビーイング向上は、企業の短期的な財務パフォーマンスのみに影響し、長期的な企業価値への貢献は学術的に否定されている。"
 ],
 ans:1,
 exp:"②が正しい。ウェルビーイング経営は従業員の身体的・精神的・社会的健康と幸福感を高めることでエンゲージメント・生産性・定着率の向上につなげる経営戦略。WHOが定義するウェルビーイングは身体・精神・社会的側面を含む（①が誤り）。OECDも主観的幸福感を含む多次元指標を使用（③が誤り）。"},
{id:"I01",cat:"情報管理",type:"不適切",
 q:"生成AIのセキュリティリスクに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "プロンプトインジェクション攻撃とは、AIシステムへの入力に悪意ある命令を埋め込むことで、AIに意図しない動作をさせたり、機密情報を漏洩させたりする攻撃手法である。",
   "生成AIが学習に用いたデータに含まれる個人情報や機密情報が、出力に意図せず含まれるリスク（学習データ漏洩リスク）が指摘されており、入力データの管理が重要である。",
   "生成AIサービスに入力したプロンプト・データは、AIプロバイダーのサービス規約や設定によってはモデルの学習に利用される可能性があるため、機密情報の入力には注意が必要である。",
   "生成AIのハルシネーション（事実と異なる情報の生成）は、AIが「知らない」と答えられないシステム上の設計欠陥であり、最新世代のLLMではすでに完全に解消されている。",
   "AIが生成したコンテンツ（フェイク画像・動画・文章等）を用いたディープフェイク・偽情報拡散のリスクが高まっており、情報の真偽確認（ファクトチェック）の重要性が増している。"
 ],
 ans:3,
 exp:"ハルシネーションはLLMの確率的な生成メカニズムに起因する本質的な課題であり、最新世代のモデルでも完全には解消されていない。「設計欠陥」ではなく生成モデルの構造的特性であり、「最新世代で完全解消済み」という記述が誤り。ハルシネーション対策（RAG・事実確認等）は引き続き重要な課題。"},

{id:"I02",cat:"情報管理",type:"不適切",
 q:"個人情報保護法（令和4年全面施行の改正を踏まえて）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "令和4年改正により、漏洩等が発生した場合（または発生のおそれが大きい場合）の個人情報保護委員会への報告・本人への通知が義務化された。",
   "「仮名加工情報」は、他の情報と照合しない限り特定個人を識別できないよう加工したものであり、第三者への提供制限があるが、同一事業者グループ内でのデータ活用には利用しやすい。",
   "個人情報の域外移転（第三国への提供）については、一定の要件（相手国の体制・契約による保護措置等）を満たす場合のみ認められる規制が設けられている。",
   "クッキー（Cookie）等を通じて収集されるWeb上の閲覧履歴データは、単独では個人を特定できないため、すべての場合において個人情報保護法の規制対象とならない。",
   "本人が自らの個人情報の利用停止・消去を事業者に請求できる権利（利用停止請求権）は、令和4年改正によりその行使要件が拡充された。"
 ],
 ans:3,
 exp:"クッキー等の閲覧履歴データは、単独では個人を特定できない場合も、他の情報と組み合わせることで個人を識別できる場合には「個人情報」に該当し、また「個人関連情報」として第三者提供規制の対象となる場合がある。「すべての場合において規制対象外」という断定が誤り。"},

{id:"I03",cat:"情報管理",type:"不適切",
 q:"サイバーセキュリティ基本法および政府のサイバーセキュリティ体制に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "サイバーセキュリティ基本法は、サイバーセキュリティに関する施策を総合的・効果的に推進するための基本理念・国の責務・重要インフラ事業者の努力義務等を定めた法律である。",
   "内閣官房に設置されたNISC（内閣サイバーセキュリティセンター）は、政府機関全体のサイバーセキュリティ政策の立案・調整・監視・支援を担う組織である。",
   "重要インフラ事業者（電力・ガス・水道・金融・交通等）については、サイバーセキュリティ基本法の下で、政府との情報共有・演習への参加等が求められている。",
   "サイバーセキュリティ基本法においては、サイバー攻撃を受けた民間企業は、その被害内容を必ず政府に報告する法的義務が課されており、未報告には刑事罰が科される。",
   "「サイバーセキュリティ戦略」は、国のサイバーセキュリティに関する施策の基本的な方向性を示すものであり、NISCが中心となって策定・推進している。"
 ],
 ans:3,
 exp:"サイバーセキュリティ基本法は民間企業に対してサイバー攻撃被害の政府報告を「法的義務・刑事罰付き」で課してはいない（重要インフラ等は業所管法令の届出義務がある場合はあるが）。「すべての民間企業に法的報告義務・未報告に刑事罰」という記述が誤り。"},

{id:"I04",cat:"情報管理",type:"不適切",
 q:"DX推進に関する政策ツール（デジタルガバナンス・コード・DX認定制度）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "デジタルガバナンス・コードは、企業がDXに取り組む際の経営課題・経営戦略・体制・実績等についてのベストプラクティスをまとめたものであり、経済産業省が策定している。",
   "DX認定制度は、デジタルガバナンス・コードの基本的事項に対応できていると認められる企業をDX認定事業者として認定する制度であり、申請は任意である。",
   "DX銘柄（DX Stock Selection）は、DX認定取得企業の中から株式市場において高い評価を受けている企業を選定・紹介するものであり、投資家向け情報提供の性格を持つ。",
   "DX認定を取得した企業は、中小企業投資促進税制等の税制優遇措置の適用において、DX関連投資について無条件かつ無期限に税控除を受けることができる。",
   "経済産業省が公表する「DXレポート」では、レガシーシステムの刷新・データ活用基盤の構築・デジタル人材の確保・育成が重要な課題として挙げられている。"
 ],
 ans:3,
 exp:"DX認定取得企業への税制優遇（中小企業等経営強化法に基づく税制等）は一定の要件と期間・上限が設けられており、「無条件かつ無期限に税控除」という記述が誤り。具体的な優遇措置の内容・適用要件は制度改正により変化するため、最新情報の確認が必要。"},

{id:"I05",cat:"情報管理",type:"不適切",
 q:"IoTセキュリティに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "IoT機器は、出荷後に長期間にわたり使用される場合が多く、ファームウェアの脆弱性が発見された際の迅速なアップデート対応（パッチ管理）が重要な課題である。",
   "SBOM（Software Bill of Materials）とは、ソフトウェアを構成するコンポーネント・ライブラリとそのバージョン情報を記載したリストであり、脆弱性管理に活用される。",
   "IoT機器のデフォルトパスワード（製品出荷時に設定された初期パスワード）の変更を促さない設計は、セキュリティリスクの一因とされており、各国でデフォルトパスワード変更義務化の規制が進んでいる。",
   "IoT機器は、ネットワーク接続することでデータの遠隔収集・制御が可能になるが、ネットワークに接続されていないIoT機器はサイバー攻撃のリスクがないため、セキュリティ対策は不要である。",
   "OT（Operational Technology）セキュリティとは、製造設備・インフラ設備等の制御システムへのサイバー攻撃対策であり、IT環境とは異なる稼働継続優先の特性を踏まえたアプローチが必要とされる。"
 ],
 ans:3,
 exp:"「ネットワークに接続されていない機器にはサイバー攻撃リスクなし・セキュリティ対策不要」という記述が誤り。オフラインのIoT機器でもUSBメモリ・保守端末経由の攻撃（エアギャップ越え攻撃）が実例として報告されており、物理的なアクセス制御・ソフトウェア管理等のセキュリティ対策が必要。"},

{id:"I06",cat:"情報管理",type:"不適切",
 q:"量子コンピュータと暗号技術への影響に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "量子コンピュータは、ショアのアルゴリズムを用いることで、現在の公開鍵暗号（RSA・楕円曲線暗号等）を従来のコンピュータより格段に高速に解読できる可能性があるとされている。",
   "量子コンピュータに対して安全性が期待される「耐量子計算機暗号（PQC：Post-Quantum Cryptography）」の標準化が進んでおり、NISTが標準アルゴリズムを選定・公表している。",
   "量子鍵配送（QKD）は、量子力学の原理を利用して理論上盗聴を検知・防止できる鍵配送技術であり、実用化・商用サービスが一部で始まっている。",
   "現在のAES（Advanced Encryption Standard）等の共通鍵暗号は、量子コンピュータによってRSA暗号と同等のリスク（現実的な時間での解読）にさらされるため、即座にすべて廃止すべきである。",
   "「暗号後（Harvest Now, Decrypt Later）」攻撃とは、現時点では解読できない暗号化データを収集・保存し、将来の量子コンピュータが実用化された時点で解読しようとする攻撃手法の概念である。"
 ],
 ans:3,
 exp:"AES等の共通鍵暗号は、量子コンピュータに対しても鍵長を倍増させる（AES-256を使用する等）ことで対応可能とされており、RSA暗号（公開鍵暗号）と同等のリスクにさらされるわけではない。「即座に廃止すべき」という断定が誤り。PQC移行も鍵長延長・ハイブリッド方式等で段階的に対応するのが実務的アプローチ。"},

{id:"I07",cat:"情報管理",type:"不適切",

 opts:[
   "EU AI法は、AIシステムをリスクの高さに応じて「受け入れられないリスク」「高リスク」「限定的リスク」「最小リスク」の4つに分類し、リスクに応じた規制を適用する枠組みである。",
   "「受け入れられないリスク」に分類されるAIシステム（社会的スコアリングシステム・公共空間でのリアルタイム遠隔生体認証等）は、原則として禁止される。",
   "「高リスク」AIシステム（採用・教育・重要インフラ管理等への活用）については、透明性・説明可能性・人間による監督等の要件が課せられる。",
   "汎用AI（GPAI：General Purpose AI）モデル（大規模言語モデル等）については、EU AI法の規制対象外とされており、GPAIを活用したアプリケーションのみが規制を受ける。",
   "EU AI法は、EU域内でAIシステムを使用・販売・提供する事業者に適用されるため、EU域外（日本・米国等）の企業であっても、EU市場向けのAIシステムを提供する場合は対応が必要になる。"
 ],
 ans:3,
 exp:"EU AI法はGPAI（汎用AIモデル）にも透明性義務・重大リスクGPAIへの追加要件等の規制が適用される。「GPAI自体は規制対象外」という記述が誤り。GPAI提供者には文書化・著作権配慮ポリシーの公表等の義務が課される。"},

{id:"I08",cat:"情報管理",type:"不適切",
 q:"データガバナンスとデータマネジメントに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "データガバナンスとは、組織全体でデータの品質・セキュリティ・利活用に関する方針・基準・責任体制を定め、データを適切に管理・活用するための仕組みである。",
   "マスターデータ管理（MDM）とは、顧客・商品・従業員等の組織全体で共通して使用する重要データ（マスターデータ）を一元的に管理し、一貫性・正確性を確保する取組である。",
   "データカタログとは、組織が保有するデータ資産（データセット・テーブル・列定義等）のメタデータを管理・検索できるようにするシステムであり、データの発見可能性（ディスカバラビリティ）向上に寄与する。",
   "DAMA（Data Management Association）が定めるDMBOK（データマネジメント知識体系）では、データガバナンスはデータマネジメントの11の機能領域の中核に位置付けられており、最終的な責任はIT部門のみが担う。",
   "プライバシーバイデザインとは、製品・サービスの設計段階からプライバシー保護の仕組みを組み込む考え方であり、個人情報保護の規制対応としても推奨されている。"
 ],
 ans:3,
 exp:"DMBOKでは、データガバナンスはすべてのステークホルダー（経営層・事業部門・IT部門・法務等）が連携して担うべきものとされており、「最終的な責任はIT部門のみ」という記述が誤り。データガバナンスの意思決定体制はCDO（最高データ責任者）等の経営関与が重要とされる。"},

{id:"I09",cat:"情報管理",type:"不適切",
 q:"電子署名および電子文書の法的効力に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "電子署名法において、電磁的記録に付された電子署名（本人確認・改ざん検知機能を備えるもの）は、真正に成立したものと推定される。",
   "タイムスタンプとは、電子データが特定の時刻に存在したこと（存在証明）と、その時刻以降に改ざんされていないこと（完全性証明）を確認できる技術である。",
   "クラウドサイン・DocuSign等のクラウド型電子署名サービスは、電子署名法に基づく効力を持つ場合があるが、すべての電子署名サービスが当然に法的効力を持つわけではなく、サービスの種類・方式によって法的評価が異なる。",
   "電子契約において、相手方が電子署名を付した契約書は、紙の契約書と同等の法的効力を国内外すべての法域において自動的に有する。",
   "電子帳簿保存法の改正により、電子取引データ（電子メール・クラウドサービスで受領した請求書等）は電子データのまま保存することが原則義務化された。"
 ],
 ans:3,
 exp:"電子契約の法的効力は、国・地域によって法制度が異なる。日本の電子署名法に基づいて有効な電子署名であっても、外国の法域での効力は当該国の法制度・国際条約等によって異なり、「すべての法域で自動的に同等」という記述が誤り。国際取引では準拠法・外国法の確認が必要。"},

{id:"I10",cat:"情報管理",type:"不適切",
 q:"システムのSLA（サービスレベル合意）と可用性計算に関する次の記述のうち、最も不適切なものはどれか。なお、1年=365日=8,760時間とする。",
 opts:[
   "可用性99.9%（スリーナイン）のシステムは、年間の最大停止許容時間が約8.76時間（≒8,760×0.001）であることを意味する。",
   "可用性99.99%（フォーナイン）のシステムの年間最大停止許容時間は約52.6分（≒8,760×0.0001×60分）である。",
   "直列に接続された2つのサブシステムA（可用性99.9%）とB（可用性99.5%）で構成されるシステム全体の可用性は、99.9%×99.5%=99.4005%となる。",
   "並列（冗長化）に接続された2つのサブシステムA（可用性99%）とB（可用性99%）で構成されるシステム全体の可用性は、1−(1−0.99)×(1−0.99)=1−0.0001=99.99%となる。",
   "SLAで定める可用性指標が高いほど、システムの設計・構築・運用コストは低減されるため、サービス提供者は可能な限り高い可用性目標を設定することが望ましい。"
 ],
 ans:4,
 exp:"可用性目標が高いほど、冗長化・高信頼部品・24時間監視体制等のコストが大幅に増加する。「可用性が高いほどコストは低減」という記述は誤り（逆）。スリーナイン→フォーナインへの向上には設計・運用コストが指数的に増大するため、ビジネス要件に見合った適切なSLAレベルの設定が重要。"},

{id:"I11",cat:"情報管理",type:"不適切",
 q:"不正競争防止法における営業秘密の保護に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "営業秘密として保護されるためには、①秘密として管理されていること（秘密管理性）、②事業活動に有用な技術上・営業上の情報であること（有用性）、③公然と知られていないこと（非公知性）の3要件をすべて満たす必要がある。",
   "営業秘密の不正取得・使用・開示行為（不正競争行為）に対しては、差止請求・損害賠償請求の民事的救済に加え、刑事罰（懲役・罰金）も適用される場合がある。",
   "退職した元従業員が、在職中に合法的に知り得た営業秘密を、退職後に競合他社で使用することは、不正競争防止法上常に違法となる。",
   "「限定提供データ」は、営業秘密とは別に不正競争防止法で保護される概念であり、業として特定の者に提供するデータ（ID・パスワード管理等の技術的制限付き）が対象となる。",
   "秘密管理性の要件を満たすためには、アクセス制限・秘密表示・取扱いルールの整備等、情報を秘密として管理する意思が客観的に認識できる措置が必要とされる。"
 ],
 ans:2,
 exp:"元従業員が在職中に「正当に取得」した営業秘密を退職後に使用することは、不正競争防止法上「常に違法」とはならない。使用行為が不正競争行為に該当するか否かは、取得経緯・使用態様・秘密管理状況等を総合的に判断する。「常に違法」という断定が誤り。"},

{id:"I12",cat:"情報管理",type:"不適切",

 opts:[
   "スマートシティとは、ICT・データを活用して、交通・エネルギー・医療・行政等の都市機能を最適化し、市民生活の質向上と都市課題の解決を目指す取組である。",
   "デジタル田園都市国家構想は、地方においてもデジタル技術を活用して、地域の魅力・利便性を向上させ、地方への人・情報・投資の流れを生み出すことを目的とした政府の方針である。",
   "EBPM（Evidence-Based Policy Making）とは、データ・エビデンスに基づいて政策立案・評価を行う手法であり、スマートシティや行政DXにおいて重要視されている。",
   "スマートシティの推進において、収集される市民データ（行動・健康・位置情報等）は、個人情報保護の必要がなく、行政が自由に利活用できる公共財とみなされる。",
   "Society5.0とは、狩猟社会（Society1.0）〜情報社会（Society4.0）に続く「サイバー空間と物理空間を高度に融合させたシステムにより、経済発展と社会的課題の解決を両立する人間中心の社会」のことをいう。"
 ],
 ans:3,
 exp:"スマートシティで収集される市民データ（位置情報・健康データ等）は個人情報保護の対象となり、「個人情報保護の必要がなく行政が自由に利活用できる公共財」という記述が誤り。利活用には本人同意・目的外利用の禁止・安全管理措置等の個人情報保護措置が必要。"},

{id:"I13",cat:"情報管理",type:"不適切",
 q:"情報システムの調達・契約に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ウォーターフォール型開発の一括請負契約では、完成物の仕様が明確な場合に適し、ベンダーが成果物完成責任を負う形態である。",
   "アジャイル開発では、要件の変更に柔軟に対応できる準委任契約（準委任型）が親和性が高く、作業量に基づく対価設定がなされる場合が多い。",
   "SaaS（Software as a Service）型のシステム調達では、利用企業がソフトウェアのソースコードを所有し、自由にカスタマイズする権利を原則として持つ。",
   "政府機関等のシステム調達においては、特定ベンダーへの依存（ベンダーロックイン）を避けるため、オープンスタンダードの採用やシステムの可搬性・相互運用性が重視されている。",
   "システム調達においてRFP（提案依頼書）を作成する際は、現状の課題・システム要件・調達範囲・評価基準等を明確にすることで、ベンダーからの提案の比較・評価が容易になる。"
 ],
 ans:2,
 exp:"SaaS型サービスでは、ソフトウェアはサービス提供者（ベンダー）が所有・管理しており、利用企業はソースコードを所有せず、カスタマイズの自由度は制限される。「ソースコードを所有し自由にカスタマイズできる」という記述が誤り。SaaSは利用権（ライセンス）の提供が基本。"},

{id:"I14",cat:"情報管理",type:"不適切",

 opts:[

   "CIM（Construction Information Modeling/Management）は、インフラ構造物（橋梁・トンネル・道路等）の設計・施工・維持管理においてBIMと同様の概念を適用するものである。",
   "国土交通省は、一定規模以上の公共工事においてBIM/CIMの活用を原則化しており、3次元モデルによる業務実施が推進されている。",

 ],
 ans:4,

{id:"I15",cat:"情報管理",type:"不適切",
 q:"デジタルアクセシビリティ（情報バリアフリー）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "Webアクセシビリティとは、障害のある人・高齢者を含むすべての人が、Webコンテンツを支障なく利用できるよう配慮する取組であり、JIS X 8341-3等で要件が定められている。",
   "令和5年に改正・施行された「障害者情報アクセシビリティ・コミュニケーション施策推進法」では、国・地方公共団体のWebサイト等についてアクセシビリティへの対応が求められている。",
   "スクリーンリーダーとは、画面の文字情報を音声で読み上げるソフトウェアであり、視覚障害者のWebアクセスを支援する支援技術の一つである。",
   "Webコンテンツのアクセシビリティ確保には、画像への代替テキスト（alt属性）の付与・動画への字幕提供・色のみに依存しない情報表現等の対応が有効であるが、これらはデザイン美観を損なうため、民間企業のWebサイトでは原則として免除される。",
   "WCAG（Web Content Accessibility Guidelines）はW3Cが策定した国際標準のWebアクセシビリティガイドラインであり、知覚可能・操作可能・理解可能・堅牢性の4原則に基づいている。"
 ],
 ans:3,
 exp:"Webアクセシビリティ対応（alt属性・字幕・色依存しない表現等）は「デザイン美観を損なうため民間企業は免除」という記述が誤り。アクセシビリティとデザイン性の両立は可能であり、また障害者差別解消法の合理的配慮義務（令和6年から民間も義務化）の観点からも民間企業に対する免除規定は存在しない。"},

{id:"I16",cat:"情報管理",type:"適切",
 q:"自動運転のレベル区分（SAE J3016規格）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "レベル3（条件付き自動化）では、特定の条件下でシステムが縦横方向の車両制御をすべて行うが、システムが要求した場合は「直ちに」人間が運転に介入しなければならない。",
   "レベル4（高度自動化）では、特定の走行環境（ODD）内でのみ自動運転が可能であり、その環境外ではシステムが作動できないため、人間による監視・介入が常に必要である。",
   "レベル5（完全自動化）は、あらゆる道路・環境条件下で人間と同等以上の運転が可能であり、すでに日本を含む多くの国で公道での商業運用が一般化している。",
   "レベル2（部分自動化）では、ステアリング・加減速の両方をシステムが制御するが、監視・対応責任は常に人間にあり、ドライバーは注意義務を継続的に負う。",
   "レベル1（運転支援）は、ステアリング制御と加減速制御の両方を同時にシステムが行うものを指す。"
 ],
 ans:3,
 exp:"レベル2（部分自動化）は④の通り、ACCとレーンキープアシストの組み合わせ等でステアリング・加減速を同時にシステムが制御するが、監視・対応責任は人間（ドライバー）にある。①レベル3は要求からの介入に「猶予時間」が与えられる（「直ちに」は誤り）。⑤レベル1は縦か横の制御のどちらか一方。"},

{id:"I17",cat:"情報管理",type:"適切",
 q:"マイナンバー制度（社会保障・税番号制度）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "マイナンバーは、日本国籍を持つ者にのみ付番されており、外国人住民には付番されない。",
   "民間事業者がマイナンバーを取り扱える場面は法律で限定されており、給与支払い（源泉徴収票等）・社会保険の手続き等に限られる。",
   "マイナンバーカードに搭載された電子証明書は、マイナポータルや確定申告（e-Tax）でのみ利用可能であり、民間サービスでの本人確認には使用できない。",
   "特定個人情報（マイナンバーを含む個人情報）の漏洩リスクがある場合でも、個人情報保護委員会への報告義務は一般の個人情報漏洩と同じ基準が適用される。",
   "マイナンバーの利用範囲は法律で限定されており、目的外のマイナンバー収集・利用は禁止され、違反した場合には刑事罰の対象となる。"
 ],
 ans:4,
 exp:"⑤が正しい。マイナンバーの利用範囲は番号法（行政手続における特定の個人を識別するための番号の利用等に関する法律）で厳格に限定されており、目的外収集・利用は禁止され、違反には刑事罰が設けられている。①外国人住民にも付番。②は正しい方向だが民間利用は給与・社会保険等に限定。③マイナンバーカードの電子証明書は民間の本人確認にも利用可能。"},

{id:"I18",cat:"情報管理",type:"適切",

 opts:[
   "CSIRT（Computer Security Incident Response Team）とは、企業・組織内のセキュリティインシデントを事前に発生させないための予防専門チームであり、インシデント発生後の対応は行わない。",
   "SOC（Security Operation Center）は、ネットワーク・システムの監視・分析を行い、サイバー攻撃の検知・対応を行う組織であり、24時間365日の監視体制を提供する場合が多い。",
   "JPCERT/CCは、日本政府の行政機関であり、官公庁のサイバーインシデントのみを担当する国家機関として設立されている。",

   "ペネトレーションテストとは、本番環境への影響を避けるためにすべてテスト環境のみで実施されるものであり、実際のシステムを対象とした疑似攻撃は国内では法律上禁止されている。"
 ],
 ans:1,
 exp:"②が正しい。SOCはネットワーク・システムの継続的な監視・分析によりサイバー攻撃を早期検知・対応する組織。①CSIRTはインシデント発生後の対応も主要任務。③JPCERT/CCは民間の非営利組織であり官公庁専門ではない。④インシデントレスポンス手順はNISTなどの国際標準が存在する。⑤ペネトレーションテストは対象組織の許可を得た上で実際のシステムに対しても実施される。"},

{id:"I19",cat:"情報管理",type:"適切",
 q:"電子帳簿保存法（電帳法）の改正（令和5年12月31日以降の猶予期間終了後の対応を含む）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "電子取引データの保存義務は、大企業のみに適用されており、中小企業・個人事業主は従来通り紙に印刷して保存することで義務を免れる。",
   "電子帳簿保存法の「スキャナ保存」とは、紙の書類をスキャンして電子データとして保存する際の要件を定めたものであり、タイムスタンプの付与・解像度要件等が規定されている。",
   "電子取引データ（電子メール・クラウドで受領した請求書・領収書等）は、一定の要件を満たす場合のみ電子保存が認められ、要件を満たさない場合は必ず紙印刷・保管が義務付けられる。",
   "電子帳簿保存法では、電磁的記録を検索要件（日付・金額・取引先等）に基づき検索できる状態で保存することが求められており、データの削除・改ざんを防止する措置も必要とされる。",
   "電子帳簿保存法の要件を満たした電子帳簿には税務調査での優遇措置は一切なく、紙帳簿と全く同等に扱われる。"
 ],
 ans:3,
 exp:"④が正しい。電子帳簿保存法では電子取引データの検索機能確保（日付・金額・取引先等での検索）と真実性確保（タイムスタンプ・訂正削除履歴保存等）が求められる。①電子取引データ保存義務は規模に関わらず適用。③要件を満たさなくても税務署長への相談・猶予が認められる場合がある。⑤優良な電子帳簿は過少申告加算税の軽減措置の対象となる場合がある。"},

{id:"I20",cat:"情報管理",type:"適切",
 q:"情報リテラシー・メディアリテラシーに関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "ファクトチェックとは、インターネット上の情報はすべて真実であることを確認するプロセスであり、公的機関以外が実施した場合には法的効力を持たない。",
   "フィルターバブルとは、アルゴリズムによって個人の興味・関心に合わせた情報のみが提供されやすくなり、異なる意見・視点に接する機会が減少する現象を指す。",
   "デジタルデバイドとは、デジタル技術への習熟度が高い人と低い人の間に生じる格差のことであり、年齢・地域・経済状況等による格差は含まれない。",
   "エコーチェンバー現象とは、インターネットやSNSで自分と似た意見ばかりが反響・強化されることで、見解の多様性が減少し偏った情報認知が形成される現象を指し、フィルターバブルとは全く関係のない独立した現象である。",
   "情報の一次情報源（一次資料）とは、テレビや新聞等マスメディアが提供する情報のことを指し、政府や研究機関が直接公表する情報は二次情報源に分類される。"
 ],
 ans:1,
 exp:"②が正しい。フィルターバブルはEli Pariserが提唱した概念で、アルゴリズムが利用者に合った情報のみを表示し続けることで、異なる視点・多様な意見への接触機会が失われる現象。①ファクトチェックは情報の真偽確認プロセスで公的機関以外も実施。③デジタルデバイドには年齢・地域・経済格差も含む。④エコーチェンバーとフィルターバブルは関連する概念。⑤一次情報源は政府・研究機関の直接公表情報等。"},
{id:"S01",cat:"安全管理",type:"不適切",
 q:"プロセス安全管理（PSM）およびプロセスハザード解析に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "HAZOP（Hazard and Operability Study）は、プロセスプラント等において、設計意図からの逸脱を「ガイドワード」（高・低・なし・逆等）と「プロセスパラメータ」の組み合わせで体系的に検討し、危険・操作上の問題を特定する手法である。",
   "What-If分析は、「もし〜が起きたら？」という問いかけによって潜在的ハザードを洗い出す比較的自由度の高い手法であり、HAZOP に比べて形式的手順が少なく、経験豊富な専門家によるブレインストーミング的分析に向いている。",
   "MOC（Management of Change）とは、プロセス・設備・手順等に変更を加える際に、変更に伴うリスクを事前に評価・管理し、安全を確保するための管理プロセスである。",
   "プロセス安全管理においてSIL（Safety Integrity Level）は、安全計装システム（SIS）の信頼性要求水準を定めるものであり、SILが高いほど要求される失敗確率が高くなる。",
   "FTA（Fault Tree Analysis）は、起こしてはならないトップイベントを設定し、その原因事象を論理ゲート（AND/OR）を用いて樹形図として展開する演繹的手法である。"
 ],
 ans:3,
 exp:"SIL（安全度水準）はSIL1〜SIL4のレベルがあり、SILが高いほど要求される「失敗確率が低く（信頼性が高く）」なる。「SILが高いほど失敗確率が高くなる」という記述が誤り（逆）。SIL4は最も高い信頼性を要求し、要求時失敗確率（PFD）が10⁻⁵〜10⁻⁴未満とされる。"},

{id:"S02",cat:"安全管理",type:"不適切",
 q:"機能安全（IEC 61508/61511）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "機能安全とは、制御システム・安全計装システム等の正確な機能動作に依存した安全であり、システムが正しく機能することで安全を実現する概念である。",
   "IEC 61508は、電気・電子・プログラマブル電子（E/E/PE）安全関連システムの機能安全に関する国際規格であり、SIL（安全度水準）の概念を定義している。",
   "安全計装システム（SIS：Safety Instrumented System）は、プロセスが危険な状態に達した際に安全な状態へ移行させるための計装システムであり、センサー・論理演算装置・最終要素で構成される。",
   "機能安全規格では、安全関連システムのライフサイクル全体（概念設計から廃棄まで）にわたる体系的な安全マネジメントが求められるが、ソフトウェアの設計・検証は機能安全の対象外とされている。",
   "PFD（Probability of Failure on Demand：要求時失敗確率）は、安全機能が要求された際にシステムが失敗する確率であり、SILレベルの判定基準の一つとして用いられる。"
 ],
 ans:3,
 exp:"IEC 61508はソフトウェア（プログラマブルシステム）の設計・検証も規格の重要な対象であり、ソフトウェア安全要件・検証・妥当性確認に関する詳細な要求事項がある。「ソフトウェアは対象外」という記述が誤り。"},

{id:"S03",cat:"安全管理",type:"不適切",
 q:"労働安全衛生法における作業主任者制度に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "作業主任者は、有害または危険な作業（高圧室内作業・ガス溶接作業・有機溶剤作業・特定化学物質作業・鉛作業・四アルキル鉛作業等）について、事業者が労働者の中から選任する。",
   "作業主任者は、都道府県労働局長の免許を受けた者または都道府県労働局長の登録を受けた機関が実施する技能講習を修了した者の中から選任される。",
   "作業主任者の職務には、作業の直接指揮・設備の点検・保護具の使用状況確認等が含まれる。",
   "作業主任者を選任した事業者は、作業主任者の氏名・職務を作業場の見やすい箇所に掲示する等の方法で、労働者に周知しなければならない。",
   "作業主任者が選任されている場合、当該作業に従事する労働者には安全衛生教育（特別教育）の実施が不要となる。"
 ],
 ans:4,
 exp:"作業主任者の選任と、当該作業に係る特別教育（有機溶剤・特定化学物質・高圧室内等の特定の危険・有害業務に就く者への教育）は独立した義務であり、「作業主任者が選任されていれば特別教育は不要」という記述が誤り。"},

{id:"S04",cat:"安全管理",type:"不適切",
 q:"労働安全衛生法における腰痛予防対策（職場における腰痛予防対策指針）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "腰痛予防対策指針では、重量物の取り扱い作業において、満18歳以上の男性が人力で取り扱う重量は体重の約40%以下を目安とすることとされている。",
   "腰痛のリスクアセスメントにおいては、作業姿勢・動作・重量物取り扱い・作業頻度・作業時間・職場の物理的環境等を評価することが推奨されている。",
   "重量物を取り扱う業務に就く労働者に対しては、腰痛健康診断（配置前健診・定期健診）の実施が推奨されており、腰痛の既往歴・現在の腰痛の状態等を確認することが重要である。",
   "腰痛予防対策指針では、腰部に著しい負担のかかる作業すべてについて、職場環境の改善・作業管理・労働衛生教育の3つの対策を組み合わせることが原則であり、就業制限（腰痛者の当該作業からの完全排除）が最優先とされている。",
   "福祉・医療分野における患者・要介護者の移乗・移動介助については、リフト等の福祉機器の導入により腰痛リスクを低減することが推奨されている。"
 ],
 ans:3,
 exp:"腰痛予防対策指針では、就業制限（完全排除）は最優先策ではなく、職場環境の改善・作業管理・健康管理・労働衛生教育を総合的に実施することが基本。腰痛者であっても適切な作業管理のもとで継続就業できる場合があり、「完全排除が最優先」という記述が誤り。"},

{id:"S05",cat:"安全管理",type:"不適切",
 q:"ALARP（As Low As Reasonably Practicable）原則とリスク受容基準に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ALARP原則とは、リスクを合理的に実行可能な限り低くするという考え方であり、英国HSE（保健安全庁）を中心に発展した産業安全の基本原則の一つである。",
   "ALARPの概念では、リスクを「受容できないリスク領域」「ALARP領域（許容可能だが低減努力が必要な領域）」「広く受容可能な領域」に分けて管理する。",
   "ALARP領域にあるリスクについては、リスク低減のための費用・困難性とリスク低減による便益を比較衡量し、リスク低減が「合理的に実行可能」と判断される場合には対策を講じる必要がある。",
   "ALARP評価では、リスク低減対策のコストが非常に高くなるほど、より安全であるべきとの原則から、費用便益の比較衡量は行わず、技術的に可能なすべての対策を実施しなければならない。",
   "リスク受容基準（トレラビリティ基準）は、絶対的に固定されたものではなく、社会・技術・経済の変化に伴って見直されることがある。"
 ],
 ans:3,
 exp:"ALARP評価は「技術的に可能なすべての対策を無制限に実施する」ものではなく、コスト（負担）と便益（リスク低減効果）の合理的な比較衡量を行い、「合理的に実行可能な限り」低減することが原則。「費用便益比較を行わずすべての対策を実施」という記述が誤り。"},

{id:"S06",cat:"安全管理",type:"不適切",
 q:"事故調査・根本原因分析（RCA：Root Cause Analysis）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "なぜなぜ分析（5 Whys）は、問題（事故・不具合）に対して「なぜ？」を繰り返すことで、表面的な原因から根本原因まで掘り下げる手法であり、比較的シンプルな問題に効果的である。",
   "RCAの目的は、個人の過失・責任の追及よりも、事故を引き起こした組織的・システム的な原因を特定し、再発防止策を講じることにある。",
   "フィッシュボーン図（特性要因図・石川図）は、問題（結果）に影響する原因を「人・機械・材料・方法・環境・測定」等のカテゴリーに整理し、多面的に要因を分析する手法である。",
   "バリアーアナリシスは、ハザードとターゲット（人・設備等）の間に存在すべきバリアー（防護層）の有効性を分析する手法であり、バリアーが機能しなかった原因を特定する。",
   "事故調査において、根本原因が「ヒューマンエラー」と特定された場合は、「当事者の注意不足が原因」として処理が完了し、組織・システム面の改善は不要とされる。"
 ],
 ans:4,
 exp:"「ヒューマンエラー」を根本原因と結論付けて個人責任に帰するだけでは真のRCAにならない。現代の安全科学では、ヒューマンエラーは組織的・環境的要因（過重労働・手順の不整備・訓練不足等）の結果として生じるとされ、「組織・システム面の改善は不要」という記述が誤り。"},

{id:"S07",cat:"安全管理",type:"不適切",
 q:"安全文化と組織事故（リーズンのスイスチーズモデル）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "スイスチーズモデルでは、組織の防護層（バリアー）をスイスチーズのスライスに見立て、各スライスの穴（潜在的欠陥・失敗）が一直線に並んだ時に事故が起きると説明する。",
   "リーズンは、事故の原因を「能動的失敗（フロントラインの人的エラー）」と「潜在的失敗（組織的欠陥・管理上の問題）」に分類し、後者が前者の背景にあることが多いと指摘した。",
   "高信頼性組織（HRO）は、失敗から学ぶ文化・失敗への強い感受性・複雑性への理解・回復力・現場への権限委譲という特性を持ち、高リスク環境でも事故発生率が低い組織とされる。",
   "公正な文化（Just Culture）とは、エラーを犯した個人を例外なく厳しく罰することでエラーを根絶しようとする組織文化であり、懲罰的なアプローチが安全文化の基盤とされる。",
   "安全文化の成熟度モデル（例：ハドソンの安全文化の段階）では、病理的→反応的→計算的→積極的→創造的という段階で組織の安全文化の成熟度が高まるとされる。"
 ],
 ans:3,
 exp:"公正な文化（Just Culture）は「例外なく厳しく罰する懲罰的文化」ではなく、故意・無謀な行為と誠実なエラーを区別し、誠実なエラーは非難・処罰せずにオープンに報告できる環境を整える文化を指す。「例外なく厳しく罰する懲罰的アプローチ」という記述が誤り。"},

{id:"S08",cat:"安全管理",type:"不適切",
 q:"ヒューマンファクターとSHELLモデルに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "SHELLモデルは、Software（手順・規則）、Hardware（機械・設備）、Environment（環境）、Liveware（人間）の各要素とその中心にあるLiveware（当事者）との関係でヒューマンエラーの要因を分析する枠組みである。",
   "SHELLモデルにおけるL-L（Liveware-Liveware）インターフェースとは、人間同士のコミュニケーション・チームワーク・組織文化等の問題に関わるものである。",
   "SHELLモデルにおけるL-S（Liveware-Software）インターフェースとは、人間と作業手順書・マニュアル・コンピュータプログラム等との適合性に関わるものである。",
   "ヒューマンエラーの分類において、スリップ（slip）とは意図した行為は正しいが実行段階での失敗、ミステイク（mistake）とは計画・意思決定段階での誤りを指し、スリップの方が対策が困難とされる。",
   "ジェームズ・リーズンのエラー分類では、不安全行為（エラー・違反）の背景には、監督上の問題・組織上の影響・防護の失敗といった多重の要因があるとされる。"
 ],
 ans:3,
 exp:"ミステイク（mistake）は計画・意思決定レベルの誤りで認知しにくく対策が困難、スリップ（slip）は実行レベルの失敗で比較的気づきやすい。「スリップの方が対策が困難」という記述が誤り（逆）。ミステイクの方が意識的な判断プロセスに関わるため対策が難しいとされる。"},

{id:"S09",cat:"安全管理",type:"不適切",
 q:"GHS（化学品の分類および表示に関する世界調和システム）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "GHSは、化学品の危険有害性（ハザード）を世界共通の基準で分類し、ラベル・安全データシート（SDS）で情報を伝達するための国際的な枠組みである。",
   "GHSのラベルには、絵表示（ピクトグラム）・注意喚起語（危険/警告）・危険有害性情報・注意書き・供給者情報等が含まれる。",
   "GHSにおいて「ドクロ・バツ印」の絵表示は、急性毒性（区分1〜3）・皮膚腐食性/眼に対する重篤な損傷・生殖毒性等を示すために使用される。",
   "安全データシート（SDS）は16の項目から構成されており、化学物質の危険有害性・取扱い上の注意事項・緊急時の対応方法等が記載される。",
   "GHSにおける「感嘆符（！）」の絵表示は、急性毒性（区分4・5）・皮膚刺激性・眼刺激性・皮膚感作性・特定標的臓器毒性（単回ばく露、区分3）等に使用される。"
 ],
 ans:2,
 exp:"「ドクロ・バツ印」（Skull and crossbones）は急性毒性区分1〜3に使用される。「皮膚腐食性/眼に対する重篤な損傷」には「腐食性（試験管と手が溶ける絵）」のピクトグラムが使用される。「生殖毒性」には「健康有害性（感嘆符付きの人体）」のピクトグラムが使用される。絵表示と有害性クラスの対応を混同した誤りパターン。"},

{id:"S10",cat:"安全管理",type:"不適切",
 q:"消防法における危険物の規制に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "消防法上の危険物は、物理的・化学的性状に基づいて第1類（酸化性固体）から第6類（酸化性液体）まで6つの類に分類されている。",
   "指定数量とは、危険物の危険性を勘案して政令で定めた数量であり、指定数量以上の危険物を貯蔵・取り扱う場合は消防法の規制（許可・届出等）が適用される。",
   "製造所・貯蔵所・取扱所（危険物施設）を設置・変更する際は、市町村長等の許可が必要であり、完成検査の合格後でなければ使用できない。",
   "危険物取扱者の免状は甲・乙・丙種に区分されており、甲種危険物取扱者はすべての類の危険物を取り扱うことができるが、立会い資格はなく、乙種危険物取扱者が立会いを担当する。",
   "指定数量の10分の1以上かつ指定数量未満の危険物を取り扱う場合は、火災予防条例（市町村条例）に基づく規制が適用される場合がある。"
 ],
 ans:3,
 exp:"甲種危険物取扱者は、すべての類の危険物の取り扱いができるだけでなく、無資格者がこれらを取り扱う場合の「立会い」も行うことができる。「甲種は立会い資格なし・乙種が担当」という記述が誤り。"},

{id:"S11",cat:"安全管理",type:"不適切",
 q:"製造物責任法（PL法）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "製造物責任法では、製造業者等は自らが製造・加工・輸入した製造物の欠陥によって生じた損害について、過失の有無にかかわらず（無過失責任）、被害者に対して賠償責任を負う。",
   "製造物責任法における「欠陥」とは、製造物が通常有すべき安全性を欠いていることをいい、製造上の欠陥・設計上の欠陥・指示・警告上の欠陥の3種類に分類できる。",
   "製造物責任法の対象は「製造物」（製造または加工された動産）であり、電力・ガス・水道水等の無体物は対象外とされている。",
   "製造物責任法の免責事由には、「開発危険の抗弁（製造業者等が当該製造物を引き渡した時点における科学・技術の知見では欠陥を認識できなかったこと）」が含まれ、この抗弁が認められれば製造業者は免責される。",
   "製造物責任法の損害賠償請求権は、被害者が損害および賠償義務者を知った時から10年で時効消滅し、製造物を引き渡した時から10年の除斥期間も定められている。"
 ],
 ans:4,
 exp:"製造物責任法の消滅時効は「損害および賠償義務者を知った時から3年」（人身損害は5年への延長あり）。「10年で時効」という記述が誤り。なお製造物を引き渡した時から10年の除斥期間は規定されている（潜伏期間が長い損害については特例あり）。"},

{id:"S12",cat:"安全管理",type:"不適切",
 q:"熱中症予防対策（職場における熱中症予防基本対策要綱）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "WBGT（湿球黒球温度）は、気温・湿度・輻射熱の3要素を考慮した暑熱環境の指標であり、屋内・屋外ともに熱中症リスクの評価に用いられる。",
   "熱中症予防重点対策として、高温多湿作業場所での作業については、WBGT値の測定・作業の中断・冷房設備の整備・休憩場所の確保等が求められる。",
   "熱中症の症状に応じた分類では、重症度I度（軽症）には熱失神・熱けいれん、II度（中等症）には熱疲労、III度（重症）には熱射病が含まれる。",
   "熱中症予防のための健康管理として、睡眠不足・飲酒・発熱等の体調不良は熱中症リスクを高めるため、作業者自身による自己管理と事業者による就業前の健康確認が重要である。",
   "熱中症の予防において、作業者の着衣の素材・色については熱中症リスクとは無関係であり、安全性確保の観点から素材・色の規制は不要とされている。"
 ],
 ans:4,
 exp:"着衣の素材（通気性・吸汗速乾性等）・色（黒等の暗色は輻射熱を吸収しやすい）は熱中症リスクに影響する。「着衣の素材・色は熱中症リスクと無関係」という記述が誤り。厚生労働省のガイドラインでも透湿・速乾素材の着用推奨等が明記されている。"},

{id:"S13",cat:"安全管理",type:"不適切",
 q:"電気設備の安全管理（感電防止）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "感電死亡事故の防止には、絶縁・接地・漏電遮断器の設置・感電防止用漏電遮断装置の使用・安全電圧以下での使用等の工学的対策が有効である。",
   "漏電遮断器は、地絡（漏電）を検知して自動的に電路を遮断する保護装置であり、労働安全衛生規則では一定の移動式電動工具・仮設の配線等に対して設置が義務付けられている。",
   "人体に流れる電流が交流30mAを超えると心室細動（致死的な不整脈）が起きる可能性があり、感電による死亡リスクが急増するとされている。",
   "特別高圧（7,000V超）の電路の充電電路付近で作業する場合は、防護具の着用のみで安全が確保されるため、停電作業や活線作業用器具の使用は必ずしも必要ではない。",
   "電気設備の絶縁抵抗測定は、電気設備の劣化・漏電の有無を確認するための定期点検の一つであり、労働安全衛生規則に基づき実施が求められている。"
 ],
 ans:3,
 exp:"特別高圧の充電電路付近での作業では、防護具のみでは安全確保が困難であり、原則として停電作業が要求される。やむを得ず活線状態で作業する場合は活線作業用器具・装置の使用・監視人の配置等の措置が必要。「防護具着用のみで安全確保・停電作業は不要」という記述が誤り。"},

{id:"S14",cat:"安全管理",type:"不適切",
 q:"高圧ガス保安法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "高圧ガス保安法では、高圧ガスを製造・貯蔵・販売・移動・消費するにあたって、安全確保のための技術基準の遵守と、一定の製造所等では都道府県知事の許可・届出が必要とされている。",
   "高圧ガスの移動（車両による輸送）に際しては、積載するガスの種類・量・容器の仕様に応じた技術基準（警戒標識の掲示・消火器の携行・車両停車時の措置等）が定められている。",
   "液化石油ガス（LPG）は高圧ガスの一種であり、家庭用プロパンガス（LP ガス）の販売・消費にも高圧ガス保安法の規制が一定程度及ぶ。",
   "高圧ガス保安法において、冷凍設備は処理能力に関わらず、すべて都道府県知事の許可が必要であり、小規模な業務用冷蔵庫も例外なく規制対象となる。",
   "高圧ガス製造事業者は、高圧ガス保安法に基づき危害予防規程を作成し、都道府県知事に届け出なければならない場合がある。"
 ],
 ans:3,
 exp:"冷凍設備は処理能力（1日の冷凍能力）に応じて規制区分があり、小規模なもの（一定の冷凍能力未満）は許可・届出の対象外となる場合がある。「処理能力に関わらずすべて許可必要・小規模冷蔵庫も例外なく対象」という記述が誤り。"},

{id:"S15",cat:"安全管理",type:"不適切",
 q:"重大事故の教訓と安全マネジメントに関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "スリーマイル島原子力発電所事故（1979年、米国）は、機器の故障と運転員の誤操作が複合した事故であり、人間工学・運転員訓練・緊急時手順の改善が世界的に進む契機となった。",
   "チェルノブイリ原子力発電所事故（1986年、ソ連）は、設計上の欠陥と安全規則を無視した試験中に発生した事故であり、原子炉設計の安全性・安全文化の重要性を世界に示した。",
   "チャレンジャー号爆発事故（1986年、米国）では、Oリングの低温脆化が直接原因であったが、組織的な意思決定プロセスの問題（エンジニアの懸念が経営層の意思決定に反映されなかった）も重大な要因として指摘されている。",
   "福知山線脱線事故（2005年、日本）は、過密ダイヤ・速度超過・組織的なリスク管理の失敗が複合した事故であり、組織事故の典型例として分析されている。",
   "重大産業事故の多くは、突発的・偶発的な要因のみで発生するものであり、事前のヒヤリハット情報や小さな異常の蓄積はほとんどの場合、最終的な事故とは無関係とされている。"
 ],
 ans:4,
 exp:"ハインリッヒの法則や事故分析研究は、重大事故の前には多数のヒヤリハット・小さな異常が存在することを示している。「重大事故は突発的・偶発的要因のみ・ヒヤリハットとは無関係」という記述が誤り。日常的な小さな異常・ヒヤリハットを記録・分析して対策を講じることが重大事故予防の基本。"},

{id:"S16",cat:"安全管理",type:"適切",
 q:"リスクアセスメントの実施に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "リスクアセスメントは、労働安全衛生法により全事業場に義務付けられており、毎年必ず実施しなければならない。",
   "リスクアセスメントで特定されたすべてのリスクについて、直ちに設備改善等の工学的対策を実施する義務があり、教育・訓練のみによる対応は認められない。",
   "化学物質のリスクアセスメントは、労働安全衛生法の改正により、リスクアセスメント対象化学物質（GHS分類で危険有害性が確認されたもの等）を取り扱う事業場で実施が義務付けられている。",
   "リスクアセスメントは事業者が単独で実施するものであり、労働者の参加は法律上禁止されている。",
   "リスクアセスメントで特定されたリスクは、いったん対策を講じた後は再評価の必要はなく、一度の評価で永続的に有効とみなされる。"
 ],
 ans:2,
 exp:"③が正しい。令和4年の労働安全衛生法改正（令和6年4月施行）により、リスクアセスメント対象化学物質（GHS分類で危険有害性のあるもの等約2,900物質）を取り扱う事業場でのリスクアセスメント実施が義務化された。①全事業場への義務ではなく、化学物質・設備改修等の特定場面での義務。"},

{id:"S17",cat:"安全管理",type:"適切",
 q:"感染症と事業継続（BCPの感染症対応）に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "感染症BCPは、地震・水害等の自然災害BCPと全く同じ枠組みで対応でき、感染症特有の対策（在宅勤務・接触低減等）を追加する必要はない。",
   "感染症BCP策定において、在宅勤務・交替勤務・職場の換気・手指衛生の徹底等は感染防止対策として有効であり、事業継続と感染防止の両立を図ることが重要である。",
   "新型インフルエンザ等対策特別措置法は、緊急事態宣言時に政府が民間企業に対し事業停止を命じることを規定しており、宣言下では対象業種の全事業所が強制的に閉鎖される。",
   "感染症BCPでは、重要業務の絞り込みと優先順位付けは不要であり、すべての業務を平時と同様に継続することが目標とされる。",
   "感染症の流行期には、サプライチェーンへの影響は軽微であるため、BCPにおけるサプライヤー管理・代替調達先の確保は優先度が低い。"
 ],
 ans:1,
 exp:"②が正しい。感染症BCPは事業継続と感染防止（在宅勤務・換気・手指衛生等）の両立が核心。①感染症BCPは自然災害BCPと異なる要素（段階的感染拡大・人的要因の変動等）があり別途対応が必要。③特措法の緊急事態宣言は事業停止を「命じる」ものではなく「要請・指示」が主体。"},

{id:"S18",cat:"安全管理",type:"適切",
 q:"屋外作業における落雷リスク管理に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "落雷発生時の安全確保として、広い野外では低木の下が最も安全な避難場所であり、木陰に入ることが推奨される。",
   "雷が鳴り始めた際の屋外作業の中断・退避は、作業効率を著しく損なうため、雷撃が確認されてから（視認・音で確認してから）避難行動を取れば十分である。",
   "落雷リスクが高い環境（山岳・高所・海上等）での作業においては、雷予報の事前確認・雷発生時の作業中断基準・避難場所の事前設定等をBCPや安全計画に盛り込むことが重要である。",
   "屋外作業中に雷が近づいた場合、金属製の工具・機器は雷を引き寄せるため、すべての金属製品を作業員から離して地面に置けば安全に作業を継続できる。",
   "送電線の近くでは、落雷があっても避雷器が設置されているため、作業員への危険はなく、落雷時の屋外作業継続は問題ない。"
 ],
 ans:2,
 exp:"③が正しい。落雷リスクが高い環境での作業には事前の雷予報確認・中断基準・避難場所の計画が不可欠。①低木の下は危険（落雷・側撃雷のリスク）。②雷が鳴り始めた段階で退避を開始すべき（視認してからでは遅い）。④金属を離しても落雷リスクは変わらない（雷は高い物体・尖った物体に落ちやすい）。⑤避雷器は設備保護目的であり、作業員の安全を直接保証しない。"},

{id:"S19",cat:"安全管理",type:"適切",
 q:"建設業の労働安全衛生管理に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "建設業における元請け事業者（特定元方事業者）は、下請け事業者の労働者が被った労働災害について、一切の責任を負わない。",
   "墜落・転落防止対策として、高さ2m以上の箇所での作業では、安全帯（要求性能墜落制止用器具）の使用または手すり・囲い等の設置が原則として義務付けられている。",
   "建設現場における統括安全衛生責任者の選任義務は、工事の種類・規模に関わらずすべての現場に課されている。",
   "建設業の重大災害防止のため、発注者は労働安全衛生法上の安全衛生義務を一切負わない。",
   "建設現場における「ゼロ災運動」は、労働者の不安全行動の排除のみを目的としており、設備・設計の安全性向上は対象外とされている。"
 ],
 ans:1,
 exp:"②が正しい。高さ2m以上での作業は墜落・転落防止のため、手すり・囲い等の設置または安全帯の使用が義務付けられている（労働安全衛生規則）。①元請けは協力会社の安全管理についても統括管理義務を負う。③統括安全衛生責任者は常時50人以上（トンネル等は30人）の労働者が混在する大規模現場に選任義務。"},

{id:"S20",cat:"安全管理",type:"適切",
 q:"安全パトロール（職場巡視）の実施に関する次の記述のうち、最も適切なものはどれか。",
 opts:[
   "産業医による職場巡視は、事業場の規模・業種に関わらず毎週1回以上の実施が法律で義務付けられている。",
   "安全パトロールで発見された不安全状態・不安全行動については、その場での指導・記録・改善措置の実施・フォローアップが重要であり、発見と記録のみでは安全管理として不十分である。",
   "安全パトロールは、生産ラインの停止を防ぐため、作業が行われていない時間帯（昼休み・業務終了後等）にのみ実施することが原則とされている。",
   "職場巡視は管理監督者のみが実施すべきであり、一般作業者がパトロールに参加することは、役割混乱を招くため推奨されていない。",
   "安全パトロールの結果を改善活動につなげるためには、発見事項を経営層・管理者・安全担当者のみで共有し、現場の労働者への結果フィードバックは不要である。"
 ],
 ans:1,
 exp:"②が正しい。安全パトロールの目的は不安全状態・行動の発見→指導→改善措置→フォローアップの一連のサイクルにある。発見・記録だけでは改善につながらない。①産業医の職場巡視は原則月1回（一定条件下では2か月に1回可）。③作業中の実態確認が重要であり、作業時間帯での実施が基本。④一般作業者の参加（相互安全パトロール等）は推奨される場合が多い。"},
{id:"G01",cat:"社会環境管理",type:"不適切",
 q:"水銀に関する水俣条約（Minamata Convention on Mercury）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "水俣条約は、水銀および水銀化合物による人の健康および環境への悪影響から保護することを目的とした国際条約であり、日本が主導して採択（2013年）された経緯から「水俣条約」と命名された。",
   "水俣条約では、水銀の一次採掘（新規採掘）の禁止・段階的廃止、水銀添加製品（蛍光ランプ・電池・体温計等）の製造・輸出入の規制、水銀を使用した製造工程の廃止等が定められている。",
   "水俣条約に基づき、蛍光ランプ等の水銀添加製品の製造・輸入・輸出の禁止については段階的な廃止スケジュールが設けられており、日本でも対応する国内法整備が進められている。",
   "水俣条約の規制対象は、水銀を意図的に添加した製品のみであり、採掘・製造・廃棄の過程で水銀が副産物として生じる場合や、廃棄物最終処分場からの水銀漏出については一切規制されていない。",
   "水銀廃棄物の適正管理・処分についても水俣条約で定められており、水銀廃棄物の環境上適正な管理を確保するための措置が締約国に求められている。"
 ],
 ans:3,
 exp:"水俣条約は意図的添加製品の規制にとどまらず、副産物としての水銀排出（石炭火力発電・セメント生産・非鉄金属精製等）の管理・廃棄物の適正処分・水銀汚染サイトの対処等も規定している。「副産物・廃棄物漏出については一切規制されていない」という記述が誤り。"},

{id:"G02",cat:"社会環境管理",type:"不適切",
 q:"グローバルプラスチック条約（プラスチック汚染に関する法的拘束力のある国際文書）の交渉に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "2022年の第5回UNEA（国連環境総会）において、プラスチック汚染を終わらせるための法的拘束力のある国際文書の策定に向けた政府間交渉委員会（INC）の設立が決議された。",
   "グローバルプラスチック条約の交渉では、プラスチックのライフサイクル全体（生産・設計・廃棄物管理等）を対象とするかどうか、規制の強度・手法等について各国間で意見の相違がある。",
   "交渉においては、プラスチック生産量の削減（上流対策）を重視するグループと、廃棄物管理・リサイクルの強化（下流対策）を重視するグループとの対立が続いている。",
   "グローバルプラスチック条約は、2024年末のINC5における交渉で最終合意が成立し、2025年から全世界で均一な規制が法的に発効している。",
   "日本はプラスチック資源循環促進法（令和3年制定）において、プラスチックのライフサイクル全体での資源循環促進を目指しており、グローバルな条約交渉との整合性も意識している。"
 ],
 ans:3,
 exp:"INC5（2024年11月、釜山開催）ではプラスチック条約の最終合意には至らず、交渉は継続となった。「2024年末に最終合意・2025年から全世界で法的発効」という記述が誤り。複雑な利害対立から合意形成には引き続き時間を要している。"},

{id:"G03",cat:"社会環境管理",type:"不適切",
 q:"カーボンクレジット市場（J-クレジット制度・GX-ETS）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "J-クレジット制度は、省エネ設備の導入・再生可能エネルギーの利用・適切な森林管理等によるCO2等の排出削減・吸収量をクレジットとして認証し、売買を可能にする制度である。",
   "GX-ETS（グリーントランスフォーメーション排出量取引制度）は、我が国における排出量取引制度として導入が進められており、段階的に制度が整備・強化される予定である。",
   "カーボンオフセットとは、自らの努力では削減が困難なGHG排出量について、他の場所での削減・吸収量（クレジット）を購入して相殺する取組である。",
   "J-クレジット制度で認証されたクレジットは、GHG排出量の算定・報告制度（温対法）における削減量として使用できるほか、RE100等の国際的な目標達成への活用も可能である。",
   "カーボンクレジットの価格は、世界中で統一された固定価格が設定されており、政府間協定によって毎年改定される仕組みになっている。"
 ],
 ans:4,
 exp:"カーボンクレジットの価格は、市場（取引所・相対取引等）での需給によって決まるものであり、「世界中で統一された固定価格・政府間協定で毎年改定」という記述が誤り。欧州ETS・米国RGGI・日本J-クレジット等それぞれ異なる価格水準で推移している。"},

{id:"G04",cat:"社会環境管理",type:"不適切",
 q:"温室効果ガス排出量算定・報告・公表制度（地球温暖化対策の推進に関する法律：温対法）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "温対法における特定排出者（温室効果ガスの多量排出事業者）は、毎年度、事業所ごとのGHG排出量を算定し、国に報告する義務がある。",
   "温対法の対象となる温室効果ガスには、CO2・CH4（メタン）・N2O（一酸化二窒素）・HFCs・PFCs・SF6・NF3の7種類が含まれる。",
   "Scope1排出量とは、事業者自らが直接排出するGHG（燃料の燃焼・工業プロセス等）であり、Scope2は他者から供給された電気・熱・蒸気の使用に伴う間接排出量を指す。",
   "Scope3排出量は、Scope1・2以外のサプライチェーン上の間接排出であり、GHGプロトコルでは15のカテゴリーに分類されている。ただしScope3の算定・報告は温対法上の義務であり、未報告には行政処分が科される。",
   "温対法に基づくGHG排出量の報告データは、環境省・経済産業省のウェブサイトで一般に公表されており、企業・事業所ごとの排出量情報が閲覧可能である。"
 ],
 ans:3,
 exp:"Scope3排出量の算定・報告は、温対法上の義務（法定報告義務）ではなく任意である。「温対法上の義務・未報告に行政処分」という記述が誤り。Scope3の開示は有価証券報告書でのサステナビリティ情報開示等の文脈で求められることはあるが、温対法上の義務ではない。"},

{id:"G05",cat:"社会環境管理",type:"不適切",
 q:"戦略的環境アセスメント（SEA）および環境影響評価法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "環境影響評価法（環境アセスメント法）は、道路・ダム・鉄道・飛行場・発電所・廃棄物処理施設等の大規模事業について、事業者による環境影響の予測・評価・環境保全措置の検討を義務付ける制度である。",
   "環境影響評価の手続きでは、スコーピング（調査・予測・評価すべき環境項目の絞り込み）の段階で地域住民・関係行政機関等の意見を反映させる手続きが設けられている。",
   "戦略的環境アセスメント（SEA）とは、個別事業の前段階である政策・計画・プログラムの策定段階で環境影響を評価するものであり、日本では各省庁が個別の政策で実施している事例がある。",
   "環境影響評価法に基づく評価書の作成後、その内容に重大な問題があると認定された事業は、評価書の作成者が自動的に事業計画を撤回する法的義務を負う。",
   "洋上風力発電の普及拡大に伴い、環境影響評価法の対象事業に洋上風力発電所（一定規模以上）が追加され、手続きの迅速化に向けた見直しも行われている。"
 ],
 ans:3,
 exp:"評価書の内容に問題があると認定された場合の対処は、主務大臣による勧告・意見等を通じて事業計画の修正が求められる場合があるが、評価書作成者が「自動的に撤回する法的義務」を負うものではない。事業の中止・修正判断は許認可権限を持つ行政機関との関係で決まる。"},

{id:"G06",cat:"社会環境管理",type:"不適切",
 q:"自然資本・生態系サービスの評価に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "生態系サービスは、一般に「供給サービス（食料・水・木材等の供給）」「調整サービス（気候調節・洪水緩和・水質浄化等）」「文化的サービス（レクリエーション・観光等）」「基盤サービス（土壌形成・光合成・栄養循環等）」の4つに分類される。",
   "TEEB（生態系と生物多様性の経済学）は、生態系サービスを経済的に評価・可視化することで、生物多様性保全の経済的合理性を示す取組であり、国際社会での政策形成に影響を与えた。",
   "IPBES（生物多様性及び生態系サービスに関する政府間科学政策プラットフォーム）は、生物多様性・生態系に関する科学的知見を政策立案者に提供する政府間組織であり、IPCCの生物多様性版に相当する機関とされる。",
   "自然資本とは、生態系・生物種・鉱物・化石燃料等を含む自然資源の総体を指すが、これらはすべて再生可能資源に分類されており、枯渇リスクの観点から管理する必要はないとされている。",
   "TNFD（自然関連財務情報開示タスクフォース）は、企業が自然資本・生物多様性に関連するリスク・機会を評価・開示するための枠組みを構築し、2023年に最終提言（v1.0）を公表した。"
 ],
 ans:3,
 exp:"自然資本には「再生不可能資源（化石燃料・鉱物等）」も含まれており、これらは枯渇リスクがある。「すべて再生可能・枯渇リスク管理不要」という記述が誤り。持続可能な利用という観点から、再生可能・不可能を区別した管理が自然資本管理の基本。"},

{id:"G07",cat:"社会環境管理",type:"不適切",
 q:"ISSBサステナビリティ開示基準（IFRS S1・S2）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "ISSB（国際サステナビリティ基準審議会）は、IFRS財団の下に設置された機関であり、サステナビリティ関連財務情報の開示に関する国際基準を策定している。",
   "IFRS S1（サステナビリティ関連財務情報の開示に関する一般要求事項）では、企業の短期・中期・長期の見通しに影響するサステナビリティ関連のリスクと機会についての情報開示を求めている。",
   "IFRS S2（気候関連開示）は、TCFDの提言を踏まえて策定されており、ガバナンス・戦略・リスク管理・指標と目標の4つの柱に基づく開示を求めている。",
   "日本の有価証券報告書におけるサステナビリティ情報開示は、IFRS S1・S2の日本版基準（SSBJ基準）の策定が進んでおり、段階的に適用が予定されている。",
   "ISSBのサステナビリティ開示基準では、Scope3排出量の開示は任意事項とされており、上場企業であっても開示義務は一切発生しないことが明記されている。"
 ],
 ans:4,
 exp:"IFRS S2ではScope3排出量の開示が要求項目として含まれており（重要性の判断に基づく）、「Scope3開示は任意・上場企業でも義務は一切発生しない」という記述が誤り。適用時期・重要性判断によって開示が求められる場合がある。"},

{id:"G08",cat:"社会環境管理",type:"不適切",
 q:"カーボンニュートラル・ネットゼロの概念と日本の政策に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "カーボンニュートラルとは、GHG排出量と吸収量（森林吸収等）を均衡させ、実質的な排出量をゼロにする状態を指し、日本政府は2050年カーボンニュートラルを宣言している。",
   "GHGプロトコルのネットゼロ基準では、Scope1・2・3をすべて対象としてバリューチェーン全体の排出を削減した上で、残余排出量を除去することが求められる。",
   "GXリーグは、自社のGX（グリーントランスフォーメーション）に積極的に取り組む企業群が形成する場であり、カーボンプライシング・排出量取引・気候関連情報開示等に取り組む。",
   "2030年度における日本のGHG削減目標（NDC）は、2013年度比26%削減であり、パリ協定採択後も変更されていない。",
   "エネルギー基本計画では、2030年に向けた再生可能エネルギーの電源構成比率の目標が設定されており、太陽光・風力・水力・地熱・バイオマス等が主要な再エネ電源として位置付けられている。"
 ],
 ans:3,
 exp:"2021年10月の地球温暖化対策計画改定により、日本の2030年度GHG削減目標は「2013年度比46%削減（さらに50%の高みへ挑戦）」に引き上げられた。「2013年度比26%・パリ協定後も変更なし」という記述が誤り。"},

{id:"G09",cat:"社会環境管理",type:"不適切",
 q:"グリーンウォッシング規制（欧州および日本の動向）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "グリーンウォッシングとは、実態よりも環境に配慮しているように見せかける虚偽・誇大な環境主張を指し、消費者・投資家の誤解を招く問題として国際的に規制強化が進んでいる。",
   "EUでは、環境主張（グリーンクレーム）の根拠の明確化・実証を企業に義務付けるグリーンクレーム指令の導入が検討・進行されており、根拠のない環境主張を禁止する方向で規制が強化される。",
   "EUのサステナブルファイナンス開示規制（SFDR）では、金融商品・投資ファンドのサステナビリティ特性に関する開示要件が定められており、グリーンウォッシングを防ぐ役割が期待されている。",
   "日本では、消費者庁が景品表示法に基づくグリーンウォッシング規制を強化しており、根拠のない「環境に優しい」等の表示は不当表示として措置命令の対象となる可能性がある。",
   "グリーンウォッシング規制の強化により、企業は今後、環境関連の情報開示をすべて止め、環境への取組を一切対外的に公表しないことが国際的に推奨されている。"
 ],
 ans:4,
 exp:"グリーンウォッシング規制の目的は「実態のない環境主張の禁止」であり、「環境取組の情報開示をすべて止める・公表しない」ことが推奨されているわけではない。むしろ実態に基づいた適切な情報開示が求められている。「すべての情報開示を止めることが推奨」という記述が誤り。"},

{id:"G10",cat:"社会環境管理",type:"不適切",
 q:"土壌汚染対策法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "土壌汚染対策法では、有害物質使用特定施設の廃止時・一定面積以上の土地の形質変更時・土壌汚染が判明して都道府県知事が必要と認めた時等に、土壌汚染状況調査の実施が義務付けられる場合がある。",
   "土壌汚染対策法により、汚染土地は「要措置区域（摂取・接触リスクあり：対策工事が義務）」と「形質変更時要届出区域（溶出・拡散リスクあり：対策は義務ではないが形質変更時の届出が必要）」に指定される。",
   "指定調査機関が行う土壌汚染状況調査の対象物質は、揮発性有機化合物（VOC）・重金属等・農薬等の特定有害物質26物質群が法律で定められている。",
   "要措置区域に指定された土地については、指定を受けた翌日から一切の土地利用（建物の建築・農業・駐車場としての使用等）が禁止され、汚染の除去等の措置が完了するまで何もできない。",
   "土壌汚染は発見が困難で潜在化しやすく、地下水汚染につながるリスクもあるため、土地売買・企業の合併買収（M&A）の際には土壌汚染リスクの調査（デューデリジェンス）が重要とされる。"
 ],
 ans:3,
 exp:"要措置区域は土地の形質変更・汚染の拡散が禁止されるが、「一切の土地利用が禁止」ではなく、汚染の摂取経路を遮断する管理の下での土地利用が可能な場合がある。「すべての土地利用が禁止・何もできない」という断定が誤り。"},

{id:"G11",cat:"社会環境管理",type:"不適切",
 q:"大気汚染防止法に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[
   "大気汚染防止法では、ばい煙発生施設（工場のボイラー・溶融炉・焼却炉等）から排出されるばい煙（硫黄酸化物・ばいじん・有害物質）について、排出基準が定められている。",
   "VOC（揮発性有機化合物）は、光化学オキシダントや浮遊粒子状物質（SPM）の原因物質の一つとして、大気汚染防止法によって特定施設からの排出規制が行われている。",
   "石綿（アスベスト）による大気汚染を防止するため、建築物の解体・改修工事における石綿含有材料の適正処理について、大気汚染防止法に基づく届出・作業基準の遵守が義務付けられている。",
   "大気汚染防止法において、自動車から排出されるNOx・PMについても規制が設けられているが、船舶・航空機からの排出については一切規制対象に含まれていない。",
   "PM2.5（微小粒子状物質）は環境基準が設定されており、その達成状況の常時監視や注意喚起情報の提供等が行われている。"
 ],
 ans:3,
 exp:"船舶からの大気汚染物質排出については、海洋汚染等及び海上災害の防止に関する法律（海防法）により規制される。また航空機についても国際条約・航空法等による規制がある。「船舶・航空機については一切規制対象に含まれていない」という記述が誤り。"},

{id:"G12",cat:"社会環境管理",type:"不適切",
 q:"廃棄物処理法（廃棄物の処理及び清掃に関する法律）に関する次の記述のうち、最も不適切なものはどれか。",
 opts:[

{id:"G17",cat:"社会環境管理",type:"適切",

 ],

{id:"G20",cat:"社会環境管理",type:"適切",

 ],

const CATS=["経済性管理","人的資源管理","情報管理","安全管理","社会環境管理"];
const CAT_COLORS={"経済性管理":"#58A6FF","人的資源管理":"#79C0FF","情報管理":"#A371F7","安全管理":"#F78166","社会環境管理":"#56D364"};
const NUMS=["①","②","③","④","⑤"];

function App(){
  const [screen,setScreen]=useState("home");
  const [mode,setMode]=useState(null);
  const [queue,setQueue]=useState([]);
  const [qIdx,setQIdx]=useState(0);
  const [sel,setSel]=useState(null);
  const [answered,setAnswered]=useState(false);
  const [results,setResults]=useState([]);
  const [stats,setStats]=useState(()=>{
    try{const s=localStorage.getItem("r8stats");return s?JSON.parse(s):{total:0,correct:0,cats:{}};}catch{return {total:0,correct:0,cats:{}};}
  });
  const [mistakes,setMistakes]=useState(()=>{
    try{const m=localStorage.getItem("r8mistakes");return m?JSON.parse(m):{};}catch{return {};}
  });
  const [reviewTab,setReviewTab]=useState("wrong");

  const saveStats=(s)=>{setStats(s);try{localStorage.setItem("r8stats",JSON.stringify(s));}catch{}};
  const saveMistakes=(m)=>{setMistakes(m);try{localStorage.setItem("r8mistakes",JSON.stringify(m));}catch{}};

  const startMode=(m,qs)=>{
    const shuffled=[...qs].sort(()=>Math.random()-.5);
    setMode(m);setQueue(shuffled);setQIdx(0);setSel(null);setAnswered(false);setResults([]);setScreen("quiz");
  };

  const today=new Date();
  const seed=today.getFullYear()*10000+(today.getMonth()+1)*100+today.getDate();
  const todayQs=useMemo(()=>{
    const seeded=(arr,s)=>{let x=s;return [...arr].sort(()=>{x=(x*1664525+1013904223)&0xFFFFFFFF;return x-0x7FFFFFFF;});};
    return CATS.flatMap(cat=>{
      const cqs=seeded(QUESTIONS.filter(q=>q.cat===cat),seed+CATS.indexOf(cat));
      return cqs.slice(0,4);
    });
  },[seed]);

  const mistakeQs=QUESTIONS.filter(q=>mistakes[q.id]&&mistakes[q.id]>0);

  const handleSelect=(i)=>{
    if(answered)return;
    setSel(i);setAnswered(true);
    const q=queue[qIdx];
    const correct=i===q.ans;
    const newResults=[...results,{q,sel:i,correct}];
    setResults(newResults);
    const ns={...stats};
    ns.total=(ns.total||0)+1;
    if(correct)ns.correct=(ns.correct||0)+1;
    ns.cats=ns.cats||{};
    ns.cats[q.cat]=ns.cats[q.cat]||{total:0,correct:0};
    ns.cats[q.cat].total++;
    if(correct)ns.cats[q.cat].correct++;
    saveStats(ns);
    if(!correct){
      const nm={...mistakes};
      nm[q.id]=(nm[q.id]||0)+1;
      saveMistakes(nm);
    } else {
      if(mistakes[q.id]){
        const nm={...mistakes};
        delete nm[q.id];
        saveMistakes(nm);
      }
    }
  };

  const next=()=>{
    if(qIdx+1>=queue.length){setScreen("result");return;}
    setQIdx(qIdx+1);setSel(null);setAnswered(false);
  };

  const resetAll=()=>{
    if(!window.confirm("すべての記録をリセットしますか？"))return;
    const s={total:0,correct:0,cats:{}};
    saveStats(s);
    saveMistakes({});
  };

  if(screen==="home") return <Home stats={stats} todayQs={todayQs} mistakeQs={mistakeQs} onStart={startMode} onReset={resetAll}/>;
  if(screen==="quiz") return <Quiz queue={queue} qIdx={qIdx} sel={sel} answered={answered} onSelect={handleSelect} onNext={next} onHome={()=>setScreen("home")}/>;
  if(screen==="result") return <Result results={results} mode={mode} onHome={()=>setScreen("home")} onRetry={()=>startMode(mode,queue)}/>;
}

function Home({stats,todayQs,mistakeQs,onStart,onReset}){
  const [catOpen,setCatOpen]=useState(false);
  const [typeOpen,setTypeOpen]=useState(false);
  const pct=stats.total>0?Math.round(stats.correct/stats.total*100):0;
  return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"flex-start",justifyContent:"space-between",marginBottom:20}}>
        <div>
          <div className="logo">総監択一 R8想定</div>
          <div className="sub">令和8年度 技術士総合技術監理部門 択一式 想定問題集</div>
          <div style={{marginTop:6}}><span className="badge badge-r8">✦ R6・R7未出題テーマ100問</span></div>
        </div>
      </div>
      <div className="stats-row">
        <div className="stat-box"><div className="val">{stats.total||0}</div><div className="key">解答済</div></div>
        <div className="stat-box"><div className="val">{stats.correct||0}</div><div className="key">正解数</div></div>
        <div className="stat-box"><div className="val">{pct}%</div><div className="key">正答率</div></div>
      </div>
      {CATS.map(cat=>{
        const cs=stats.cats&&stats.cats[cat];
        const p=cs&&cs.total>0?Math.round(cs.correct/cs.total*100):0;
        const color=CAT_COLORS[cat];
        return(
          <div className="cat-bar" key={cat}>
            <div className="cat-bar-label">
              <span style={{fontSize:".72rem",color}}>{cat}</span>
              <span style={{fontSize:".72rem",color:"var(--muted)"}}>{cs?`${cs.correct}/${cs.total}問`:"未挑戦"}</span>
            </div>
            <div className="cat-bar-track"><div className="cat-bar-fill" style={{width:`${p}%`,background:color}}/></div>
          </div>
        );
      })}
      <div className="section-title">📅 今日の問題</div>
      <div className="menu-card" onClick={()=>onStart("today",todayQs)} style={{borderColor:"rgba(88,166,255,.3)"}}>
        <div className="icon" style={{background:"rgba(88,166,255,.1)"}}>🌅</div>
        <div><div className="title">今日の20問</div><div className="desc">5管理×各4問・毎日変わる</div></div>
      </div>
      <div className="section-title">🎯 モード選択</div>
      <div className="menu-card" onClick={()=>onStart("all100",QUESTIONS)}>
        <div className="icon" style={{background:"rgba(188,140,255,.1)"}}>📚</div>
        <div><div className="title">全100問チャレンジ</div><div className="desc">R8想定問題をすべて解く</div></div>
      </div>
      <div className="menu-card" onClick={()=>onStart("random20",QUESTIONS.sort(()=>Math.random()-.5).slice(0,20))}>
        <div className="icon" style={{background:"rgba(86,211,100,.1)"}}>🎲</div>
        <div><div className="title">ランダム20問</div><div className="desc">カテゴリミックスでランダム出題</div></div>
      </div>
      <div className="menu-card" onClick={()=>onStart("calc",QUESTIONS.filter(q=>q.type==="計算"))}>
        <div className="icon" style={{background:"rgba(247,129,102,.1)"}}>🔢</div>
        <div><div className="title">計算問題のみ</div><div className="desc">損益分岐点・EOQ・管理図・EVMなど</div></div>
      </div>
      {mistakeQs.length>0&&(
        <div className="menu-card warn-mode" onClick={()=>onStart("mistakes",mistakeQs)}>
          <div className="icon" style={{background:"rgba(248,81,73,.1)"}}>⚠️</div>
          <div><div className="title">苦手問題克服</div><div className="desc">{mistakeQs.length}問の間違いを再挑戦</div></div>
        </div>
      )}
      <div className="section-title">📂 カテゴリ別</div>
      {CATS.map(cat=>(
        <div className="menu-card" key={cat} onClick={()=>onStart(`cat_${cat}`,QUESTIONS.filter(q=>q.cat===cat))}>
          <div className="icon" style={{background:`${CAT_COLORS[cat]}22`}}>
            {cat==="経済性管理"?"💰":cat==="人的資源管理"?"👥":cat==="情報管理"?"💻":cat==="安全管理"?"🛡️":"🌱"}
          </div>
          <div><div className="title">{cat}</div><div className="desc">20問（計算・不適切・適切）</div></div>
        </div>
      ))}
      <div className="section-title">📝 タイプ別</div>
      {["不適切","適切","計算"].map(t=>(
        <div className="menu-card" key={t} onClick={()=>onStart(`type_${t}`,QUESTIONS.filter(q=>q.type===t))}>
          <div className="icon" style={{background:"rgba(163,113,247,.1)"}}>
            {t==="不適切"?"❌":t==="適切"?"✅":"🧮"}
          </div>
          <div>
            <div className="title">{t==="不適切"?"不適切なものはどれか":t==="適切"?"適切なものはどれか":"計算問題"}</div>
            <div className="desc">{QUESTIONS.filter(q=>q.type===t).length}問</div>
          </div>
        </div>
      ))}
      <div style={{textAlign:"center",marginTop:24,paddingBottom:32}}>
        <button className="btn btn-ghost btn-sm" onClick={onReset}>記録をリセット</button>
      </div>
    </div>
  );
}

function Quiz({queue,qIdx,sel,answered,onSelect,onNext,onHome}){
  const q=queue[qIdx];
  if(!q)return null;
  const color=CAT_COLORS[q.cat]||"var(--accent)";
  const pct=Math.round((qIdx+1)/queue.length*100);
  return(
    <div className="fade-up">
      <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:12}}>
        <button className="btn btn-ghost btn-sm" onClick={onHome}>← ホーム</button>
        <span style={{fontSize:".75rem",color:"var(--muted)"}}>{qIdx+1} / {queue.length}</span>
      </div>
      <div className="progress-bar"><div className="progress-fill" style={{width:`${pct}%`}}/></div>
      <div className="q-card">
        <div className="q-header">
          <span className="q-num">Q{qIdx+1}</span>
          <span className="cat-tag" style={{color,borderColor:`${color}44`,background:`${color}11`}}>{q.cat}</span>
          <span className="type-tag">{q.type}</span>
        </div>
        <div className="q-text">{q.q}</div>
        {q.opts.map((opt,i)=>(
          <button key={i} className={`opt-btn${answered?(i===q.ans?" correct":i===sel&&sel!==q.ans?" wrong":""):" "}`}
            onClick={()=>onSelect(i)} disabled={answered}>
            <span className="opt-num">{NUMS[i]}</span>
            <span>{opt}</span>
          </button>
        ))}
        {answered&&(
          <div className="exp-box">
            <strong>📖 解説：</strong><br/>{q.exp}
          </div>
        )}
      </div>
      {answered&&(
        <div className="nav-row">
          <button className="btn btn-primary" onClick={onNext}>
            {qIdx+1>=queue.length?"結果を見る →":"次の問題 →"}
          </button>
        </div>
      )}
    </div>
  );
}

function Result({results,mode,onHome,onRetry}){
  const correct=results.filter(r=>r.correct).length;
  const pct=Math.round(correct/results.length*100);
  const grade=pct>=80?"🏆 優秀":pct>=60?"✅ 合格圏":pct>=40?"📝 要復習":"⚠️ 要強化";
  const [tab,setTab]=useState("wrong");
  const wrongItems=results.filter(r=>!r.correct);
  const catMap={};
  CATS.forEach(c=>{
    const crs=results.filter(r=>r.q.cat===c);
    if(crs.length>0)catMap[c]={total:crs.length,correct:crs.filter(r=>r.correct).length};
  });
  return(
    <div className="fade-up">
      <div className="result-card">
        <div style={{fontSize:".8rem",color:"var(--muted)",marginBottom:8}}>スコア</div>
        <div className="result-score">{correct}<span style={{fontSize:"1.5rem"}}> / {results.length}</span></div>
        <div style={{fontSize:"1.1rem",fontWeight:700,marginTop:8,color:"var(--text)"}}>{grade}</div>
        <div style={{fontSize:".8rem",color:"var(--muted)",marginTop:4}}>正答率 {pct}%</div>
      </div>
      <div style={{marginBottom:14}}>
        {Object.entries(catMap).map(([cat,cs])=>{
          const p=Math.round(cs.correct/cs.total*100);
          const color=CAT_COLORS[cat];
          return(
            <div className="cat-bar" key={cat}>
              <div className="cat-bar-label">
                <span style={{fontSize:".72rem",color}}>{cat}</span>
                <span style={{fontSize:".72rem",color:"var(--muted)"}}>{cs.correct}/{cs.total}問 ({p}%)</span>
              </div>
              <div className="cat-bar-track"><div className="cat-bar-fill" style={{width:`${p}%`,background:color}}/></div>
            </div>
          );
        })}
      </div>
      <div className="tab-row">
        <button className={`tab${tab==="wrong"?" active":""}`} onClick={()=>setTab("wrong")}>不正解 ({wrongItems.length})</button>
        <button className={`tab${tab==="all"?" active":""}`} onClick={()=>setTab("all")}>全問 ({results.length})</button>
      </div>
      {(tab==="wrong"?wrongItems:results).length===0?(
        <div className="empty-state"><div className="icon">🎉</div><div>全問正解！</div></div>
      ):(tab==="wrong"?wrongItems:results).map((r,i)=>(
        <div className="review-item" key={i}>
          <div style={{display:"flex",gap:8,marginBottom:6,flexWrap:"wrap"}}>
            <span className="cat-tag" style={{color:CAT_COLORS[r.q.cat],borderColor:`${CAT_COLORS[r.q.cat]}44`,background:`${CAT_COLORS[r.q.cat]}11`,fontSize:".62rem",padding:"1px 7px",borderRadius:"12px",border:"1px solid"}}>{r.q.cat}</span>
            <span style={{fontSize:".65rem",color:"var(--muted)"}}>{r.q.id}</span>
          </div>
          <div className="review-q">{r.q.q.length>120?r.q.q.slice(0,120)+"…":r.q.q}</div>
          <div className="review-ans">
            {!r.correct&&<span className="ans-chip wrong">✗ {NUMS[r.sel]} {r.q.opts[r.sel].slice(0,30)}…</span>}
            <span className="ans-chip correct">✓ {NUMS[r.q.ans]} {r.q.opts[r.q.ans].slice(0,30)}…</span>
          </div>
          <div style={{fontSize:".75rem",color:"#8BB4D8",marginTop:8,lineHeight:1.6}}>{r.q.exp.slice(0,100)}…</div>
        </div>
      ))}
      <div className="nav-row" style={{paddingBottom:32}}>
        <button className="btn btn-primary" onClick={onRetry}>再挑戦</button>
        <button className="btn btn-ghost" onClick={onHome}>ホームへ</button>
      </div>
    </div>
  );
}

ReactDOM.render(<App/>,document.getElementById("root"));
</script>
</body>
</html>
